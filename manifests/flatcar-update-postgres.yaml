# Nebraska PostgreSQL backend using cgr.dev/chainguard/postgres.
# NEBRASKA_DB_URL references this service as: nebraska-postgres.flatcar-update:5432
apiVersion: v1
kind: Secret
metadata:
  name: nebraska-db-secret
  namespace: flatcar-update
  labels:
    app.kubernetes.io/part-of: lab
type: Opaque
stringData:
  password: "nebraska"
  url: "postgres://nebraska:nebraska@nebraska-postgres.flatcar-update:5432/nebraska?sslmode=disable&connect_timeout=10"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nebraska-postgres-data-ghost
  namespace: flatcar-update
  labels:
    app.kubernetes.io/part-of: lab
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebraska-postgres
  namespace: flatcar-update
  labels:
    app: nebraska-postgres
    app.kubernetes.io/part-of: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nebraska-postgres
  template:
    metadata:
      labels:
        app: nebraska-postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      containers:
        - name: postgres
          image: cgr.dev/chainguard/postgres:latest
          env:
            - name: POSTGRES_USER
              value: "nebraska"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nebraska-db-secret
                  key: password
            - name: POSTGRES_DB
              value: "nebraska"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nebraska"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nebraska-postgres-data-ghost
---
apiVersion: v1
kind: Service
metadata:
  name: nebraska-postgres
  namespace: flatcar-update
  labels:
    app.kubernetes.io/part-of: lab
spec:
  selector:
    app: nebraska-postgres
  ports:
    - port: 5432
      targetPort: 5432

# Recomputes VM semaphore slot counts hourly from live node capacity.
# Runs as a CronWorkflow so adding/removing nodes auto-adjusts throughput
# within one hour — no manual ConfigMap edits needed.
#
# Formula (per pool):
#   usable_gi  = sum(allocatable_gi - OVERHEAD_GI) over Ready nodes in pool
#   slots      = clamp(floor(usable_gi / SLOT_GI), MIN, MAX)
#
# Two pools:
#   containerdisk — any Ready node (bluefin, dakota containerDisk VMs)
#   hostdisk      — ghost only     (knuckle, flatcar, gnomeos hostDisk VMs)
#
# Constants are in the script below; adjust OVERHEAD_GI or SLOT_GI to tune.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: semaphore-tuner
  namespace: argo
  labels:
    app.kubernetes.io/component: semaphore-tuner
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  schedules:
    - "0 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Replace
  startingDeadlineSeconds: 120
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
  workflowSpec:
    serviceAccountName: argo
    activeDeadlineSeconds: 120
    ttlStrategy:
      secondsAfterCompletion: 3600
    entrypoint: tune
    templates:
      - name: tune
        nodeSelector:
          kubernetes.io/hostname: ghost
        script:
          image: cgr.dev/chainguard/kubectl:latest-dev
          command: [bash]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          source: |
            set -euo pipefail

            # ── tunables ────────────────────────────────────────────────────
            OVERHEAD_GI=10   # system/argo overhead reserved per node
            SLOT_GI=8        # slot unit = largest VM in the fleet
            MIN_CD=2;  MAX_CD=32   # containerdisk bounds (any node)
            MIN_HD=2;  MAX_HD=6    # hostdisk bounds (ghost only)

            # ── parse kubernetes memory quantity → integer GiB ──────────────
            mem_to_gi() {
              local raw="$1"
              if   [[ "$raw" =~ ^([0-9]+)Ki$ ]]; then echo $(( ${BASH_REMATCH[1]} / 1048576 ))
              elif [[ "$raw" =~ ^([0-9]+)Mi$ ]]; then echo $(( ${BASH_REMATCH[1]} / 1024 ))
              elif [[ "$raw" =~ ^([0-9]+)Gi$ ]]; then echo "${BASH_REMATCH[1]}"
              elif [[ "$raw" =~ ^([0-9]+)$   ]]; then echo $(( ${BASH_REMATCH[1]} / 1073741824 ))
              else echo "0"
              fi
            }

            total_cd_gi=0
            ghost_gi=0

            echo "=== Semaphore Tuner $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

            while IFS=$'\t' read -r name mem_raw ready; do
              [[ "$ready" != "True" ]] && { echo "  SKIP $name (NotReady)"; continue; }
              mem_gi=$(mem_to_gi "$mem_raw")
              usable=$(( mem_gi > OVERHEAD_GI ? mem_gi - OVERHEAD_GI : 0 ))
              total_cd_gi=$(( total_cd_gi + usable ))
              echo "  $name: ${mem_gi}Gi allocatable → ${usable}Gi usable"
              [[ "$name" == "ghost" ]] && ghost_gi=$usable
            done < <(kubectl get nodes \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.allocatable.memory}{"\t"}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}')

            cd_slots=$(( total_cd_gi / SLOT_GI ))
            hd_slots=$(( ghost_gi    / SLOT_GI ))

            # Clamp
            (( cd_slots < MIN_CD )) && cd_slots=$MIN_CD
            (( cd_slots > MAX_CD )) && cd_slots=$MAX_CD
            (( hd_slots < MIN_HD )) && hd_slots=$MIN_HD
            (( hd_slots > MAX_HD )) && hd_slots=$MAX_HD

            echo ""
            echo "  max-containerdisk-vms = ${cd_slots}  (${total_cd_gi}Gi / ${SLOT_GI}Gi, clamped [${MIN_CD},${MAX_CD}])"
            echo "  max-hostdisk-vms      = ${hd_slots}  (${ghost_gi}Gi / ${SLOT_GI}Gi, clamped [${MIN_HD},${MAX_HD}])"

            kubectl patch configmap semaphore-config -n argo --type merge \
              -p "{\"data\":{\"max-containerdisk-vms\":\"${cd_slots}\",\"max-hostdisk-vms\":\"${hd_slots}\"}}"

            echo "semaphore-config patched."

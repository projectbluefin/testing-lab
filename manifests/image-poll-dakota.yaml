# CronWorkflow: polls ghcr.io/projectbluefin/dakota:latest every 10 minutes.
# Triggers dakota-qa-pipeline only when OCI digest changes vs ConfigMap state.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: image-poll-dakota
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
    bluefin.io/trigger: digest-poll
spec:
  suspend: false
  schedules:
    - "*/10 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/projectbluefin/dakota"
        - name: image-tag
          value: "latest"
        - name: state-key
          value: "digest-dakota-latest"
        - name: namespace
          value: "bluefin-test"
        - name: suites
          value: "smoke,common,developer,software,system"
        - name: variant
          value: "dakota"
        - name: containerdisk-tag
          value: "dakota-latest"
        - name: ssh-key-secret
          value: "bluefin-test-ssh-key"
        - name: branch
          value: "main"
        - name: vm-memory
          value: "8Gi"
    entrypoint: check-and-trigger
    templates:
      - name: check-and-trigger
        dag:
          tasks:
            - name: check-digest
              templateRef:
                name: image-poller
                template: poll-digest
              arguments:
                parameters:
                  - name: image
                    value: "{{workflow.parameters.image}}"
                  - name: image-tag
                    value: "{{workflow.parameters.image-tag}}"
                  - name: state-key
                    value: "{{workflow.parameters.state-key}}"
            - name: run-pipeline
              depends: "check-digest.Succeeded"
              when: "{{tasks.check-digest.outputs.parameters.changed}} == true"
              templateRef:
                name: dakota-qa-pipeline
                template: pipeline
              arguments:
                parameters:
                  - name: image
                    value: "{{workflow.parameters.image}}"
                  - name: image-tag
                    value: "{{workflow.parameters.image-tag}}"
                  - name: containerdisk-tag
                    value: "{{workflow.parameters.containerdisk-tag}}"
                  - name: namespace
                    value: "{{workflow.parameters.namespace}}"
                  - name: suites
                    value: "{{workflow.parameters.suites}}"
                  - name: variant
                    value: "{{workflow.parameters.variant}}"
                  - name: ssh-key-secret
                    value: "{{workflow.parameters.ssh-key-secret}}"
                  - name: branch
                    value: "{{workflow.parameters.branch}}"
                  - name: vm-memory
                    value: "{{workflow.parameters.vm-memory}}"

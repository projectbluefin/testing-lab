# PriorityClass for BST build pods on ghost.
#
# Value 100 is well below system-cluster-critical (2_000_000_000) and
# system-node-critical (2_000_000_000 - 1), so BST build pods never
# preempt the k8s API server, kubelet, ArgoCD, or other system pods.
#
# preemptionPolicy: Never — build pods queue behind everything else under
# memory pressure instead of evicting lower-priority pods. This matters
# because ghost is control-plane + worker: we never want a build to evict
# kube-apiserver just to start sooner.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: bst-build
value: 100
preemptionPolicy: Never
globalDefault: false
description: "BST build pods on ghost. Non-preempting, below all system priorities."

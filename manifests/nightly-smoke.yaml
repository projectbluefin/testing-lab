# CronWorkflow: runs bluefin smoke suite nightly at 02:00 UTC against latest.
# References bluefin-qa-pipeline WorkflowTemplate — no DAG duplication.
# Runs are retained for 24 hours (ttlStrategy) then cleaned up.
#
# Schema note: CronWorkflow has CronWorkflow-specific fields at .spec
# (schedule, timezone, concurrencyPolicy, startingDeadlineSeconds,
# workflowMetadata) and wraps the Workflow's own spec under
# .spec.workflowSpec — serviceAccountName, podGC, ttlStrategy,
# arguments, workflowTemplateRef, templates, entrypoint all live there.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: nightly-smoke
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  schedules:
    - "0 2 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/trigger: nightly
      bluefin.io/suite: smoke
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 86400   # 24h — success runs cleaned up quickly
      secondsAfterFailure: 604800  # 7d  — failures retained for agent analysis
    workflowTemplateRef:
      name: bluefin-qa-pipeline
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/projectbluefin/bluefin"
        - name: image-tag
          value: "testing"
        - name: containerdisk-tag
          value: "testing"
        - name: namespace
          value: "bluefin-test"
        - name: suites
          value: "smoke,developer,system"
        - name: ssh-key-secret
          value: "bluefin-test-ssh-key"

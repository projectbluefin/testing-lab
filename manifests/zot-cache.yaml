# Zot pull-through cache — single instance proxying all 6 upstream registries
# Zot sync destination prefix mapping stores each registry under a separate subpath:
#   ghcr.io                    → /ghcr   (pull via http://192.168.1.102:30501/ghcr/...)
#   docker.io                  → /docker (pull via http://192.168.1.102:30501/docker/...)
#   quay.io                    → /quay   (pull via http://192.168.1.102:30501/quay/...)
#   registry.fedoraproject.org → /fedora (pull via http://192.168.1.102:30501/fedora/...)
#   registry.access.redhat.com → /redhat (pull via http://192.168.1.102:30501/redhat/...)
#   registry.k8s.io            → /k8s    (pull via http://192.168.1.102:30501/k8s/...)
#
# containerd on each node routes pulls through this via
# manifests/registry-mirror-config.yaml (hosts.toml DaemonSet, no k3s restart needed)
#
# Storage: hostPath on ghost at /var/mnt/ghost-data/zot-cache/
# ArgoCD: testing-lab-infra syncs this
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-cache-config
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "gc": true
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": { "level": "info" },
      "extensions": {
        "sync": {
          "enable": true,
          "registries": [
            {
              "urls": ["https://ghcr.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/ghcr" }]
            },
            {
              "urls": ["https://registry-1.docker.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/docker" }]
            },
            {
              "urls": ["https://quay.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/quay" }]
            },
            {
              "urls": ["https://registry.fedoraproject.org"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/fedora" }]
            },
            {
              "urls": ["https://registry.access.redhat.com"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/redhat" }]
            },
            {
              "urls": ["https://registry.k8s.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/k8s" }]
            }
          ]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot-cache
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
    app.kubernetes.io/component: registry-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot-cache
  template:
    metadata:
      labels:
        app: zot-cache
        app.kubernetes.io/part-of: testing-lab
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-cache-config
        - name: data
          hostPath:
            path: /var/mnt/ghost-data/zot-cache
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: zot-cache
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  selector:
    app: zot-cache
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: zot-cache-nodeport
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  type: NodePort
  selector:
    app: zot-cache
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30501

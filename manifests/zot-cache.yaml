# Zot pull-through cache instances — one per upstream registry
# ghcr.io  → zot-ghcr  NodePort 30501
# docker.io → zot-docker NodePort 30502
#
# containerd on each node routes pulls through these via
# manifests/registry-mirror-config.yaml (hosts.toml DaemonSet, no k3s restart needed)
#
# Storage: hostPath on ghost at /var/mnt/ghost-data/zot-{ghcr,docker}/
# ArgoCD: testing-lab-infra syncs this
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-ghcr-config
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "gc": true
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": { "level": "info" },
      "extensions": {
        "sync": {
          "enable": true,
          "registries": [{
            "urls": ["https://ghcr.io"],
            "onDemand": true,
            "tlsVerify": true,
            "content": [{ "prefix": "**" }]
          }]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot-ghcr
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
    app.kubernetes.io/component: registry-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot-ghcr
  template:
    metadata:
      labels:
        app: zot-ghcr
        app.kubernetes.io/part-of: testing-lab
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "2Gi" }
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-ghcr-config
        - name: data
          hostPath:
            path: /var/mnt/ghost-data/zot-ghcr
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: zot-ghcr
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  type: NodePort
  selector:
    app: zot-ghcr
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30501
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-docker-config
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "gc": true
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": { "level": "info" },
      "extensions": {
        "sync": {
          "enable": true,
          "registries": [{
            "urls": ["https://registry-1.docker.io"],
            "onDemand": true,
            "tlsVerify": true,
            "content": [{ "prefix": "**" }]
          }]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot-docker
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
    app.kubernetes.io/component: registry-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot-docker
  template:
    metadata:
      labels:
        app: zot-docker
        app.kubernetes.io/part-of: testing-lab
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "2Gi" }
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-docker-config
        - name: data
          hostPath:
            path: /var/mnt/ghost-data/zot-docker
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: zot-docker
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  type: NodePort
  selector:
    app: zot-docker
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30502

# CronWorkflow: polls ghcr.io/projectbluefin/bluefin-lts:testing every 10 minutes.
# Triggers bluefin-qa-pipeline only when OCI digest changes vs ConfigMap state.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: image-poll-lts-testing
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
    bluefin.io/trigger: digest-poll
spec:
  schedules:
    - "*/10 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    workflowTemplateRef:
      name: image-poller
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/projectbluefin/bluefin-lts"
        - name: image-tag
          value: "testing"
        - name: state-key
          value: "digest-lts-testing"
        - name: namespace
          value: "bluefin-lts-test"
        - name: suites
          value: "smoke,common,developer,software,system"
        - name: vm-memory
          value: "8Gi"
        - name: variant
          value: "bluefin"
        - name: containerdisk-tag
          value: "lts-testing"

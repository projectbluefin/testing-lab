# Grants argo SA permissions to manage KubeVirt VMs in the bluefin-test namespace.
# Required for create-vm, wait-for-vm-ready, and delete-vm steps.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubevirt-manager
  namespace: bluefin-test
rules:
  - apiGroups:
      - kubevirt.io
    resources:
      - virtualmachines
      - virtualmachineinstances
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubevirt-manager-argo
  namespace: bluefin-test
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubevirt-manager

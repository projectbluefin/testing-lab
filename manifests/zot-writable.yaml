# Writable OCI registry at NodePort 30500 — BIB push target and PR image store.
# Replaces the unmanaged registry:2 Deployment that was running outside GitOps.
# No upstream proxy — write-only / local storage.
# GC enabled: orphaned layers reclaimed after 1h delay, checked every 24h.
# ArgoCD: testing-lab-infra syncs this
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-local-config
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "gc": true,
        "gcDelay": "1h",
        "gcInterval": "24h"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": { "level": "warn" }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
    app.kubernetes.io/component: registry-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
        app.kubernetes.io/part-of: testing-lab
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-local-config
        - name: data
          hostPath:
            path: /var/mnt/ghost-data/zot-local
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500

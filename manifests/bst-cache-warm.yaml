# CronWorkflow: keeps the BST local cache on ghost warm.
# Runs every 6h (00:00, 06:00, 12:00, 18:00 UTC) — nightly build is at 03:00.
# Uses bst-cache-warm WorkflowTemplate (fetch + pull, no build).
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: bst-cache-warm
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  schedules:
    - "0 0,6,12,18 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  suspend: false
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/trigger: cache-warm
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowSuccess
    ttlStrategy:
      secondsAfterCompletion: 86400
    workflowTemplateRef:
      name: bst-cache-warm

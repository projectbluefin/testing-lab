# CronWorkflow: watches GHCR digests for bluefin and bluefin-lts every 5 minutes.
# Submits a build-containerdisk Workflow (force=true) when the upstream digest changes.
# Decouples slow BIB builds from the test pipeline — bluefin-qa-pipeline uses assert-cd
# to fail fast if the containerdisk is missing rather than triggering a build inline.
#
# Schema: CronWorkflow-specific fields at .spec (schedules, concurrencyPolicy, etc.);
# workflow config under .spec.workflowSpec.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: digest-watch
  namespace: argo
  labels:
    app.kubernetes.io/component: digest-watch
    app.kubernetes.io/part-of: testing-lab
spec:
  schedules:
    - "*/5 * * * *"
  timezone: "UTC"
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/trigger: digest-watch
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600    # 1h — watch runs are short-lived, clean up fast
      secondsAfterFailure: 86400   # 24h — retain failures for a day for inspection
    workflowTemplateRef:
      name: digest-watch

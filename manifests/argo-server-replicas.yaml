# Keep argo-server at 2 replicas spread across ghost and exo-0.
# Removes the ghost hostname pin set by the Helm chart.
# ServerSideApply patches only these fields — Helm-owned fields stay intact.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-server
  namespace: argo
spec:
  replicas: 2
  template:
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: argo-server
      containers:
        - name: argo-server
          args:
            - server
            - --auth-mode=server

# Patch workflow-controller Deployment to reclaim idle memory.
#
# GODEBUG=madvdontneed=1 — instructs the Go runtime to return unused memory
# pages to the OS immediately when idle, instead of retaining them in the Go
# heap pool. Without this, RSS stays elevated after a burst of workflow runs
# even though the heap is mostly empty.
#
# GOGC=50 — triggers GC at 50% heap growth instead of the default 100%.
# More aggressive collection; trade: ~5% more CPU at peak, ~50% less idle RSS.
#
# ServerSideApply patches only the env block — Helm-owned fields stay intact.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-controller
  namespace: argo
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: workflow-controller
          env:
            - name: GODEBUG
              value: "madvdontneed=1"
            - name: GOGC
              value: "50"

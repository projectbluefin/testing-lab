# Patch workflow-controller: 2 replicas spread across ghost and exo-0,
# remove ghost hostname pin, keep memory tuning.
# ServerSideApply patches only these fields — Helm-owned fields stay intact.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-controller
  namespace: argo
spec:
  replicas: 2
  template:
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: workflow-controller
      containers:
        - name: workflow-controller
          env:
            - name: GODEBUG
              value: "madvdontneed=1"
            - name: GOGC
              value: "50"

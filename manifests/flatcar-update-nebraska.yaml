# Nebraska Flatcar update server.
# Reachable from nodes at http://192.168.1.102:30802
# Packages stored on a local-path PVC at /packages inside the pod.
# auth-mode=noop: homelab, no OAuth required.
# host-flatcar-packages: Nebraska serves .bin.bz2 files directly.
# syncer disabled: we push custom builds; never pull from upstream channels.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nebraska-packages-ghost
  namespace: flatcar-update
  labels:
    app.kubernetes.io/part-of: lab
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebraska
  namespace: flatcar-update
  labels:
    app: nebraska
    app.kubernetes.io/part-of: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nebraska
  template:
    metadata:
      labels:
        app: nebraska
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      containers:
        - name: nebraska
          image: ghcr.io/flatcar/nebraska:latest
          command: ["/nebraska/nebraska"]
          args:
            - "-auth-mode=noop"
            - "-host-flatcar-packages"
            - "-flatcar-packages-path=/packages"
            - "-nebraska-url=http://192.168.1.102:30802"
            - "-port=8000"
          env:
            - name: NEBRASKA_DB_URL
              valueFrom:
                secretKeyRef:
                  name: nebraska-db-secret
                  key: url
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: packages
              mountPath: /packages
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: packages
          persistentVolumeClaim:
            claimName: nebraska-packages-ghost
---
apiVersion: v1
kind: Service
metadata:
  name: nebraska
  namespace: flatcar-update
  labels:
    app.kubernetes.io/part-of: lab
spec:
  type: NodePort
  selector:
    app: nebraska
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30802

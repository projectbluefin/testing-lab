apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgpt-runner
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8sgpt-runner-read
  labels:
    app.kubernetes.io/part-of: testing-lab
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8sgpt-runner-read
  labels:
    app.kubernetes.io/part-of: testing-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8sgpt-runner-read
subjects:
  - kind: ServiceAccount
    name: k8sgpt-runner
    namespace: argo

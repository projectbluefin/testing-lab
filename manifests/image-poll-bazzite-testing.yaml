# CronWorkflow: polls ghcr.io/ublue-os/bazzite:testing hourly.
# Triggers bluefin-qa-pipeline (system suite only — bazzite uses KDE)
# only when OCI digest changes vs ConfigMap state.
# Replaces nightly-bazzite (time-based) with digest-triggered polling.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: image-poll-bazzite-testing
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
    bluefin.io/trigger: digest-poll
spec:
  schedules:
    - "5 */3 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    workflowTemplateRef:
      name: image-poller
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/ublue-os/bazzite"
        - name: image-tag
          value: "testing"
        - name: containerdisk-tag
          value: "bazzite-testing"
        - name: state-key
          value: "digest-bazzite-testing"
        - name: namespace
          value: "bazzite-test"
        - name: suites
          value: "system"
        - name: vm-memory
          value: "8Gi"
        - name: variant
          value: "bazzite"

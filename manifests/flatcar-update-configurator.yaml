# Writes /etc/flatcar/update.conf on every Flatcar node so update_engine
# checks Nebraska instead of the upstream Flatcar update servers.
# Runs on all nodes; non-Flatcar nodes exit silently (hourly recheck).
# Rechecks hourly and rewrites if the config drifts.
#
# Flatcar-specific:
#   /etc/os-release is a symlink -> /usr/lib/os-release (mount both)
#   /etc is overlayfs; direct hostPath writes fail — enter host mount ns via nsenter
#   update_engine re-reads update.conf on SIGHUP without needing the IPC namespace
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flatcar-update-configurator
  namespace: flatcar-update
  labels:
    app: flatcar-update-configurator
    app.kubernetes.io/part-of: testing-lab
spec:
  selector:
    matchLabels:
      app: flatcar-update-configurator
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: flatcar-update-configurator
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: configurator
          image: cgr.dev/chainguard/wolfi-base:latest
          securityContext:
            privileged: true
            seccompProfile:
              type: Unconfined
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                if ! grep -q 'ID=flatcar' /host/usr/lib/os-release 2>/dev/null; then
                  sleep 3600
                  continue
                fi
                DESIRED_SERVER="http://192.168.1.102:30802/v1/update/"
                CURRENT=$(nsenter --target 1 --mount -- \
                  sh -c 'cat /etc/flatcar/update.conf 2>/dev/null || echo ""')
                if ! echo "$CURRENT" | grep -qF "$DESIRED_SERVER"; then
                  nsenter --target 1 --mount -- sh -c "
                    mkdir -p /etc/flatcar
                    printf 'GROUP=stable\nSERVER=%s\n' '$DESIRED_SERVER' \
                      > /etc/flatcar/update.conf
                  "
                  UPDATE_ENGINE_PID=$(nsenter --target 1 --mount -- \
                    sh -c 'pgrep update_engine 2>/dev/null || echo ""')
                  [ -n "$UPDATE_ENGINE_PID" ] && \
                    kill -HUP "$UPDATE_ENGINE_PID" 2>/dev/null || true
                  echo "$(date -u): configured update.conf -> $DESIRED_SERVER"
                fi
                sleep 3600
              done
          volumeMounts:
            - name: host-usr-lib
              mountPath: /host/usr/lib
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: host-usr-lib
          hostPath:
            path: /usr/lib

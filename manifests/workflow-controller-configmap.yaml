# Patch workflow-controller-configmap with workflow retention defaults and
# anti-spam limits. ServerSideApply (configured in testing-lab-infra Application)
# merges only the keys defined here — Helm-owned keys are left intact.
#
# Anti-spam rationale (added 2026-06-22, updated 2026-06-23):
#   A rogue agent submitting workflows in a tight loop previously saturated the
#   cluster. The following limits bound the blast radius without affecting normal
#   nightly and ad-hoc test runs:
#
#   parallelism / namespaceParallelism — soft ceiling, set high so Argo is not
#     the bottleneck. Real backpressure comes from Kubernetes pod scheduling:
#     each VM pod requests 8 Gi RAM; ghost (64 GB) + bazzite (30 GB) = ~94 GB,
#     so the scheduler naturally queues pods beyond ~11 concurrent VM runs.
#     The Argo cap is a last-resort anti-spam guard against runaway agents, not
#     a capacity knob. 50 is unreachable in practice given node RAM limits.
#
#   resourceRateLimit — token-bucket throttle on how fast the controller
#     creates k8s resources (pods, PVCs) across all running workflows. Prevents
#     a single burst from exhausting the API server or scheduler. This is the
#     primary defence against the 9000-pod incident; the parallelism cap is not.
#
#   workflowDefaults.spec.activeDeadlineSeconds — hard 2-hour kill on any
#     workflow that has not completed. The longest legitimate pipeline
#     (BIB build + boot + full test suite) finishes in ~25 min; 2 h is a
#     generous buffer that still kills truly stuck or runaway workflows.
#
#   workflowDefaults.spec.parallelism — cap on concurrent nodes (pods) within
#     a single workflow. Normal pipelines have at most 3–4 parallel nodes.
#
#   podGC + orphan-pod-gc CronWorkflow — the real guards against pod
#     accumulation. The parallelism cap does not prevent orphaned pods.
#
# workflowDefaults TTL: 7 days for success, 30 days for failure — lets agents
# answer "did the last 10 runs pass?" without a separate archive database.
apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-controller-configmap
  namespace: argo
data:
  # Parallelism: no global cap — Kubernetes pod scheduling is the real
  # backpressure. Pod resource requests (8 Gi per VM) mean nodes fill up
  # naturally and the scheduler queues pods. Removing this key lets Argo
  # start all submitted workflows immediately; the cluster self-limits.

  # Token-bucket rate limit on k8s resource creation by the controller.
  # limit: 10 ops/s, burst: 10 — allows a fresh workflow to spin up its
  # first batch of pods promptly, then throttles sustained creation.
  resourceRateLimit: |
    limit: 10
    burst: 10

  workflowDefaults: |
    spec:
      # Hard kill after 2 hours. Prevents stuck/runaway workflows from
      # holding cluster resources indefinitely.
      activeDeadlineSeconds: 7200
      # Max parallel nodes within a single workflow. Normal pipelines use 3–4.
      parallelism: 10
      ttlStrategy:
        secondsAfterCompletion: 604800
        secondsAfterSuccess: 604800
        secondsAfterFailure: 2592000
      # OnWorkflowCompletion keeps all pods until the workflow finishes,
      # preserving logs for debugging failed steps.
      podGC:
        strategy: OnWorkflowSuccess
  # ── argoexec sidecar resource cap ─────────────────────────────────────────
  # argoexec runs in every workflow pod. Without limits it inherits node
  # allocatable, inflating scheduler resource accounting. Generous limits —
  # argoexec only does artifact I/O and parameter passing.
  executor: |
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # ── metrics TTL — evict stale label sets from prometheus registry ──────────
  metricsConfig: |
    enabled: true
    metricsTTL: "10m"

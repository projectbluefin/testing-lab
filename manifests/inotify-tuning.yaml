apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: inotify-tuning
  namespace: kube-system
  labels:
    app.kubernetes.io/name: inotify-tuning
    app.kubernetes.io/component: node-tuning
    app.kubernetes.io/part-of: bluefin-test-suite
  annotations:
    bluefin.io/description: |
      Raises fs.inotify.max_user_watches and fs.inotify.max_user_instances on
      every node. KubeVirt virt-handler, containerd, and podman all consume
      inotify watches; exhaustion causes VM boot failures and container errors.
      The init container applies the sysctl (persists until next boot), then the
      main container sleeps so the DaemonSet pod stays Running (required for
      DaemonSet health tracking).
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inotify-tuning
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inotify-tuning
        app.kubernetes.io/component: node-tuning
        app.kubernetes.io/part-of: bluefin-test-suite
    spec:
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      initContainers:
        - name: set-inotify
          image: registry.access.redhat.com/ubi9/ubi-minimal:9.5
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              echo 1048576 > /proc/sys/fs/inotify/max_user_watches
              echo 512 > /proc/sys/fs/inotify/max_user_instances
              echo 16384 > /proc/sys/fs/inotify/max_queued_events
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
      terminationGracePeriodSeconds: 5

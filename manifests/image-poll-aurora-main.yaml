# CronWorkflow: polls ghcr.io/ublue-os/aurora:latest every 3 hours.
# Triggers bluefin-qa-pipeline only when OCI digest changes vs ConfigMap state.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: image-poll-aurora-main
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
    bluefin.io/trigger: digest-poll
spec:
  schedules:
    - "22 */3 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    workflowTemplateRef:
      name: image-poller
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/ublue-os/aurora"
        - name: image-tag
          value: "latest"
        - name: state-key
          value: "digest-aurora-main"
        - name: namespace
          value: "aurora-test"
        - name: suites
          value: "system"
        - name: vm-memory
          value: "8Gi"
        - name: variant
          value: "aurora"
        - name: containerdisk-tag
          value: "aurora-main"

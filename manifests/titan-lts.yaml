# Persistent titan VM for fast LTS smoke test iteration (no BIB build needed).
# Disk: /var/home/jorge/VMs/titans/image/disk.raw on ghost.
# SSH: bluefin-test@<pod-ip>, key from bluefin-test-ssh-key secret in argo namespace.
# Current IP: 10.42.0.26 (resolve via: kubectl get vmi titan-lts -n bluefin-lts-test -o jsonpath='{.status.interfaces[0].ipAddress}')
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: titan-lts
  namespace: bluefin-lts-test
  labels:
    app: titan-lts
    app.kubernetes.io/part-of: testing-lab
    bluefin.io/variant: lts
    bluefin.io/role: titan
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: titan-lts
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      domain:
        cpu:
          cores: 4
        memory:
          guest: 8Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
              bootOrder: 1
          interfaces:
            - name: default
              masquerade: {}
        machine:
          type: q35
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          hostDisk:
            path: /var/home/jorge/VMs/titans/image/disk.raw
            type: Disk

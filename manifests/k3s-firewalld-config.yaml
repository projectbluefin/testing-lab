apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k3s-firewalld-config
  namespace: kube-system
  labels:
    app.kubernetes.io/name: k3s-firewalld-config
    app.kubernetes.io/component: node-tuning
    app.kubernetes.io/part-of: bluefin-test-suite
  annotations:
    bluefin.io/description: |
      Disables firewalld on every node. This is a homelab QA cluster —
      firewalld blocks pod-to-pod cross-node traffic and causes SSH failures
      into KubeVirt VMs from workflow pods on other nodes.
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k3s-firewalld-config
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k3s-firewalld-config
        app.kubernetes.io/component: node-tuning
        app.kubernetes.io/part-of: bluefin-test-suite
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      hostPID: true
      initContainers:
        - name: configure-firewalld
          image: quay.io/fedora/fedora:latest
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              # Run firewall-cmd in the host mount namespace via nsenter.
              # If firewalld is not active (e.g. ghost, exo-1 run no firewall)
              # firewall-cmd exits non-zero; we treat that as a no-op.
              nsenter -t 1 -m -- systemctl disable --now firewalld 2>/dev/null \
                && echo "firewalld disabled" \
                || echo "firewalld not present, skipping"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
      terminationGracePeriodSeconds: 5

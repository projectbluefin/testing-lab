# CronWorkflow: GC for stale containerDisk staging files on ghost's data disk.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: golden-disk-gc
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  schedules:
    - "0 4 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: testing-lab
  workflowSpec:
    serviceAccountName: argo
    entrypoint: gc
    arguments:
      parameters:
        - name: dry-run
          value: "false"   # was "true" — GC was never actually deleting anything
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterCompletion: 86400
    volumes:
      - name: cd-staging
        hostPath:
          path: /var/mnt/ghost-data/bluefin-cd-build
          type: DirectoryOrCreate
    templates:
      - name: gc
        inputs:
          parameters:
            - name: dry-run
        nodeSelector:
          kubernetes.io/hostname: ghost
        script:
          image: registry.access.redhat.com/ubi9/ubi-minimal:9.5
          command: [sh]
          env:
            - name: DRY_RUN
              value: "{{inputs.parameters.dry-run}}"
          securityContext:
            privileged: true
          volumeMounts:
            - name: cd-staging
              mountPath: /host/bluefin-cd-build
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          source: |
            set -eu

            ROOT="/host/bluefin-cd-build"
            RETENTION_HOURS=24
            NOW="$(date -u +%s)"
            CUTOFF="$((NOW - RETENTION_HOURS * 3600))"

            if [ "${DRY_RUN}" != "true" ] && [ "${DRY_RUN}" != "false" ]; then
              echo "ERROR: dry-run must be true or false, got '${DRY_RUN}'" >&2
              exit 1
            fi

            echo "containerdisk-staging-gc: dry-run=${DRY_RUN} root=${ROOT} retention=${RETENTION_HOURS}h"
            echo "free space before:"
            df -h "${ROOT}" || true

            if [ ! -d "${ROOT}" ]; then
              echo "Staging root does not exist; nothing to do."
              exit 0
            fi

            # Clean up leftover staging files (disk.raw, containerdisk.qcow2) older than retention
            find "${ROOT}" -type f \( -name 'disk.raw' -o -name 'containerdisk.qcow2' \) 2>/dev/null | while IFS= read -r stale; do
              mtime="$(stat -c %Y "${stale}")"
              age_h="$(((NOW - mtime) / 3600))"
              if [ "${mtime}" -lt "${CUTOFF}" ]; then
                size="$(du -sh "${stale}" 2>/dev/null | awk '{print $1}' || echo "unknown")"
                if [ "${DRY_RUN}" = "true" ]; then
                  echo "WOULD_DELETE size=${size} age=${age_h}h path=${stale}"
                else
                  rm -f -- "${stale}"
                  echo "DELETED size=${size} age=${age_h}h path=${stale}"
                fi
              else
                echo "KEEP age=${age_h}h path=${stale}"
              fi
            done

            echo "free space after:"
            df -h "${ROOT}" || true
            echo "containerdisk-staging-gc complete."

# CronWorkflow: dry-run GC for stale Bluefin golden disks on ghost.
# Keeps the newest disk.raw per tag and any disk.raw modified in the last 14 days.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: golden-disk-gc
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  schedules:
    - "0 4 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: testing-lab
  workflowSpec:
    serviceAccountName: argo
    entrypoint: gc
    arguments:
      parameters:
        - name: dry-run
          value: "false"   # was "true" — GC was never actually deleting anything
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterCompletion: 86400
    volumes:
      - name: golden-disks
        hostPath:
          path: /var/tmp/bluefin-golden
          type: DirectoryOrCreate
    templates:
      - name: gc
        inputs:
          parameters:
            - name: dry-run
        nodeSelector:
          kubernetes.io/hostname: ghost
        script:
          image: registry.access.redhat.com/ubi9/ubi-minimal:9.5
          command: [sh]
          env:
            - name: DRY_RUN
              value: "{{inputs.parameters.dry-run}}"
          securityContext:
            privileged: true
          volumeMounts:
            - name: golden-disks
              mountPath: /host/bluefin-golden
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          source: |
            set -eu

            ROOT="/host/bluefin-golden"
            RETENTION_DAYS=14
            NOW="$(date -u +%s)"
            CUTOFF="$((NOW - RETENTION_DAYS * 24 * 60 * 60))"

            if [ "${DRY_RUN}" != "true" ] && [ "${DRY_RUN}" != "false" ]; then
              echo "ERROR: dry-run must be true or false, got '${DRY_RUN}'" >&2
              exit 1
            fi

            echo "golden-disk-gc start: dry-run=${DRY_RUN} root=${ROOT} retention=${RETENTION_DAYS}d"
            echo "free space before:"
            df -h "${ROOT}" || true

            size_of() {
              du -sh "$1" 2>/dev/null | awk '{print $1}' || echo "unknown"
            }

            delete_path() {
              path="$1"
              reason="$2"
              size="$(size_of "${path}")"
              if [ "${DRY_RUN}" = "true" ]; then
                echo "WOULD_DELETE size=${size} reason=${reason} path=${path}"
              else
                rm -f -- "${path}"
                echo "DELETED size=${size} reason=${reason} path=${path}"
              fi
            }

            keep_path() {
              path="$1"
              reason="$2"
              size="$(size_of "${path}")"
              echo "KEEP size=${size} reason=${reason} path=${path}"
            }

            if [ ! -d "${ROOT}" ]; then
              echo "Golden disk root does not exist; nothing to do."
              exit 0
            fi

            find "${ROOT}" -mindepth 1 -maxdepth 1 -type d | sort | while IFS= read -r tag_dir; do
              tag="$(basename "${tag_dir}")"
              echo "checking tag=${tag} dir=${tag_dir}"

              newest_disk="$({
                find "${tag_dir}" -type f -name 'disk.raw' 2>/dev/null | while IFS= read -r disk; do
                  mtime="$(stat -c %Y "${disk}")"
                  printf '%s %s\n' "${mtime}" "${disk}"
                done
              } | sort -nr | head -n 1 | cut -d ' ' -f 2-)"

              find "${tag_dir}" -type f -name 'disk.raw' 2>/dev/null | sort | while IFS= read -r disk; do
                mtime="$(stat -c %Y "${disk}")"
                age_days="$(((NOW - mtime) / 86400))"
                if [ "${disk}" = "${newest_disk}" ]; then
                  keep_path "${disk}" "newest-disk.raw-for-${tag}"
                elif [ "${mtime}" -ge "${CUTOFF}" ]; then
                  keep_path "${disk}" "recent-${age_days}d-old"
                else
                  delete_path "${disk}" "stale-${age_days}d-old"
                fi
              done
            done

            find "${ROOT}" -type f \( -name '*.tmp' -o -name '*.staging' -o -name '.tmp' -o -name '.staging' \) 2>/dev/null | sort | while IFS= read -r stray; do
              delete_path "${stray}" "stray-temp-file"
            done

            echo "free space after:"
            df -h "${ROOT}" || true
            echo "golden-disk-gc complete."

# Gateway API Inference Extension CRDs — required by llm-d router.
#
# Installs InferencePool and InferenceModel CRDs from the upstream release.
# Runs as an ArgoCD PreSync Job so CRDs land before any llm-d resources are applied.
#
# Release: v1.5.0 (2026-04-19)
# https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/tag/v1.5.0
#
# To upgrade: bump the tag in the URL and the annotation below.
# Idempotent — kubectl apply is safe to re-run.
apiVersion: batch/v1
kind: Job
metadata:
  name: install-gaie-crds
  namespace: argo
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: ghost
      serviceAccountName: argo
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: registry.k8s.io/kubectl:v1.32.0
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
            - apply
            - --server-side
            - -f
            - https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/download/v1.5.0/v1-manifests.yaml
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

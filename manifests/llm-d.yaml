# llm-d model server — llama.cpp server on ROCm, pinned to ghost (Strix Halo / gfx1151).
#
# Stack: ghcr.io/ggml-org/llama.cpp:server-rocm (llama-server, HIP/ROCm backend)
# Model: batiai/Qwen3.6-35B-A3B-GGUF Q4_K_M (~21GB GGUF).
#   BF16 native weights (~67GB) exceed ghost's 64GB unified memory.
#   vLLM rejected: qwen35moe architecture unsupported in vLLM's GGUF loader.
#   Q4_K_M fits in ~21GB, leaving ~40GB headroom for KV cache + system.
#
# Required env vars for gfx1151 (RDNA 3.5 — NOT RDNA 4):
#   HSA_OVERRIDE_GFX_VERSION=11.5.1  — makes ROCm accept gfx1151
#   HSA_XNACK=1                      — enables unified memory / page-fault retry
#   HSA_FORCE_FINE_GRAIN_PCIE=1      — fine-grained virtual memory (UMA benefit)
#   ROCBLAS_USE_HIPBLASLT=1          — faster matmul via hipBLASlt (strixhalo.wiki)
#
# hostNetwork + hostIPC: required for ROCm IPC/shared memory.
# GGUF cache: HostPath at /var/tmp/llm-models on ghost.
#   Init container downloads Q4_K_M on first start (idempotent check).
#
# NodePort 30800: OpenAI-compatible API endpoint.
#   curl http://192.168.1.102:30800/v1/models
---
apiVersion: v1
kind: Namespace
metadata:
  name: llm-d
  labels:
    app.kubernetes.io/part-of: testing-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-modelserver
  namespace: llm-d
  labels:
    app.kubernetes.io/name: llm-d-modelserver
    app.kubernetes.io/part-of: testing-lab
    llm-d.ai/model: Qwen3.6-35B-A3B
    llm-d.ai/accelerator-vendor: amd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-d-modelserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-d-modelserver
        llm-d.ai/model: Qwen3.6-35B-A3B
    spec:
      # Pinned to ghost — only node with AMD Strix Halo GPU.
      nodeSelector:
        kubernetes.io/hostname: ghost
      # Required for ROCm IPC and shared memory across processes.
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        # render group (44) — required for /dev/dri access.
        fsGroup: 44
        seccompProfile:
          type: Unconfined
      # Init container downloads the GGUF file if not already present.
      # --gguf-filename is not supported by this vLLM build; we download to
      # the hostPath volume and pass the local path to vllm serve instead.
      initContainers:
        - name: download-gguf
          image: docker.io/alpine:3
          command: ["sh", "-c"]
          args:
            - |
              DEST=/models/Qwen3.6-35B-A3B-Q4_K_M.gguf
              if [ -f "$DEST" ]; then
                echo "GGUF already present, skipping download"
                exit 0
              fi
              echo "Downloading Q4_K_M GGUF (~21GB)..."
              apk add --no-cache wget
              wget -q --show-progress -O "${DEST}.tmp" \
                "https://huggingface.co/batiai/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen-Qwen3.6-35B-A3B-Q4_K_M.gguf"
              mv "${DEST}.tmp" "$DEST"
              echo "Download complete."
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: "1"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 512Mi
      containers:
        - name: modelserver
          image: ghcr.io/ggml-org/llama.cpp:server-rocm
          imagePullPolicy: IfNotPresent
          command: ["/app/llama-server"]
          args:
            - "--model"
            - "/models/Qwen3.6-35B-A3B-Q4_K_M.gguf"
            - "--alias"
            - "Qwen/Qwen3.6-35B-A3B"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--ctx-size"
            - "32768"
            - "-ngl"
            - "99"
            - "--threads"
            - "8"
            - "--parallel"
            - "4"
            - "--log-disable"
          env:
            # gfx1151 (RDNA 3.5 / Strix Halo) runtime overrides.
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "11.5.1"
            - name: HSA_XNACK
              value: "1"
            - name: HSA_FORCE_FINE_GRAIN_PCIE
              value: "1"
            # hipBLASlt for faster matmul on gfx1151 (strixhalo.wiki).
            - name: ROCBLAS_USE_HIPBLASLT
              value: "1"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
          resources:
            requests:
              cpu: "8"
              memory: 32Gi
              amd.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 48Gi
              amd.com/gpu: "1"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: models
              mountPath: /models
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            # Up to 10 min for model load from hostPath.
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: models
          hostPath:
            path: /var/tmp/llm-models
            type: DirectoryOrCreate
---
# NodePort service — OpenAI-compatible API reachable at:
#   http://192.168.1.102:30800/v1/chat/completions
#   http://192.168.1.102:30800/v1/models
# hostNetwork: true means the pod is already on host networking,
# but we still register a Service for in-cluster consumers (hive agents, Argo pods).
apiVersion: v1
kind: Service
metadata:
  name: llm-d-modelserver
  namespace: llm-d
  labels:
    app.kubernetes.io/name: llm-d-modelserver
    app.kubernetes.io/part-of: testing-lab
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: llm-d-modelserver
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800
      protocol: TCP

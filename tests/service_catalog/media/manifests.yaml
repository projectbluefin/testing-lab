---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-config
  labels:
    app.kubernetes.io/name: media-service
    app.kubernetes.io/component: config
    bluefin.io/lane: svc-media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-data
  labels:
    app.kubernetes.io/name: media-service
    app.kubernetes.io/component: data
    bluefin.io/lane: svc-media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  labels:
    app.kubernetes.io/name: media-service
    bluefin.io/lane: svc-media
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: media-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-service
        bluefin.io/lane: svc-media
    spec:
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:latest
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data/media
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: media-config
        - name: data
          persistentVolumeClaim:
            claimName: media-data
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  labels:
    app.kubernetes.io/name: media-service
    bluefin.io/lane: svc-media
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: media-service
  ports:
    - name: http
      port: 8096
      targetPort: http
      protocol: TCP

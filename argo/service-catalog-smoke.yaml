apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: svc-catalog-
  namespace: argo
spec:
  serviceAccountName: argo
  workflowTemplateRef:
    name: service-catalog-pipeline
  arguments:
    parameters:
      - name: lane
        value: "media"
      - name: image-tag
        value: "latest"
      - name: branch
        value: "main"

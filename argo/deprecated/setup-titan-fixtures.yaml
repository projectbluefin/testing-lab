apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: setup-titan-fixtures
  namespace: argo
  annotations:
    description: |
      One-time fixture setup for persistent titan VMs.
      Installs Firefox Flatpak at system scope and registers it as the
      default web browser so xdg-settings smoke scenarios can run.
      Safe to re-run: all steps are idempotent.
spec:
  serviceAccountName: argo
  templates:
    - name: setup-titan-fixtures
      inputs:
        parameters:
          - name: vm-ip
          - name: ssh-user
            value: "bluefin-test"
          - name: ssh-key-secret
            value: "bluefin-test-ssh-key"
          - name: variant
            value: "latest"
      activeDeadlineSeconds: 1800
      podSpecPatch: |
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        securityContext:
          runAsUser: 0
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: ssh-key
          secret:
            secretName: "{{inputs.parameters.ssh-key-secret}}"
            defaultMode: 0400
      script:
        image: quay.io/fedora/fedora:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        env:
          - name: VM_IP
            value: "{{inputs.parameters.vm-ip}}"
          - name: VM_USER
            value: "{{inputs.parameters.ssh-user}}"
          - name: SSH_KEY
            value: /etc/ssh/test-key/id_ed25519
        volumeMounts:
          - name: ssh-key
            mountPath: /etc/ssh/test-key
            readOnly: true
        command: [bash]
        source: |
          set -euo pipefail

          if ! command -v ssh &>/dev/null; then
            dnf install -y --quiet openssh-clients 2>&1 | tail -2
          fi

          SSH_OPTS="-i ${SSH_KEY} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o LogLevel=ERROR"
          SSH="ssh ${SSH_OPTS} ${VM_USER}@${VM_IP}"

          echo "Waiting for SSH on ${VM_IP}..." >&2
          timeout 300 bash -c "until ${SSH} 'echo ready' 2>/dev/null; do sleep 10; done"
          echo "SSH ready." >&2

          echo "Installing Firefox Flatpak at system scope..." >&2
          ${SSH} "
            set -euo pipefail

            # Ensure Flathub remote is configured at system scope
            if ! sudo flatpak remote-list --system 2>/dev/null | grep -q flathub; then
              echo 'Adding Flathub remote (system)...' >&2
              sudo flatpak remote-add --system --if-not-exists flathub \
                https://dl.flathub.org/repo/flathub.flatpakrepo
            fi

            # Install Firefox if not already present
            if sudo flatpak list --system --app 2>/dev/null | grep -q 'org.mozilla.firefox'; then
              echo 'Firefox Flatpak already installed at system scope.' >&2
            else
              echo 'Installing Firefox Flatpak...' >&2
              sudo flatpak install --system --noninteractive flathub org.mozilla.firefox
            fi

            # Register Firefox as the system-wide default browser
            # /etc/xdg/mimeapps.list is read by xdg-settings and xdg-mime as
            # the system-level MIME association before checking user overrides.
            sudo mkdir -p /etc/xdg
            if ! sudo grep -q 'org.mozilla.firefox.desktop' /etc/xdg/mimeapps.list 2>/dev/null; then
              echo 'Writing system MIME default for Firefox...' >&2
              sudo tee /etc/xdg/mimeapps.list > /dev/null << 'MIME'
          [Default Applications]
          x-scheme-handler/http=org.mozilla.firefox.desktop
          x-scheme-handler/https=org.mozilla.firefox.desktop
          text/html=org.mozilla.firefox.desktop
          MIME
            else
              echo '/etc/xdg/mimeapps.list already has Firefox entry.' >&2
            fi

            echo 'Verifying xdg-settings...' >&2
            result=\$(xdg-settings get default-web-browser 2>/dev/null || true)
            echo \"xdg-settings default-web-browser: \${result:-<empty>}\" >&2
            result2=\$(xdg-mime query default x-scheme-handler/http 2>/dev/null || true)
            echo \"xdg-mime default http: \${result2:-<empty>}\" >&2

            echo 'Titan fixture setup complete.' >&2
          "

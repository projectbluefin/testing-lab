apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-qa-pipeline
  namespace: argo
  annotations:
    description: |
      End-to-end Dakota QA pipeline: BST validate → BST build+export+push →
      build-containerdisk → provision (containerDisk VM) → run-tests → teardown.

      Flow:
        1. bst-validate          — fast element graph check (no build)
        2. bst-build-export-push — BST build, export to containers-storage,
                                   push to 192.168.1.102:30500/dakota:<tag>
        3. build-containerdisk   — install bootc image to disk, configure, convert
                                   to qcow2, push to Zot as containerDisk OCI image
        4. provision             — KubeVirt VM boot from containerDisk
        5. run-tests             — behave/dogtail smoke suite
        6. teardown (onExit)     — VM delete (no disk cleanup needed)

      All heavy build steps (BST, disk build) are serialised by the ghost-heavy-compute
      mutex so concurrent pipelines queue rather than race on ghost storage.
  labels:
    app.kubernetes.io/component: qa-pipeline
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo

  entrypoint: pipeline

  # Cleanup VM + hostDisk on any exit (success, failure, timeout)
  onExit: teardown

  arguments:
    parameters:
      - name: ref_type
        value: "branch"    # branch | pr | sha
      - name: ref_value
        value: "main"
      - name: repo
        value: "https://github.com/projectbluefin/dakota"
      - name: variant
        value: "default"   # default | nvidia
      - name: namespace
        value: "bluefin-test"
      # Comma-separated test suite names matching tests/ subdirectories
      - name: suites
        value: "smoke"
      - name: ssh-key-secret
        value: "bluefin-test-ssh-key"
      # git ref for the testing-lab repo (test code + step defs)
      - name: tests-branch
        value: "main"

  templates:

    - name: pipeline
      dag:
        tasks:
          # 0. Resolve ref_type + ref_value → clone_url + clone_ref
          - name: resolve-source
            templateRef:
              name: dakota-bst
              template: resolve-source
            arguments:
              parameters:
                - name: ref_type
                  value: "{{workflow.parameters.ref_type}}"
                - name: ref_value
                  value: "{{workflow.parameters.ref_value}}"
                - name: repo
                  value: "{{workflow.parameters.repo}}"

          # 1. Fast BST element graph check — no build
          - name: bst-validate
            depends: "resolve-source.Succeeded"
            templateRef:
              name: dakota-bst
              template: bst-validate
            arguments:
              parameters:
                - name: clone_url
                  value: "{{tasks.resolve-source.outputs.parameters.clone_url}}"
                - name: clone_ref
                  value: "{{tasks.resolve-source.outputs.parameters.clone_ref}}"

          # 2. BST build → OCI export → push to cluster zot
          - name: bst-build-export-push
            depends: "bst-validate.Succeeded"
            templateRef:
              name: dakota-bst
              template: bst-build-export-push
            arguments:
              parameters:
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: clone_url
                  value: "{{tasks.resolve-source.outputs.parameters.clone_url}}"
                - name: clone_ref
                  value: "{{tasks.resolve-source.outputs.parameters.clone_ref}}"

          # 3. Build containerDisk OCI image from the BST-pushed zot image
          - name: build-cd
            depends: "bst-build-export-push.Succeeded"
            templateRef:
              name: build-containerdisk
              template: build-containerdisk
            arguments:
              parameters:
                - name: image
                  value: "{{tasks.bst-build-export-push.outputs.parameters.image-ref}}"
                - name: image-tag
                  value: "{{workflow.parameters.variant}}"
                - name: containerdisk-tag
                  value: "dakota-{{workflow.parameters.variant}}"

          # 4. KubeVirt VM boot from containerDisk
          - name: provision
            depends: "build-cd.Succeeded"
            templateRef:
              name: provision-bluefin-vm
              template: provision-vm
            arguments:
              parameters:
                - name: image-tag
                  value: "dakota-{{workflow.parameters.variant}}"
                - name: vm-name
                  value: "dakota-test-{{workflow.uid}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"

          # 5. Run smoke test suite against the provisioned Dakota VM
          - name: run-smoke
            depends: "provision.Succeeded"
            when: "'{{workflow.parameters.suites}}' =~ 'smoke'"
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{tasks.provision.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "smoke"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{workflow.parameters.tests-branch}}"

    # ── onExit handler ──────────────────────────────────────────────────────
    - name: teardown
      dag:
        tasks:
          - name: teardown-vm
            templateRef:
              name: teardown-bluefin-vm
              template: teardown-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "dakota-test-{{workflow.uid}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"

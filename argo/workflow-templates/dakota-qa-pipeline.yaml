apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-qa-pipeline
  namespace: argo
  annotations:
    description: |
      End-to-end Dakota QA pipeline: assert containerDisk exists in Zot, then run
      parallel test lanes (smoke, developer, system). Each lane provisions a
      fresh KubeVirt VM, runs the behave/qecore suite via SSH, and tears down
      the VM on completion. On PR runs, posts a GitHub commit status on exit.
      The digest-watch CronWorkflow keeps the containerDisk current — this
      pipeline fails fast if the disk is missing.
  labels:
    app.kubernetes.io/component: qa-pipeline
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # VM concurrency is managed by k8s scheduler via virt-launcher pod memory
  # requests (8Gi/VM). Pending workflows queue as Pending VMIs — no semaphore needed.
  activeDeadlineSeconds: 3600
  entrypoint: pipeline
  onExit: cleanup-and-report

  arguments:
    parameters:
      - name: image
        value: "ghcr.io/projectbluefin/dakota"
      - name: image-tag
        value: "latest"
      - name: namespace
        value: "bluefin-test"
      - name: suites
        value: "smoke,developer,system"
      - name: variant
        value: "dakota"
      - name: ssh-key-secret
        value: "bluefin-test-ssh-key"
      - name: containerdisk-tag
        value: "dakota-latest"
      - name: branch
        value: "main"
      - name: pr-number
        value: ""
      - name: sha
        value: ""
      - name: repo
        value: ""
      - name: vm-memory
        value: "8Gi"

  templates:

    - name: pipeline
      dag:
        tasks:
          # 1. Assert the containerDisk exists in local Zot registry — fails fast if not.
          - name: assert-cd
            template: assert-cd
            arguments:
              parameters:
                - name: containerdisk-tag
                  value: "{{workflow.parameters.containerdisk-tag}}"

          # 2. Parallel test lanes — each lane provisions its own VM, runs one suite, tears down
          - name: test-lane
            depends: "assert-cd.Succeeded"
            withItems:
              - smoke
              - developer
              - system
            when: "'{{workflow.parameters.suites}}' =~ '{{item}}'"
            template: lane
            arguments:
              parameters:
                - name: suite
                  value: "{{item}}"
                - name: vm-name
                  value: "{{workflow.name}}-{{item}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{workflow.parameters.containerdisk-tag}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: vm-memory
                  value: "{{workflow.parameters.vm-memory}}"

    # ── assert-cd: fail fast if containerDisk is missing from Zot ───────────
    - name: assert-cd
      inputs:
        parameters:
          - name: containerdisk-tag
      script:
        image: quay.io/skopeo/stable:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.containerdisk-tag}}"
          CD_IMAGE="192.168.1.102:30500/bluefin-containerdisk:${TAG}"
          DIGEST=$(skopeo inspect --tls-verify=false --format '{{.Digest}}' \
            "docker://${CD_IMAGE}" 2>/dev/null || echo "")
          if [[ -n "${DIGEST}" ]]; then
            echo "containerdisk ${CD_IMAGE} ready: ${DIGEST}"
          else
            echo "ERROR: containerdisk ${CD_IMAGE} not found in Zot" >&2
            echo "The digest-watch CronWorkflow builds it when GHCR changes." >&2
            echo "Check: argo list -n argo --field-selector metadata.name=~build-cd-sync" >&2
            exit 1
          fi

    # ── lane: provision VM → run suite → teardown (per-suite) ────────────────
    - name: lane
      inputs:
        parameters:
          - name: suite
          - name: vm-name
          - name: image-tag
          - name: containerdisk-tag
          - name: namespace
          - name: variant
          - name: ssh-key-secret
          - name: branch
          - name: vm-memory
      steps:
        - - name: provision
            templateRef:
              name: provision-bluefin-vm
              template: provision-vm
            arguments:
              parameters:
                - name: image-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
                - name: vm-memory
                  value: "{{inputs.parameters.vm-memory}}"
        - - name: run-tests
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{steps.provision.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "{{inputs.parameters.suite}}"
                - name: variant
                  value: "{{inputs.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{inputs.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{inputs.parameters.branch}}"
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"
        - - name: teardown
            templateRef:
              name: teardown-bluefin-vm
              template: teardown-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
            continueOn:
              failed: true

    # ── onExit handler: optional GitHub commit status post ───────────────────
    - name: cleanup-and-report
      dag:
        tasks:
          - name: post-status
            template: post-github-status
            when: "'{{workflow.parameters.sha}}' != ''"
          - name: update-dashboard
            template: update-factory-stats

    # ── update-factory-stats: append recent run to factory-stats.json ─────────
    - name: update-factory-stats
      script:
        image: quay.io/fedora/fedora:latest
        command: [bash]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/projectbluefin/testing-lab/contents/docs/data/factory-stats.json"
          WF_NAME="{{workflow.name}}"
          OVERALL=$([ "{{workflow.status}}" = "Succeeded" ] && echo "passed" || echo "fail")
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LABEL="dakota:{{workflow.parameters.image-tag}}"
          VARIANT="{{workflow.parameters.variant}}"

          CURRENT=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}" 2>/dev/null || echo "{}")
          FILE_SHA=$(echo "$CURRENT" | jq -r '.sha // empty')
          [[ -z "$FILE_SHA" ]] && echo "Could not fetch SHA — skipping" && exit 0

          STATS=$(echo "$CURRENT" | jq -r '.content // ""' | tr -d '\n' | base64 -d \
            | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)))" 2>/dev/null || echo "{}")

          PR_NUM="{{workflow.parameters.pr-number}}"
          TRIGGER=$([ -n "$PR_NUM" ] && echo "pr-poller" || echo "nightly")
          NEW_RUN=$(jq -nc \
            --arg id "$WF_NAME" --arg overall "$OVERALL" --arg label "$LABEL" \
            --arg variant "$VARIANT" --arg started "$NOW" --arg finished "$NOW" \
            --arg trigger "$TRIGGER" \
            '{id:$id,overall:$overall,label:$label,variant:$variant,started_at:$started,finished_at:$finished,trigger:$trigger}')

          UPDATED=$(echo "$STATS" | jq -c \
            --argjson run "$NEW_RUN" --arg now "$NOW" \
            '.recent_runs = ([$run] + (.recent_runs // []) | .[:15]) | ._meta.generated = $now')

          BODY=$(jq -nc \
            --arg msg "chore: update dashboard run data for ${WF_NAME}" \
            --arg content "$(echo "$UPDATED" | base64 -w0)" \
            --arg sha "$FILE_SHA" \
            '{message:$msg,content:$content,sha:$sha}')

          HTTP=$(curl -sf -w "%{http_code}" -o /dev/null -X PUT \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$BODY" "${API_URL}" 2>&1) || HTTP="error"
          echo "Dashboard update: ${OVERALL} for ${LABEL} (${WF_NAME}) — http=${HTTP}"

    # ── post-github-status ────────────────────────────────────────────────────
    - name: post-github-status
      script:
        image: quay.io/fedora/fedora:latest
        command: [bash]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          STATE=$([ "{{workflow.status}}" = "Succeeded" ] && echo success || echo failure)
          PAYLOAD=$(jq -n \
            --arg state "$STATE" \
            --arg ctx  "ghost-lab" \
            --arg desc "Dakota lab test $STATE" \
            --arg url  "http://192.168.1.102:32746/workflows/argo/{{workflow.name}}" \
            '{state:$state,context:$ctx,description:$desc,target_url:$url}')
          curl -sf -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/{{workflow.parameters.repo}}/statuses/{{workflow.parameters.sha}}" \
            -d "$PAYLOAD" \
          && echo "Posted $STATE to {{workflow.parameters.repo}}@{{workflow.parameters.sha}}" \
          || echo "WARNING: failed to post commit status (non-fatal)"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: teardown-gnomeos-vm
  namespace: argo
spec:
  templates:
    - name: teardown-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
            value: "gnomeos-test"
      steps:
        - - name: delete-vm
            template: delete-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"

    - name: delete-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
      resource:
        action: delete
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bluefin-service-catalog-pipeline
  namespace: argo
  labels:
    app.kubernetes.io/component: homelab-service-catalog
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  entrypoint: pipeline
  onExit: cleanup
  arguments:
    parameters:
      - name: lane
        value: "media"
      - name: branch
        value: "main"
  templates:
    - name: pipeline
      dag:
        tasks:
          - name: create-namespace
            template: create-namespace
            arguments:
              parameters:
                - name: namespace
                  value: "service-catalog-{{workflow.uid}}"
          - name: deploy-fixture
            dependencies: [create-namespace]
            template: deploy-fixture
            arguments:
              parameters:
                - name: namespace
                  value: "service-catalog-{{workflow.uid}}"
                - name: lane
                  value: "{{workflow.parameters.lane}}"
          - name: run-tests
            dependencies: [deploy-fixture]
            templateRef:
              name: run-service-tests
              template: run-service-tests
            arguments:
              parameters:
                - name: namespace
                  value: "service-catalog-{{workflow.uid}}"
                - name: suite-path
                  value: "service_catalog/{{workflow.parameters.lane}}"
                - name: lane
                  value: "{{workflow.parameters.lane}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

    - name: create-namespace
      inputs:
        parameters:
          - name: namespace
      resource:
        action: create
        manifest: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{inputs.parameters.namespace}}"
            labels:
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: service-catalog

    - name: deploy-fixture
      inputs:
        parameters:
          - name: namespace
          - name: lane
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash, -c]
        source: |
          set -euo pipefail
          NS="{{inputs.parameters.namespace}}"
          LANE="{{inputs.parameters.lane}}"
          CONTENT="${LANE}-ready"
          kubectl apply -n "${NS}" -f - <<EOF
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: service-catalog-data
            labels:
              app: service-catalog-workload
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: "${LANE}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: service-catalog-workload
            labels:
              app: service-catalog-workload
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: "${LANE}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: service-catalog-workload
            template:
              metadata:
                labels:
                  app: service-catalog-workload
                  app.kubernetes.io/part-of: bluefin-test-suite
                  bluefin.io/lane: "${LANE}"
              spec:
                containers:
                  - name: busybox-httpd
                    image: docker.io/library/busybox:1.36.1 # registry-lint-ignore
                    command:
                      - sh
                      - -c
                      - |
                        mkdir -p /data
                        if [ ! -f /data/index.html ]; then
                          echo "${CONTENT}" > /data/index.html
                        fi
                        touch /data/config.ini
                        httpd -f -p 8080 -h /data
                    ports:
                      - containerPort: 8080
                    volumeMounts:
                      - name: data
                        mountPath: /data
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: service-catalog-data
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: service-catalog
            labels:
              app: service-catalog-workload
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: "${LANE}"
          spec:
            selector:
              app: service-catalog-workload
            ports:
              - name: http
                port: 8080
                targetPort: 8080
          EOF
          kubectl rollout status deployment/service-catalog-workload -n "${NS}" --timeout=300s >&2

    - name: cleanup
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash, -c]
        source: |
          set -euo pipefail
          NS="service-catalog-{{workflow.uid}}"
          kubectl delete namespace "${NS}" --ignore-not-found=true >&2 || true
          timeout 180 bash -c "until ! kubectl get namespace \"${NS}\" >/dev/null 2>&1; do sleep 5; done" >&2 || true
          echo "cleanup-complete"

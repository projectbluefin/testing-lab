apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: image-poller
  namespace: argo
  labels:
    app.kubernetes.io/component: image-poller
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  activeDeadlineSeconds: 1800
  entrypoint: check-and-trigger
  arguments:
    parameters:
      - name: image
      - name: image-tag
      - name: state-key
      - name: namespace
        value: "bluefin-test"
      - name: suites
        value: "smoke,common,developer,software,system"
      - name: variant
        value: "bluefin"
      # Zot containerdisk tag; defaults to image-tag when not set (works for bluefin:testing → "testing")
      - name: containerdisk-tag
        value: "{{workflow.parameters.image-tag}}"
      - name: branch
        value: "main"
      - name: vm-memory
        value: "{{workflow.parameters.vm-memory}}"
      - name: ssh-key-secret
        value: "bluefin-test-ssh-key"

  templates:
    - name: check-and-trigger
      dag:
        tasks:
          - name: check-digest
            template: poll-digest
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.image}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: state-key
                  value: "{{workflow.parameters.state-key}}"
          - name: run-pipeline
            depends: "check-digest.Succeeded"
            when: "{{tasks.check-digest.outputs.parameters.changed}} == true"
            templateRef:
              name: bluefin-qa-pipeline
              template: pipeline
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.image}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{workflow.parameters.containerdisk-tag}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"
                - name: suites
                  value: "{{workflow.parameters.suites}}"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: vm-memory
                  value: "{{workflow.parameters.vm-memory}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
          - name: update-digest
            depends: "check-digest.Succeeded && run-pipeline.Succeeded"
            when: "{{tasks.check-digest.outputs.parameters.changed}} == true"
            template: update-local
            arguments:
              parameters:
                - name: state-key
                  value: "{{workflow.parameters.state-key}}"
                - name: remote-digest
                  value: "{{tasks.check-digest.outputs.parameters.remote-digest}}"
                - name: expected-digest
                  value: "{{tasks.check-digest.outputs.parameters.stored-digest}}"

    - name: poll-digest
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: state-key
      outputs:
        parameters:
          - name: changed
            valueFrom:
              parameter: "{{tasks.compare.outputs.parameters.changed}}"
          - name: remote-digest
            valueFrom:
              parameter: "{{tasks.fetch.outputs.parameters.digest}}"
          - name: stored-digest
            valueFrom:
              parameter: "{{tasks.compare.outputs.parameters.stored-digest}}"
      dag:
        tasks:
          - name: fetch
            template: fetch-remote
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"
          - name: compare
            depends: "fetch.Succeeded"
            template: compare-local
            arguments:
              parameters:
                - name: state-key
                  value: "{{inputs.parameters.state-key}}"
                - name: remote-digest
                  value: "{{tasks.fetch.outputs.parameters.digest}}"

    - name: fetch-remote
      inputs:
        parameters:
          - name: image
          - name: image-tag
      outputs:
        parameters:
          - name: digest
            valueFrom:
              path: /tmp/digest
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: fetch-digest
      script:
        image: quay.io/skopeo/stable:latest
        command: [sh]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          set -eu
          IMAGE_REF="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
          REMOTE=""
          for i in 1 2 3; do
            REMOTE=$(skopeo inspect               --no-tags               --format '{{.Digest}}'               --creds "_token:${GITHUB_TOKEN}"               "docker://${IMAGE_REF}" 2>/dev/null || true)
            [ -n "${REMOTE}" ] && break
            echo "skopeo attempt ${i}/3 failed for ${IMAGE_REF}; retrying in $(( i * 15 ))s" >&2
            sleep $(( i * 15 ))
          done

          if [ -z "${REMOTE}" ]; then
            echo "Failed to resolve digest" >&2
            echo "none" > /tmp/digest
          else
            echo "${REMOTE}" > /tmp/digest
          fi

    - name: compare-local
      inputs:
        parameters:
          - name: state-key
          - name: remote-digest
      outputs:
        parameters:
          - name: changed
            valueFrom:
              path: /tmp/changed
          - name: stored-digest
            valueFrom:
              path: /tmp/stored-digest
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: compare-digest
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        source: |
          set -euo pipefail
          KEY="{{inputs.parameters.state-key}}"
          REMOTE="{{inputs.parameters.remote-digest}}"
          STORED=$(kubectl get configmap image-polling-digests -n argo \
            -o jsonpath="{.data.${KEY}}" 2>/dev/null || true)

          printf '%s' "${STORED}" > /tmp/stored-digest

          if [[ "${REMOTE}" == "none" ]]; then
            echo "No remote digest fetched. Skipping." >&2
            echo "false" > /tmp/changed
            exit 0
          fi

          echo "Remote: ${REMOTE}" >&2
          echo "Stored: ${STORED:-<none>}" >&2

          if [[ "${REMOTE}" == "${STORED}" ]]; then
            echo "No change." >&2
            echo "false" > /tmp/changed
          else
            echo "Digest changed." >&2
            echo "true" > /tmp/changed
          fi

    - name: update-local
      inputs:
        parameters:
          - name: state-key
          - name: remote-digest
          - name: expected-digest
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: update-digest
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        source: |
          set -euo pipefail
          KEY="{{inputs.parameters.state-key}}"
          REMOTE="{{inputs.parameters.remote-digest}}"
          EXPECTED="{{inputs.parameters.expected-digest}}"
          STORED=$(kubectl get configmap image-polling-digests -n argo \
            -o jsonpath="{.data.${KEY}}" 2>/dev/null || true)

          if [[ "${STORED}" != "${EXPECTED}" ]]; then
            echo "State changed since check (expected '${EXPECTED}', found '${STORED}'); skipping stale write." >&2
            exit 0
          fi

          echo "Persisting new digest for ${KEY}: ${REMOTE}" >&2
          kubectl patch configmap image-polling-digests \
            -n argo --type merge \
            -p "{\"data\":{\"${KEY}\":\"${REMOTE}\"}}" 2>/dev/null \
            || kubectl create configmap image-polling-digests \
                 -n argo --from-literal="${KEY}=${REMOTE}"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: image-poller
  namespace: argo
  labels:
    app.kubernetes.io/component: image-poller
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  entrypoint: check-and-trigger
  arguments:
    parameters:
      - name: image
      - name: image-tag
      - name: state-key
      - name: namespace
        value: "bluefin-test"
      - name: suites
        value: "smoke,developer,system"
      - name: variant
        value: "bluefin"
      # Zot containerdisk tag; defaults to image-tag when not set (works for bluefin:testing → "testing")
      - name: containerdisk-tag
        value: "{{workflow.parameters.image-tag}}"
      - name: branch
        value: "main"
      - name: vm-memory
        value: "8Gi"
      - name: ssh-key-secret
        value: "bluefin-test-ssh-key"

  templates:
    - name: check-and-trigger
      dag:
        tasks:
          - name: check-digest
            template: poll-digest
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.image}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: state-key
                  value: "{{workflow.parameters.state-key}}"
          - name: run-pipeline
            depends: "check-digest.Succeeded"
            when: "{{tasks.check-digest.outputs.parameters.changed}} == true"
            templateRef:
              name: bluefin-qa-pipeline
              template: pipeline
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.image}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{workflow.parameters.containerdisk-tag}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"
                - name: suites
                  value: "{{workflow.parameters.suites}}"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: vm-memory
                  value: "8Gi"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"

    - name: poll-digest
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: state-key
      outputs:
        parameters:
          - name: changed
            valueFrom:
              path: /tmp/changed
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: poll-digest
      script:
        image: quay.io/skopeo/stable:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          set -euo pipefail
          IMAGE_REF="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
          KEY="{{inputs.parameters.state-key}}"

          # Authenticated skopeo — avoids GHCR anonymous rate limits
          REMOTE=""
          for i in 1 2 3; do
            REMOTE=$(skopeo inspect \
              --no-tags \
              --format '{{.Digest}}' \
              --creds "_token:${GITHUB_TOKEN}" \
              "docker://${IMAGE_REF}" 2>/dev/null || true)
            [[ -n "${REMOTE}" ]] && break
            echo "skopeo attempt ${i}/3 failed for ${IMAGE_REF}; retrying in $(( i * 15 ))s" >&2
            sleep $(( i * 15 ))
          done

          if [[ -z "${REMOTE}" ]]; then
            echo "Failed to resolve digest after 3 attempts; skipping to avoid false positive" >&2
            echo "false" > /tmp/changed
            exit 0
          fi

          # Read stored digest from ConfigMap
          STORED=$(kubectl get configmap image-polling-digests \
            -n argo \
            -o jsonpath="{.data.${KEY}}" 2>/dev/null || true)

          echo "Remote:  ${REMOTE}" >&2
          echo "Stored:  ${STORED:-<none>}" >&2

          if [[ "${REMOTE}" == "${STORED}" ]]; then
            echo "No change." >&2
            echo "false" > /tmp/changed
          else
            echo "Digest changed — updating ConfigMap key ${KEY}" >&2
            kubectl patch configmap image-polling-digests \
              -n argo --type merge \
              -p "{\"data\":{\"${KEY}\":\"${REMOTE}\"}}" 2>/dev/null \
              || kubectl create configmap image-polling-digests \
                   -n argo \
                   --from-literal="${KEY}=${REMOTE}"
            echo "true" > /tmp/changed
          fi

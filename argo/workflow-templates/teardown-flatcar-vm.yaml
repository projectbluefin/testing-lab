apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: teardown-flatcar-vm
  namespace: argo
spec:
  serviceAccountName: argo
  templates:
    - name: teardown-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
            value: "flatcar-test"
          # Must match the test-root used in provision-flatcar-vm to locate the disk.
          - name: test-root
            value: "/var/tmp/flatcar-test"
      steps:
        - - name: delete-vm
            template: delete-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
        - - name: delete-hostdisk
            template: delete-hostdisk
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: test-root
                  value: "{{inputs.parameters.test-root}}"

    - name: delete-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
      resource:
        action: delete
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"

    - name: delete-hostdisk
      inputs:
        parameters:
          - name: vm-name
          - name: test-root
            value: "/var/tmp/flatcar-test"
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: test-disks
          hostPath:
            path: "{{inputs.parameters.test-root}}"
      script:
        image: registry.access.redhat.com/ubi9/ubi-minimal:9.5
        securityContext:
          runAsUser: 0
        command: [bash]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
          - name: test-disks
            mountPath: "{{inputs.parameters.test-root}}"
        source: |
          DISK="{{inputs.parameters.test-root}}/{{inputs.parameters.vm-name}}.raw"
          TARGET="{{inputs.parameters.test-root}}/{{inputs.parameters.vm-name}}-target.raw"
          rm -f "${DISK}" "${TARGET}"
          echo "Cleaned: ${DISK}, ${TARGET}"

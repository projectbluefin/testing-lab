apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-bst
  namespace: argo
  annotations:
    description: |
      Drives dakota BuildStream builds on ghost via the existing `just` recipes.
      BST cache on striped storage (/var/mnt/ghost-data/bst-cache). Never cleared — production CAS.
      Ghost's hardware is used; k8s controls scheduling and reports outcomes.

      Outputs: bst-build-export-push emits `image-ref` (192.168.1.102:5000/dakota:<tag>)
      which dakota-qa-pipeline passes as `image` to ensure-disk.
  labels:
    app.kubernetes.io/component: dakota-bst
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  entrypoint: pipeline
  arguments:
    parameters:
      - name: variant
        value: "default"   # default | nvidia | all
      - name: branch
        value: "main"
      - name: repo
        value: "https://github.com/projectbluefin/dakota"  # override for fork PRs

  templates:

    # ── Pipeline: validate → build-export-push ──────────────────────────────
    - name: pipeline
      dag:
        tasks:
          - name: validate
            template: bst-validate
            arguments:
              parameters:
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: repo
                  value: "{{workflow.parameters.repo}}"
          - name: build-export-push
            dependencies: [validate]
            template: bst-build-export-push
            arguments:
              parameters:
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: repo
                  value: "{{workflow.parameters.repo}}"

    # ── Validate: bst show — fast graph check, no build ─────────────────────
    - name: bst-validate
      inputs:
        parameters:
          - name: branch
          - name: repo
      synchronization:
        mutexes:
          - name: ghost-heavy-compute
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: dakota-bst-validate
      nodeSelector:
        kubernetes.io/hostname: ghost
      activeDeadlineSeconds: 1800
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: containers-storage
          hostPath:
            path: /var/mnt/ghost-data/containers-iso-build
            type: DirectoryOrCreate
        - name: bst-cache
          hostPath:
            path: /var/mnt/ghost-data/bst-cache
            type: DirectoryOrCreate
        - name: src
          emptyDir: {}
      initContainers:
        - name: git-clone
          image: quay.io/fedora/fedora:latest
          command: [bash, -c]
          args:
            - |
              dnf install -y --quiet git 2>&1 | tail -2
              git clone --depth 1 --branch "{{inputs.parameters.branch}}" \
                "{{inputs.parameters.repo}}" /src
          volumeMounts:
            - name: src
              mountPath: /src
      container:
        image: quay.io/podman/stable:latest
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            dnf install -y --quiet just 2>&1 | tail -2
            cd /src
            just validate 2>/dev/null || just bst show --deps all oci/bluefin.bst
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: containers-storage
            mountPath: /var/lib/containers/storage
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: src
            mountPath: /src

    # ── Build + Export + Push ───────────────────────────────────────────────
    # `just build <variant>` calls `just export` internally which writes the
    # OCI image into containers-storage as `dakota:<tag>`.
    # We then push to the cluster-local zot registry for BIB to consume.
    #
    # Mutex: ghost-heavy-compute — serialises all heavy BIB/BST builds on ghost.
    # Guaranteed QoS: requests == limits so k8s never OOM-kills this pod.
    - name: bst-build-export-push
      inputs:
        parameters:
          - name: variant
          - name: branch
          - name: repo
      outputs:
        parameters:
          - name: image-ref
            valueFrom:
              path: /tmp/image-ref
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: dakota-bst-build
      synchronization:
        mutexes:
          - name: ghost-heavy-compute
      nodeSelector:
        kubernetes.io/hostname: ghost
      activeDeadlineSeconds: 21600
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: containers-storage
          hostPath:
            path: /var/mnt/ghost-data/containers-iso-build
            type: DirectoryOrCreate
        - name: bst-cache
          hostPath:
            path: /var/mnt/ghost-data/bst-cache
            type: DirectoryOrCreate
        - name: src
          emptyDir: {}
      initContainers:
        - name: git-clone
          image: quay.io/fedora/fedora:latest
          command: [bash, -c]
          args:
            - |
              dnf install -y --quiet git 2>&1 | tail -2
              git clone --depth 1 --branch "{{inputs.parameters.branch}}" \
                "{{inputs.parameters.repo}}" /src
          volumeMounts:
            - name: src
              mountPath: /src
      container:
        image: quay.io/podman/stable:latest
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            dnf install -y --quiet just 2>&1 | tail -2
            cd /src

            # Derive a short build tag from the workflow UID.
            # Argo expr syntax {{=...}} is not available in bash args — use
            # a substring of the workflow name which is always unique.
            TAG=$(echo "{{workflow.uid}}" | cut -c1-8)
            IMAGE_REF="192.168.1.102:5000/dakota:${TAG}"

            echo "=== BST build: variant={{inputs.parameters.variant}} tag=${TAG} ==="
            BUILD_IMAGE_NAME=dakota BUILD_IMAGE_TAG="${TAG}" just build "{{inputs.parameters.variant}}"

            echo "=== Pushing ${IMAGE_REF} ==="
            podman push --tls-verify=false "docker://${IMAGE_REF}"

            echo "=== Lint ==="
            just lint

            printf '%s' "${IMAGE_REF}" > /tmp/image-ref
            echo "=== Done: ${IMAGE_REF} ==="
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "24"
            memory: 48Gi
          limits:
            cpu: "24"
            memory: 48Gi
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: containers-storage
            mountPath: /var/lib/containers/storage
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: src
            mountPath: /src

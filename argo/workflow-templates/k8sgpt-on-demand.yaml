apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: k8sgpt-on-demand
  namespace: argo
  annotations:
    description: |
      Runs an on-demand K8sGPT analysis against the cluster and writes the full
      JSON output to an artifact. By default it uses the K8sGPT CR's configured
      active filters; optional template parameters can narrow the namespace or
      override filters for focused triage.
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  entrypoint: analyze
  serviceAccountName: argo
  podGC:
    strategy: OnWorkflowSuccess
  ttlStrategy:
    secondsAfterCompletion: 86400
    secondsAfterFailure: 604800
  arguments:
    parameters:
      - name: namespace
        value: ""
      - name: filters
        value: "Pod,Deployment,Service,Ingress,Node"
      - name: explain
        value: "true"
  templates:
    - name: analyze
      activeDeadlineSeconds: 600
      container:
        image: ghcr.io/k8sgpt-ai/k8sgpt:v0.4.24
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -euo pipefail
            mkdir -p /tmp/results
            ns_arg=""
            explain_arg=""
            filters_arg=""
            if [ -n "{{workflow.parameters.namespace}}" ]; then
              ns_arg="--namespace={{workflow.parameters.namespace}}"
            fi
            if [ "{{workflow.parameters.explain}}" = "true" ]; then
              explain_arg="--explain"
            fi
            if [ -n "{{workflow.parameters.filters}}" ]; then
              filters_arg="--filter={{workflow.parameters.filters}}"
            fi
            k8sgpt analyze ${explain_arg} --output=json ${filters_arg} ${ns_arg} > /tmp/results/k8sgpt-results.json
            findings_count=$(awk 'index($0, "\"kind\"") { c++ } END { print c+0 }' /tmp/results/k8sgpt-results.json)
            echo "k8sgpt findings: ${findings_count}"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      outputs:
        artifacts:
          - name: k8sgpt-results
            path: /tmp/results/k8sgpt-results.json

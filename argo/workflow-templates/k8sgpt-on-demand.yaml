apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: k8sgpt-on-demand
  namespace: argo
  annotations:
    description: |
      Runs an on-demand K8sGPT analysis against the cluster and writes the full
      JSON output to an artifact. Default filters mirror the repo-managed
      K8sGPT manifest; optional template parameters can narrow the namespace or
      override filters for focused triage.
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  entrypoint: analyze
  serviceAccountName: k8sgpt-runner
  podGC:
    strategy: OnWorkflowSuccess
  ttlStrategy:
    secondsAfterCompletion: 86400
    secondsAfterFailure: 604800
  arguments:
    parameters:
      - name: namespace
        value: ""
      - name: filters
        value: "Pod,Deployment,Service,Ingress,Node"
  templates:
    - name: analyze
      activeDeadlineSeconds: 600
      container:
        image: cgr.dev/chainguard/wolfi-base:latest
        command: [sh, -c]
        args:
          - |
            apk add --no-cache bash curl jq tar >/dev/null 2>&1
            exec bash <<'SCRIPT_EOF'
            set -euo pipefail

            k8sgpt_version="v0.4.24"
            mkdir -p /tmp/results
            mkdir -p /tmp/bin
            ns_arg=""
            filters_arg=""

            arch="$(uname -m)"
            case "${arch}" in
              x86_64|amd64)
                archive="k8sgpt_Linux_x86_64.tar.gz"
                ;;
              aarch64|arm64)
                archive="k8sgpt_Linux_arm64.tar.gz"
                ;;
              *)
                echo "unsupported architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            curl -fsSL "https://github.com/k8sgpt-ai/k8sgpt/releases/download/${k8sgpt_version}/${archive}" \
              | tar -xz -C /tmp/bin k8sgpt

            if [ -n "{{workflow.parameters.namespace}}" ]; then
              ns_arg="--namespace={{workflow.parameters.namespace}}"
            fi
            if [ -n "{{workflow.parameters.filters}}" ]; then
              filters_arg="--filter={{workflow.parameters.filters}}"
            fi

            /tmp/bin/k8sgpt analyze --output=json ${filters_arg} ${ns_arg} > /tmp/results/k8sgpt-results.json
            findings_count=$(jq '[.. | objects | select(has("kind"))] | length' /tmp/results/k8sgpt-results.json)
            echo "k8sgpt findings: ${findings_count}"
            SCRIPT_EOF
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      outputs:
        artifacts:
          - name: k8sgpt-results
            path: /tmp/results/k8sgpt-results.json

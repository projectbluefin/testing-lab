apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: k8sgpt-on-demand
  namespace: argo
  annotations:
    description: |
      Runs an on-demand K8sGPT analysis against the cluster and writes the full
      JSON output to an artifact. Default filters are repo-managed for
      cluster triage; optional template parameters can narrow the namespace or
      override filters for focused triage.
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  entrypoint: analyze
  serviceAccountName: argo
  podGC:
    strategy: OnWorkflowSuccess
  ttlStrategy:
    secondsAfterCompletion: 86400
    secondsAfterFailure: 604800
  arguments:
    parameters:
      - name: namespace
        value: ""
      - name: filters
        value: "Pod,Deployment,Service,Ingress,Node"
  templates:
    - name: analyze
      activeDeadlineSeconds: 600
      container:
        image: 192.168.1.102:30500/fsdk/lab-runner:latest
        command: [sh, -c]
        args:
          - |
            set -eu

            k8sgpt_version="v0.4.24"
            mkdir -p /tmp/results
            mkdir -p /tmp/bin
            namespace="{{workflow.parameters.namespace}}"
            filters="{{workflow.parameters.filters}}"

            if ! command -v curl >/dev/null 2>&1; then
              echo "curl is required but not available in runner image" >&2
              exit 1
            fi
            if ! command -v python3 >/dev/null 2>&1; then
              echo "python3 is required but not available in runner image" >&2
              exit 1
            fi

            arch="$(uname -m)"
            case "${arch}" in
              x86_64|amd64)
                archive="k8sgpt_Linux_x86_64.tar.gz"
                ;;
              aarch64|arm64)
                archive="k8sgpt_Linux_arm64.tar.gz"
                ;;
              *)
                echo "unsupported architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            curl -fsSL "https://github.com/k8sgpt-ai/k8sgpt/releases/download/${k8sgpt_version}/${archive}" \
              -o /tmp/k8sgpt.tgz
            python3 - <<'PY'
            import tarfile
            with tarfile.open('/tmp/k8sgpt.tgz', 'r:gz') as tf:
                member = tf.getmember('k8sgpt')
                tf.extract(member, '/tmp/bin')
            PY
            chmod +x /tmp/bin/k8sgpt

            if [ -n "${namespace}" ]; then
              if ! printf '%s' "${namespace}" | grep -Eq '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'; then
                echo "invalid namespace parameter: ${namespace}" >&2
                exit 1
              fi
            fi
            if [ -n "${filters}" ]; then
              if ! printf '%s' "${filters}" | grep -Eq '^[A-Za-z,]+$'; then
                echo "invalid filters parameter: ${filters}" >&2
                exit 1
              fi
            fi

            set -- /tmp/bin/k8sgpt analyze --output=json
            if [ -n "${filters}" ]; then
              set -- "$@" --filter "${filters}"
            fi
            if [ -n "${namespace}" ]; then
              set -- "$@" --namespace "${namespace}"
            fi

            "$@" > /tmp/results/k8sgpt-results.json
            jq '
              .results |= map(
                select(
                  .kind != "Service" or
                  (
                    .name != "argocd/argocd-applicationset-controller" and
                    .name != "argocd/argocd-dex-server" and
                    .name != "argocd/argocd-notifications-controller-metrics" and
                    .name != "kubevirt/virt-exportproxy"
                  )
                )
              )
            ' /tmp/results/k8sgpt-results.json > /tmp/results/k8sgpt-results.filtered.json
            mv /tmp/results/k8sgpt-results.filtered.json /tmp/results/k8sgpt-results.json
            findings_count=$(jq '.results | length' /tmp/results/k8sgpt-results.json)
            echo "k8sgpt findings: ${findings_count}"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      outputs:
        parameters:
          - name: k8sgpt-results-json
            valueFrom:
              path: /tmp/results/k8sgpt-results.json

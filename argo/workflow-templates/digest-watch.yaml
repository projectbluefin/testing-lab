apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: digest-watch
  namespace: argo
  annotations:
    description: |
      Watch GHCR image digests for bluefin and bluefin-lts and trigger
      build-containerdisk when the upstream source image changes.
      Runs two parallel variant watchers (testing, lts-testing). Each watcher
      fetches the live GHCR digest via anonymous curl, compares it against the
      stored value in ConfigMap containerdisk-source-digests, and on mismatch
      patches the ConfigMap and submits a build-containerdisk Workflow with
      force=true to bypass the Zot existence check.
  labels:
    app.kubernetes.io/component: digest-watch
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  entrypoint: watch-all

  templates:
    # ─── Top-level DAG: watch both variants in parallel ───────────────────────

    - name: watch-all
      dag:
        tasks:
          - name: watch-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/bluefin"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "testing"

          - name: watch-lts-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/bluefin-lts"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "lts-testing"

          - name: watch-dakota
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/dakota"
                - name: image-tag
                  value: "latest"
                - name: containerdisk-tag
                  value: "dakota-latest"

          - name: watch-bazzite-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/ublue-os/bazzite"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "bazzite-testing"

          - name: watch-aurora-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/ublue-os/aurora"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "aurora-testing"

    # ─── watch-variant ────────────────────────────────────────────────────────
    # Fetches the live GHCR digest via skopeo (authenticated — works for both
    # projectbluefin and ublue-os images).
    # Compares against stored digest in ConfigMap containerdisk-source-digests.
    # On mismatch: patches ConfigMap + submits build-containerdisk with force=true.
    # Uses quay.io/skopeo/stable:latest (has skopeo + curl) and calls k8s API
    # directly (in-cluster SA token) to avoid needing a separate kubectl image.

    - name: watch-variant
      inputs:
        parameters:
          - name: image           # e.g. ghcr.io/projectbluefin/bluefin
          - name: image-tag       # e.g. testing
          - name: containerdisk-tag  # ConfigMap key + Zot tag: e.g. testing, lts-testing
      script:
        image: quay.io/skopeo/stable:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          set -euo pipefail
          IMAGE="{{inputs.parameters.image}}"
          IMAGE_TAG="{{inputs.parameters.image-tag}}"
          CD_TAG="{{inputs.parameters.containerdisk-tag}}"

          # In-cluster k8s API helpers
          KS="https://kubernetes.default.svc"
          CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

          # Fetch the live digest via skopeo (authenticated — handles both public
          # and org-restricted GHCR images; anonymous token API is unreliable).
          LIVE_DIGEST=""
          for i in 1 2 3; do
            LIVE_DIGEST=$(skopeo inspect \
              --no-tags \
              --format '{{.Digest}}' \
              --creds "_token:${GITHUB_TOKEN}" \
              "docker://${IMAGE}:${IMAGE_TAG}" 2>/dev/null || true)
            [[ -n "${LIVE_DIGEST}" ]] && break
            echo "skopeo attempt ${i}/3 failed for ${IMAGE}:${IMAGE_TAG}; retrying in $(( i * 15 ))s" >&2
            sleep $(( i * 15 ))
          done

          if [[ -z "${LIVE_DIGEST}" ]]; then
            echo "ERROR: could not fetch digest for ${IMAGE}:${IMAGE_TAG} after 3 attempts" >&2
            echo "false" > /tmp/changed
            exit 0
          fi
          echo "Live digest for ${IMAGE}:${IMAGE_TAG}: ${LIVE_DIGEST}"

          # Read stored digest from ConfigMap via k8s API
          STORED_DIGEST=$(curl -sf --cacert "${CACERT}" \
            -H "Authorization: Bearer ${SA_TOKEN}" \
            "${KS}/api/v1/namespaces/argo/configmaps/containerdisk-source-digests" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('data',{}).get('${CD_TAG}',''))" \
            2>/dev/null || true)
          echo "Stored digest for ${CD_TAG}: ${STORED_DIGEST:-<none>}"

          if [[ "${LIVE_DIGEST}" == "${STORED_DIGEST}" ]]; then
            echo "Digest unchanged — containerdisk ${CD_TAG} is current, skipping build"
            exit 0
          fi

          echo "Digest changed — updating ConfigMap and triggering rebuild"

          # Upsert ConfigMap key via k8s API (patch; create if 404)
          HTTP=$(curl -sf -w "%{http_code}" -o /dev/null --cacert "${CACERT}" \
            -H "Authorization: Bearer ${SA_TOKEN}" \
            -H "Content-Type: application/merge-patch+json" \
            -X PATCH \
            "${KS}/api/v1/namespaces/argo/configmaps/containerdisk-source-digests" \
            -d "{\"data\":{\"${CD_TAG}\":\"${LIVE_DIGEST}\"}}" 2>/dev/null || echo "000")
          if [[ "${HTTP}" == "404" || "${HTTP}" == "000" ]]; then
            curl -sf --cacert "${CACERT}" \
              -H "Authorization: Bearer ${SA_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${KS}/api/v1/namespaces/argo/configmaps" \
              -d "{\"apiVersion\":\"v1\",\"kind\":\"ConfigMap\",\"metadata\":{\"name\":\"containerdisk-source-digests\",\"namespace\":\"argo\"},\"data\":{\"${CD_TAG}\":\"${LIVE_DIGEST}\"}}" \
              > /dev/null
            echo "Created ConfigMap with ${CD_TAG}=${LIVE_DIGEST}" >&2
          else
            echo "Patched ConfigMap ${CD_TAG}=${LIVE_DIGEST} (http=${HTTP})" >&2
          fi

          # Submit build-containerdisk workflow via Argo API
          curl -sf --cacert "${CACERT}" \
            -H "Authorization: Bearer ${SA_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${KS}/apis/argoproj.io/v1alpha1/namespaces/argo/workflows" \
            -d "{
              \"apiVersion\": \"argoproj.io/v1alpha1\",
              \"kind\": \"Workflow\",
              \"metadata\": {\"generateName\": \"build-cd-sync-${CD_TAG}-\", \"namespace\": \"argo\"},
              \"spec\": {
                \"workflowTemplateRef\": {\"name\": \"build-containerdisk\"},
                \"arguments\": {\"parameters\": [
                  {\"name\": \"image\", \"value\": \"${IMAGE}\"},
                  {\"name\": \"image-tag\", \"value\": \"${IMAGE_TAG}\"},
                  {\"name\": \"containerdisk-tag\", \"value\": \"${CD_TAG}\"},
                  {\"name\": \"force\", \"value\": \"true\"}
                ]}
              }
            }" > /dev/null
          echo "Build workflow submitted for ${IMAGE}:${IMAGE_TAG} → containerdisk:${CD_TAG}"


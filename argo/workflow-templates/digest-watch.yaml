apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: digest-watch
  namespace: argo
  annotations:
    description: |
      Watch GHCR image digests for bluefin and bluefin-lts and trigger
      build-containerdisk when the upstream source image changes.
      Runs two parallel variant watchers (testing, lts-testing). Each watcher
      fetches the live GHCR digest via anonymous curl, compares it against the
      stored value in ConfigMap containerdisk-source-digests, and on mismatch
      patches the ConfigMap and submits a build-containerdisk Workflow with
      force=true to bypass the Zot existence check.
  labels:
    app.kubernetes.io/component: digest-watch
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  entrypoint: watch-all

  templates:
    # ─── Top-level DAG: watch both variants in parallel ───────────────────────

    - name: watch-all
      dag:
        tasks:
          - name: watch-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/bluefin"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "testing"

          - name: watch-lts-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/bluefin-lts"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "lts-testing"

          - name: watch-dakota
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/dakota"
                - name: image-tag
                  value: "latest"
                - name: containerdisk-tag
                  value: "dakota-latest"

          - name: watch-bazzite-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/ublue-os/bazzite"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "bazzite-testing"

          - name: watch-aurora-testing
            template: watch-variant
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/ublue-os/aurora"
                - name: image-tag
                  value: "testing"
                - name: containerdisk-tag
                  value: "aurora-testing"

    # ─── watch-variant ────────────────────────────────────────────────────────
    # Fetches the live GHCR digest (anonymous token, no image pull).
    # Compares against stored digest in ConfigMap containerdisk-source-digests.
    # On mismatch: patches ConfigMap + submits build-containerdisk with force=true.

    - name: watch-variant
      inputs:
        parameters:
          - name: image           # e.g. ghcr.io/projectbluefin/bluefin
          - name: image-tag       # e.g. testing
          - name: containerdisk-tag  # ConfigMap key + Zot tag: e.g. testing, lts-testing
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        source: |
          set -euo pipefail
          IMAGE="{{inputs.parameters.image}}"
          IMAGE_TAG="{{inputs.parameters.image-tag}}"
          CD_TAG="{{inputs.parameters.containerdisk-tag}}"

          # Extract <org>/<repo> from full registry path for GHCR token scope
          REPO="${IMAGE#ghcr.io/}"

          # Fetch anonymous bearer token scoped to this repo
          TOKEN=$(curl -sL \
            "https://ghcr.io/token?scope=repository:${REPO}:pull" \
            | tr ',' '\n' | grep '"token"' \
            | sed 's/.*"token":"\([^"]*\)".*/\1/')

          if [[ -z "${TOKEN}" ]]; then
            echo "ERROR: could not obtain GHCR token for ${REPO}" >&2
            exit 1
          fi

          # Fetch the OCI image index digest (single HEAD request, ~100ms)
          LIVE_DIGEST=$(curl -sI \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/${REPO}/manifests/${IMAGE_TAG}" \
            | grep -i "^docker-content-digest:" \
            | awk '{print $2}' | tr -d '\r\n')

          if [[ -z "${LIVE_DIGEST}" ]]; then
            echo "ERROR: could not fetch digest for ${IMAGE}:${IMAGE_TAG}" >&2
            exit 1
          fi
          echo "Live digest for ${IMAGE}:${IMAGE_TAG}: ${LIVE_DIGEST}"

          # Read stored digest from ConfigMap (key = containerdisk-tag)
          STORED_DIGEST=$(kubectl get configmap containerdisk-source-digests \
            -n argo \
            -o "jsonpath={.data.${CD_TAG}}" 2>/dev/null || true)
          echo "Stored digest for ${CD_TAG}: ${STORED_DIGEST:-<none>}"

          if [[ "${LIVE_DIGEST}" == "${STORED_DIGEST}" ]]; then
            echo "Digest unchanged — containerdisk ${CD_TAG} is current, skipping build"
            exit 0
          fi

          echo "Digest changed — updating ConfigMap and triggering rebuild"

          # Upsert ConfigMap entry (create if absent, patch key if present)
          kubectl patch configmap containerdisk-source-digests \
            -n argo --type merge \
            -p "{\"data\":{\"${CD_TAG}\":\"${LIVE_DIGEST}\"}}" 2>/dev/null \
          || kubectl create configmap containerdisk-source-digests \
               -n argo \
               --from-literal="${CD_TAG}=${LIVE_DIGEST}"

          # Submit build-containerdisk with force=true (skip Zot existence check)
          cat > /tmp/build.yaml << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: build-cd-sync-${CD_TAG}-
            namespace: argo
          spec:
            workflowTemplateRef:
              name: build-containerdisk
            arguments:
              parameters:
              - name: image
                value: "${IMAGE}"
              - name: image-tag
                value: "${IMAGE_TAG}"
              - name: containerdisk-tag
                value: "${CD_TAG}"
              - name: force
                value: "true"
          EOF
          kubectl create -f /tmp/build.yaml
          echo "Build workflow submitted for ${IMAGE}:${IMAGE_TAG} → containerdisk:${CD_TAG}"

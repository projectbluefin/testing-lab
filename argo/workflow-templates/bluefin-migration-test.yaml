        \     \"pass\": True if storage_variant == \"default\" else not storage_missing,\n\
        \        \"variant\": storage_variant,\n        \"missing\": storage_missing,\n\
        \    },\n}\n\nstep_pass = all(\n    checks[name][\"pass\"]\n    for name in\
        \ (\"bootc_status\", \"ostree_admin_status\", \"bootc_package\", \"group_sync\"\
        , \"services\", \"expected_image\", \"storage_backend\")\n)\n\npayload = {\n\
        \    \"step\": step,\n    \"vm_ip\": vm_ip,\n    \"storage_variant\": storage_variant,\n\
        \    \"expected_image\": expected_image,\n    \"active_image\": active_image,\n\
        \    \"step_pass\": step_pass,\n    \"checks\": checks,\n    \"bootc_status\"\
        : bootc_data,\n    \"commands\": results,\n}\n\nstep_file = pathlib.Path(f\"\
        {step}.json\")\nstep_file.write_text(json.dumps(payload, indent=2) + \"\\\
        n\", encoding=\"utf-8\")\nsubprocess.run(scp_base + [str(step_file), f\"{vm_user}@{vm_ip}:{output_root}/{step}.json\"\
        ], check=True, text=True)\n\naggregate_file = pathlib.Path(\"migration-evidence.json\"\
        )\nfetch = subprocess.run(scp_base + [f\"{vm_user}@{vm_ip}:{aggregate_path}\"\
        , str(aggregate_file)], text=True, capture_output=True)\naggregate = []\n\
        if fetch.returncode == 0:\n    try:\n        loaded = json.loads(aggregate_file.read_text(encoding=\"\

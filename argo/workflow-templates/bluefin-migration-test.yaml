        \    except Exception:\n        aggregate = []\naggregate = [item for item\
        \ in aggregate if not (isinstance(item, dict) and item.get(\"step\") == step)]\n\
        aggregate.append(payload)\naggregate_file.write_text(json.dumps(aggregate,\
        \ indent=2) + \"\\n\", encoding=\"utf-8\")\nsubprocess.run(scp_base + [str(aggregate_file),\
        \ f\"{vm_user}@{vm_ip}:{aggregate_path}\"], check=True, text=True)\n\nprint(f\"\
        === {step} evidence ({storage_variant}) ({vm_ip}) ===\")\nprint(json.dumps(payload,\
        \ indent=2))\nsys.exit(0 if step_pass else 1)\nPY\n"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: testing-lab:argoproj.io/WorkflowTemplate:argo/bluefin-migration-test
    description: 'Tests two-way bootc switch migration between legacy-rechunk ublue-os/bluefin

      and chunkah projectbluefin/bluefin, including experimental unified storage

      coverage and zstd-compression verification.

      '
  labels:
    app.kubernetes.io/component: migration-test
    app.kubernetes.io/part-of: bluefin-test-suite
  name: bluefin-migration-test
  namespace: argo
spec:
  arguments:
    parameters:
    - name: image-tag
      value: latest
    - name: vm-name
      value: bluefin-migration-{{workflow.uid}}
    - name: namespace
      value: bluefin-test
    - name: ssh-user
      value: bluefin-test
    - name: ssh-key-secret
      value: bluefin-test-ssh-key
    - name: legacy-image
      value: ghcr.io/ublue-os/bluefin
    - name: chunkah-image
      value: ghcr.io/projectbluefin/bluefin
    - name: chunkah-image-tag
      value: latest
    - name: storage-variant
      value: default
    - name: golden-root
      value: /var/tmp/bluefin-golden
    - name: test-root
      value: /var/tmp/bluefin-test
    - name: evidence-root
      value: /tmp/migration-results
    - name: aggregate-path
      value: /tmp/migration-evidence.json
  entrypoint: migration-test
  onExit: teardown
  serviceAccountName: argo
  templates:
  - name: migration-test
    steps:
    - - arguments:
          parameters:
          - name: image-tag
            value: '{{workflow.parameters.image-tag}}'
          - name: vm-name
            value: '{{workflow.parameters.vm-name}}'
          - name: namespace
            value: '{{workflow.parameters.namespace}}'
          - name: golden-root
            value: '{{workflow.parameters.golden-root}}'
          - name: test-root
            value: '{{workflow.parameters.test-root}}'
        name: provision
        templateRef:
          name: provision-bluefin-vm
          template: provision-vm
    - - arguments:
          parameters:
          - name: image-tag
            value: '{{workflow.parameters.image-tag}}'
          - name: vm-name
            value: '{{workflow.parameters.vm-name}}'
          - name: vm-ip
            value: '{{steps.provision.outputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{workflow.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{workflow.parameters.ssh-key-secret}}'
          - name: legacy-image
            value: '{{workflow.parameters.legacy-image}}'
          - name: chunkah-image
            value: '{{workflow.parameters.chunkah-image}}'
          - name: chunkah-image-tag
            value: '{{workflow.parameters.chunkah-image-tag}}'
          - name: storage-variant
            value: '{{workflow.parameters.storage-variant}}'
          - name: evidence-root
            value: '{{workflow.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{workflow.parameters.aggregate-path}}'
        name: migrate
        template: migration-sequence
  - dag:
      failFast: false
      tasks:
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: legacy-image-ref
            value: '{{inputs.parameters.legacy-image}}:{{inputs.parameters.image-tag}}'
          - name: chunkah-image-ref
            value: '{{inputs.parameters.chunkah-image}}:{{inputs.parameters.chunkah-image-tag}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{inputs.parameters.aggregate-path}}'
        name: compression-inspect
        template: inspect-image-compression
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: step
            value: pre-switch
          - name: expected-image
            value: '{{inputs.parameters.legacy-image}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{inputs.parameters.aggregate-path}}'
        depends: compression-inspect
        name: pre-switch
        template: collect-evidence
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{inputs.parameters.aggregate-path}}'
        depends: pre-switch.Succeeded
        name: storage-prepare
        template: prepare-storage-backend
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: direction
            value: forward
          - name: image-ref
            value: '{{inputs.parameters.chunkah-image}}:{{inputs.parameters.chunkah-image-tag}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{inputs.parameters.aggregate-path}}'
        depends: storage-prepare.Succeeded
        name: forward-switch
        template: run-bootc-switch
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
        depends: forward-switch.Succeeded
        name: reboot-forward
        template: reboot-and-wait
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: step
            value: post-forward
          - name: expected-image
            value: '{{inputs.parameters.chunkah-image}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{inputs.parameters.aggregate-path}}'
        depends: reboot-forward.Succeeded
        name: post-forward
        template: collect-evidence
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: step
            value: post-forward
          - name: expected-image
            value: '{{inputs.parameters.chunkah-image}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
        depends: post-forward.Succeeded
        name: verify-forward
        template: verify-state
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: direction
            value: backward
          - name: image-ref
            value: '{{inputs.parameters.legacy-image}}:{{inputs.parameters.image-tag}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{inputs.parameters.aggregate-path}}'
        depends: verify-forward.Succeeded
        name: backward-switch
        template: run-bootc-switch
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
        depends: backward-switch.Succeeded
        name: reboot-backward
        template: reboot-and-wait
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: step
            value: post-backward
          - name: expected-image
            value: '{{inputs.parameters.legacy-image}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
          - name: aggregate-path
            value: '{{inputs.parameters.aggregate-path}}'
        depends: reboot-backward.Succeeded
        name: post-backward
        template: collect-evidence
      - arguments:
          parameters:
          - name: vm-ip
            value: '{{inputs.parameters.vm-ip}}'
          - name: ssh-user
            value: '{{inputs.parameters.ssh-user}}'
          - name: ssh-key-secret
            value: '{{inputs.parameters.ssh-key-secret}}'
          - name: storage-variant
            value: '{{inputs.parameters.storage-variant}}'
          - name: step
            value: post-backward
          - name: expected-image
            value: '{{inputs.parameters.legacy-image}}'
          - name: output-root
            value: '{{inputs.parameters.evidence-root}}'
        depends: post-backward.Succeeded
        name: verify-backward
        template: verify-state
    inputs:
      parameters:
      - name: image-tag
      - name: vm-name
      - name: vm-ip
      - name: ssh-user
        value: bluefin-test
      - name: ssh-key-secret
        value: bluefin-test-ssh-key
      - name: legacy-image
        value: ghcr.io/ublue-os/bluefin
      - name: chunkah-image
        value: ghcr.io/projectbluefin/bluefin
      - name: chunkah-image-tag
        value: latest
      - name: storage-variant
        value: default
      - name: evidence-root
        value: /tmp/migration-results
      - name: aggregate-path
        value: /tmp/migration-evidence.json
    name: migration-sequence
  - activeDeadlineSeconds: 900
    inputs:
      parameters:
      - name: vm-ip
      - name: ssh-user
        value: bluefin-test
      - name: ssh-key-secret
        value: bluefin-test-ssh-key
      - name: legacy-image-ref
      - name: chunkah-image-ref
      - name: output-root
        value: /tmp/migration-results
      - name: aggregate-path
        value: /tmp/migration-evidence.json
    name: inspect-image-compression
    nodeSelector:
      kubernetes.io/hostname: ghost
    podSpecPatch: 'hostNetwork: true

      dnsPolicy: ClusterFirstWithHostNet

      '
    script:
      command:
      - bash
      image: quay.io/skopeo/stable:latest
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      source: "set -euo pipefail\npkgs=\"\"\ncommand -v jq     >/dev/null 2>&1 ||\
        \ pkgs=\"$pkgs jq\"\ncommand -v skopeo >/dev/null 2>&1 || pkgs=\"$pkgs skopeo\"\
        \ncommand -v ssh    >/dev/null 2>&1 || pkgs=\"$pkgs openssh-clients\"\nif\
        \ [[ -n \"$pkgs\" ]]; then\n  dnf install -y --quiet $pkgs 2>&1 | tail -3\n\
        fi\n\nVM_IP=\"{{inputs.parameters.vm-ip}}\"\nSSH_USER=\"{{inputs.parameters.ssh-user}}\"\
        \nKEY=\"/etc/ssh/test-key/id_ed25519\"\nLEGACY_IMAGE_REF=\"{{inputs.parameters.legacy-image-ref}}\"\
        \nCHUNKAH_IMAGE_REF=\"{{inputs.parameters.chunkah-image-ref}}\"\nOUTPUT_ROOT=\"\
        {{inputs.parameters.output-root}}\"\nAGGREGATE_PATH=\"{{inputs.parameters.aggregate-path}}\"\
        \n\ninspect_image() {\n  local image_ref=\"$1\"\n  local inspect_json=\"\"\
        \n  local rc=0\n  if inspect_json=$(skopeo inspect --override-os linux --override-arch\
        \ amd64 \"docker://${image_ref}\" 2>&1); then\n    printf '%s' \"${inspect_json}\"\
        \ | jq --arg image_ref \"${image_ref}\" '{image_ref: $image_ref, layers: (.LayersData\
        \ | length), compression: (.LayersData[0].MIMEType // null), zstd_chunked:\
        \ (([.LayersData[]? | select(.Annotations[\"io.github.containers.zstd-chunked.manifest-checksum\"\
        ] != null)] | length) > 0), ostree_chunked: ((.LayersData[1:] // []) | all(.Annotations[\"\
        ostree.components\"] != null))}'\n  else\n    rc=$?\n    jq -n --arg image_ref\
        \ \"${image_ref}\" --arg stderr \"${inspect_json}\" --argjson rc \"${rc}\"\
        \ '{image_ref: $image_ref, rc: $rc, error: $stderr}'\n  fi\n}\n\nmkdir -p\
        \ compression-output\ninspect_image \"${LEGACY_IMAGE_REF}\" > compression-output/legacy.json\n\
        inspect_image \"${CHUNKAH_IMAGE_REF}\" > compression-output/chunkah.json\n\
        \njq -n \\\n  --arg step \"compression-state\" \\\n  --arg vm_ip \"${VM_IP}\"\
        \ \\\n  --arg legacy_ref \"${LEGACY_IMAGE_REF}\" \\\n  --arg chunkah_ref \"\
        ${CHUNKAH_IMAGE_REF}\" \\\n  --slurpfile legacy compression-output/legacy.json\
        \ \\\n  --slurpfile chunkah compression-output/chunkah.json \\\n  '{step:\
        \ $step, vm_ip: $vm_ip, legacy_image_ref: $legacy_ref, chunkah_image_ref:\
        \ $chunkah_ref, legacy: $legacy[0], chunkah: $chunkah[0], step_pass: true}'\
        \ > compression-state.json\n\necho \"=== compression-state (${VM_IP}) ===\"\
        \ncat compression-state.json\n\nssh -i \"${KEY}\" \\\n  -o StrictHostKeyChecking=no\
        \ \\\n  -o UserKnownHostsFile=/dev/null \\\n  -o ConnectTimeout=10 \\\n  -o\
        \ LogLevel=ERROR \\\n  \"${SSH_USER}@${VM_IP}\" \"mkdir -p ${OUTPUT_ROOT}\"\
        \ 2>/dev/null || true\n\nscp -i \"${KEY}\" \\\n  -o StrictHostKeyChecking=no\
        \ \\\n  -o UserKnownHostsFile=/dev/null \\\n  -o ConnectTimeout=10 \\\n  -o\
        \ LogLevel=ERROR \\\n  compression-state.json \"${SSH_USER}@${VM_IP}:${OUTPUT_ROOT}/compression-state.json\"\
        \ || true\n\nif scp -i \"${KEY}\" \\\n  -o StrictHostKeyChecking=no \\\n \
        \ -o UserKnownHostsFile=/dev/null \\\n  -o ConnectTimeout=10 \\\n  -o LogLevel=ERROR\
        \ \\\n  \"${SSH_USER}@${VM_IP}:${AGGREGATE_PATH}\" migration-evidence.json\
        \ 2>/dev/null; then\n  :\nelse\n  printf '[]\\n' > migration-evidence.json\n\
        fi\n\njq '. |= map(select(.step != \"compression-state\")) + [input]' migration-evidence.json\
        \ compression-state.json > migration-evidence.updated.json\nmv migration-evidence.updated.json\
        \ migration-evidence.json\nscp -i \"${KEY}\" \\\n  -o StrictHostKeyChecking=no\
        \ \\\n  -o UserKnownHostsFile=/dev/null \\\n  -o ConnectTimeout=10 \\\n  -o\
        \ LogLevel=ERROR \\\n  migration-evidence.json \"${SSH_USER}@${VM_IP}:${AGGREGATE_PATH}\"\
        \ || true\n"
      volumeMounts:
      - mountPath: /etc/ssh/test-key
        name: ssh-key
        readOnly: true
    volumes:
    - name: ssh-key
      secret:
        defaultMode: 256
        secretName: '{{inputs.parameters.ssh-key-secret}}'
  - activeDeadlineSeconds: 1800
    inputs:
      parameters:
      - name: vm-ip
      - name: ssh-user
        value: bluefin-test
      - name: ssh-key-secret
        value: bluefin-test-ssh-key
      - name: storage-variant
        value: default
      - name: output-root
        value: /tmp/migration-results
      - name: aggregate-path
        value: /tmp/migration-evidence.json
    name: prepare-storage-backend
    nodeSelector:
      kubernetes.io/hostname: ghost
    podSpecPatch: 'hostNetwork: true

      dnsPolicy: ClusterFirstWithHostNet

      '
    script:
      command:
      - bash
      image: quay.io/fedora/fedora:latest
      resources:
        limits:
          cpu: '1'
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 256Mi
      source: "set -euo pipefail\nif ! command -v ssh >/dev/null 2>&1; then\n  dnf\
        \ install -y --quiet openssh-clients 2>&1 | tail -2\nfi\n\nexport VM_IP=\"\
        {{inputs.parameters.vm-ip}}\"\nexport SSH_USER=\"{{inputs.parameters.ssh-user}}\"\
        \nexport SSH_KEY=\"/etc/ssh/test-key/id_ed25519\"\nexport STORAGE_VARIANT=\"\
        {{inputs.parameters.storage-variant}}\"\nexport OUTPUT_ROOT=\"{{inputs.parameters.output-root}}\"\
        \nexport AGGREGATE_PATH=\"{{inputs.parameters.aggregate-path}}\"\n\npython3\
        \ - <<'PY'\nimport json\nimport os\nimport pathlib\nimport subprocess\nimport\
        \ sys\n\nvm_ip = os.environ[\"VM_IP\"]\nvm_user = os.environ[\"SSH_USER\"\
        ]\nkey = os.environ[\"SSH_KEY\"]\nstorage_variant = os.environ[\"STORAGE_VARIANT\"\
        ]\noutput_root = os.environ[\"OUTPUT_ROOT\"]\naggregate_path = os.environ[\"\
        AGGREGATE_PATH\"]\nstep = \"storage-prepare\"\n\nssh_base = [\n    \"ssh\"\
        , \"-i\", key,\n    \"-o\", \"StrictHostKeyChecking=no\",\n    \"-o\", \"\
        UserKnownHostsFile=/dev/null\",\n    \"-o\", \"ConnectTimeout=10\",\n    \"\
        -o\", \"LogLevel=ERROR\",\n    f\"{vm_user}@{vm_ip}\",\n]\nscp_base = [\n\
        \    \"scp\", \"-i\", key,\n    \"-o\", \"StrictHostKeyChecking=no\",\n  \
        \  \"-o\", \"UserKnownHostsFile=/dev/null\",\n    \"-o\", \"ConnectTimeout=10\"\
        ,\n    \"-o\", \"LogLevel=ERROR\",\n]\n\ndef run_remote(command: str) -> subprocess.CompletedProcess:\n\
        \    return subprocess.run(ssh_base + [\"bash\", \"-lc\", command], text=True,\
        \ capture_output=True)\n\nsubprocess.run(ssh_base + [\"mkdir\", \"-p\", output_root],\
        \ check=True, text=True)\n\nif storage_variant == \"experimental-unified-storage\"\
        :\n    command = \"sudo bootc image set-unified\"\n    result = run_remote(command)\n\
        else:\n    command = \"echo default-storage\"\n    result = subprocess.CompletedProcess(command,\
        \ 0, \"default storage variant; skipping bootc image set-unified\\n\", \"\"\
        )\n\nstorage_info = run_remote(\"if [ -e /usr/lib/bootc/storage ]; then ls\
        \ -ld /usr/lib/bootc/storage; readlink -f /usr/lib/bootc/storage || true;\
        \ du -sh /usr/lib/bootc/storage 2>/dev/null || true; else echo '__BOOTC_STORAGE_MISSING__';\
        \ fi\")\nbootc_status = run_remote(\"sudo bootc status --json\")\n\nstorage_ready\
        \ = result.returncode == 0 and (\n    storage_variant != \"experimental-unified-storage\"\
        \n    or \"__BOOTC_STORAGE_MISSING__\" not in storage_info.stdout\n)\n\npayload\
        \ = {\n    \"step\": step,\n    \"vm_ip\": vm_ip,\n    \"storage_variant\"\
        : storage_variant,\n    \"command\": command,\n    \"returncode\": result.returncode,\n\
        \    \"stdout\": result.stdout.rstrip(),\n    \"stderr\": result.stderr.rstrip(),\n\
        \    \"step_pass\": storage_ready,\n    \"storage_info\": {\n        \"rc\"\
        : storage_info.returncode,\n        \"stdout\": storage_info.stdout.rstrip(),\n\
        \        \"stderr\": storage_info.stderr.rstrip(),\n    },\n    \"bootc_status\"\
        : {\n        \"rc\": bootc_status.returncode,\n        \"stdout\": bootc_status.stdout.rstrip(),\n\
        \        \"stderr\": bootc_status.stderr.rstrip(),\n    },\n}\n\nstep_file\
        \ = pathlib.Path(f\"{step}.json\")\nstep_file.write_text(json.dumps(payload,\
        \ indent=2) + \"\\n\", encoding=\"utf-8\")\nsubprocess.run(scp_base + [str(step_file),\
        \ f\"{vm_user}@{vm_ip}:{output_root}/{step}.json\"], check=True, text=True)\n\
        \naggregate_file = pathlib.Path(\"migration-evidence.json\")\nfetch = subprocess.run(scp_base\
        \ + [f\"{vm_user}@{vm_ip}:{aggregate_path}\", str(aggregate_file)], text=True,\
        \ capture_output=True)\naggregate = []\nif fetch.returncode == 0:\n    try:\n\
        \        loaded = json.loads(aggregate_file.read_text(encoding=\"utf-8\"))\n\
        \        if isinstance(loaded, list):\n            aggregate = loaded\n  \
        \  except Exception:\n        aggregate = []\naggregate = [item for item in\
        \ aggregate if not (isinstance(item, dict) and item.get(\"step\") == step)]\n\
        aggregate.append(payload)\naggregate_file.write_text(json.dumps(aggregate,\
        \ indent=2) + \"\\n\", encoding=\"utf-8\")\nsubprocess.run(scp_base + [str(aggregate_file),\
        \ f\"{vm_user}@{vm_ip}:{aggregate_path}\"], check=True, text=True)\n\nprint(f\"\
        === {step} ({storage_variant}) ({vm_ip}) ===\")\nprint(json.dumps(payload,\
        \ indent=2))\nsys.exit(0 if payload[\"step_pass\"] else 1)\nPY\n"
      volumeMounts:
      - mountPath: /etc/ssh/test-key
        name: ssh-key
        readOnly: true
    volumes:
    - name: ssh-key
      secret:
        defaultMode: 256
        secretName: '{{inputs.parameters.ssh-key-secret}}'
  - activeDeadlineSeconds: 1800
    inputs:
      parameters:
      - name: vm-ip
      - name: ssh-user
        value: bluefin-test
      - name: ssh-key-secret
        value: bluefin-test-ssh-key
      - name: storage-variant
        value: default
      - name: direction
      - name: image-ref
      - name: output-root
        value: /tmp/migration-results
      - name: aggregate-path
        value: /tmp/migration-evidence.json
    name: run-bootc-switch
    nodeSelector:
      kubernetes.io/hostname: ghost
    podSpecPatch: 'hostNetwork: true

      dnsPolicy: ClusterFirstWithHostNet

      '
    script:
      command:
      - bash
      image: quay.io/fedora/fedora:latest
      resources:
        limits:
          cpu: '1'
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 256Mi
      source: "set -euo pipefail\nif ! command -v ssh >/dev/null 2>&1; then\n  dnf\
        \ install -y --quiet openssh-clients 2>&1 | tail -2\nfi\n\nexport VM_IP=\"\
        {{inputs.parameters.vm-ip}}\"\nexport SSH_USER=\"{{inputs.parameters.ssh-user}}\"\
        \nexport SSH_KEY=\"/etc/ssh/test-key/id_ed25519\"\nexport STORAGE_VARIANT=\"\
        {{inputs.parameters.storage-variant}}\"\nexport DIRECTION=\"{{inputs.parameters.direction}}\"\
        \nexport IMAGE_REF=\"{{inputs.parameters.image-ref}}\"\nexport OUTPUT_ROOT=\"\
        {{inputs.parameters.output-root}}\"\nexport AGGREGATE_PATH=\"{{inputs.parameters.aggregate-path}}\"\
        \n\npython3 - <<'PY'\nimport json\nimport os\nimport pathlib\nimport shlex\n\
        import subprocess\nimport sys\n\nvm_ip = os.environ[\"VM_IP\"]\nvm_user =\
        \ os.environ[\"SSH_USER\"]\nkey = os.environ[\"SSH_KEY\"]\nstorage_variant\
        \ = os.environ[\"STORAGE_VARIANT\"]\ndirection = os.environ[\"DIRECTION\"\
        ]\nimage_ref = os.environ[\"IMAGE_REF\"]\noutput_root = os.environ[\"OUTPUT_ROOT\"\
        ]\naggregate_path = os.environ[\"AGGREGATE_PATH\"]\nstep = f\"switch-{direction}\"\
        \n\nssh_base = [\n    \"ssh\", \"-i\", key,\n    \"-o\", \"StrictHostKeyChecking=no\"\
        ,\n    \"-o\", \"UserKnownHostsFile=/dev/null\",\n    \"-o\", \"ConnectTimeout=10\"\

        : {\n        \"pass\": group_count is not None and gshadow_count is not None\
        \ and group_count == gshadow_count,\n        \"group_count\": group_count,\n\
        \        \"gshadow_count\": gshadow_count,\n    },\n    \"services\": {\n\
        \        \"pass\": bool(service_states) and all(state == \"active\" for state\
        \ in service_states),\n        \"states\": service_states,\n    },\n    \"\
        expected_image\": {\n        \"pass\": True if not expected_image else expected_image\

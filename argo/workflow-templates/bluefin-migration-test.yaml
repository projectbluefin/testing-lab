        \ \"StrictHostKeyChecking=no\",\n    \"-o\", \"UserKnownHostsFile=/dev/null\"\
        ,\n    \"-o\", \"ConnectTimeout=10\",\n    \"-o\", \"LogLevel=ERROR\",\n \
        \   f\"{vm_user}@{vm_ip}\",\n]\nscp_base = [\n    \"scp\", \"-i\", key,\n\
        \    \"-o\", \"StrictHostKeyChecking=no\",\n    \"-o\", \"UserKnownHostsFile=/dev/null\"\
        ,\n    \"-o\", \"ConnectTimeout=10\",\n    \"-o\", \"LogLevel=ERROR\",\n]\n\
        \ndef run_remote(command: str) -> subprocess.CompletedProcess:\n    return\

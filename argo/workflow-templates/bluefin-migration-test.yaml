    script:
      command:
      - bash
      image: quay.io/fedora/fedora:latest
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
      source: "set -euo pipefail\nif ! command -v ssh >/dev/null 2>&1; then\n  dnf\
        \ install -y --quiet openssh-clients 2>&1 | tail -2\nfi\n\nVM_IP=\"{{inputs.parameters.vm-ip}}\"\
        \nSSH_USER=\"{{inputs.parameters.ssh-user}}\"\nKEY=\"/etc/ssh/test-key/id_ed25519\"\
        \nSSH=(ssh -i \"${KEY}\" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null\
        \ -o ConnectTimeout=5 -o LogLevel=ERROR \"${SSH_USER}@${VM_IP}\")\n\necho\
        \ \"Requesting reboot for ${VM_IP}...\" >&2\nset +e\n\"${SSH[@]}\" sudo reboot\
        \ >/dev/null 2>&1\nREBOOT_RC=$?\nset -e\necho \"Initial reboot command exit:\
        \ ${REBOOT_RC} (disconnect is expected)\" >&2\n\nSEEN_DOWN=0\nfor _ in $(seq\
        \ 1 24); do\n  if ! \"${SSH[@]}\" true >/dev/null 2>&1; then\n    SEEN_DOWN=1\n\
        \    break\n  fi\n  sleep 5\ndone\nif [[ \"${SEEN_DOWN}\" -eq 0 ]]; then\n\
        \  echo \"WARNING: SSH never went down after reboot request; continuing to\
        \ readiness wait\" >&2\nfi\n\necho \"Waiting for SSH to return on ${VM_IP}...\"\
        \ >&2\nfor _ in $(seq 1 72); do\n  if \"${SSH[@]}\" true >/dev/null 2>&1;\
        \ then\n    echo \"SSH is back on ${VM_IP}\" >&2\n    exit 0\n  fi\n  sleep\
        \ 5\ndone\n\necho \"ERROR: timed out waiting for ${VM_IP} after reboot\" >&2\n\
        exit 1\n"

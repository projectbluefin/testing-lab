apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-containerdisk
  namespace: argo
  annotations:
    description: |
      Build a KubeVirt containerDisk from a bootc image.
      Flow: check (zot existence; short-circuits to "missing" when force=true) → install-to-disk → convert-and-push
      Replaces bib-build-and-push + golden-disk hostDisk approach.
      All build steps are pinned to ghost (loop devices + /var/mnt/ghost-data staging).
spec:
  serviceAccountName: argo
  entrypoint: build-containerdisk
  arguments:
    parameters:
    - name: image
      value: "ghcr.io/projectbluefin/bluefin"
    - name: image-tag
      value: "testing"
    - name: containerdisk-tag
      value: "testing"
      # force=true skips the Zot existence check and always rebuilds.
      # Used by digest-watch when the upstream GHCR digest changes.
    - name: force
      value: "false"
      # disk-size: raw disk pre-allocation for bootc install to-disk.
      # bootc docs: root partition takes all remaining space after EFI (512 MiB) + BIOS (1 MiB).
      # No upstream minimum is specified — size is image-dependent.
      # Source: https://github.com/bootc-dev/bootc/blob/main/docs/src/man/bootc-install-to-disk.8.md
      #
      # Measured compressed layer sizes via skopeo inspect (2026-06):
      #   bluefin:testing  4295 MB compressed → 25G  (native host SELinux; no relabeling pass needed; fits)
      #   bluefin-lts      3153 MB compressed → 25G  (native xfs; CentOS/RHEL grubx64.efi has xfs.mod; fits)
      #   aurora           3405 MB compressed → 30G  (non-native; 25G failed with 282 kB remaining at end of relabeling)
      #   bazzite          4712 MB compressed → 40G  (non-native; not yet measured; scaled from aurora's empirical ratio)
      #   dakota           2927 MB compressed → blocked  (composefs image: declares bootloader=systemd + composefs=yes but ships no UKI; bootc install to-disk requires a signed UKI for composefs path; needs upstream fix or golden-disk approach like GnomeOS)
      # To re-measure: skopeo inspect docker://<image>:<tag> | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(l['Size'] for l in d['LayersData'])//1024//1024,'MB')"
    - name: disk-size
      value: "25G"
  templates:

    # ─── Top-level DAG ────────────────────────────────────────────────────────

  - name: build-containerdisk
    inputs:
      parameters:
      - name: image              # e.g. ghcr.io/projectbluefin/bluefin
      - name: image-tag          # e.g. testing, lts-testing
      - name: containerdisk-tag      # tag to push: 192.168.1.102:30500/bluefin-containerdisk:<tag>
      - name: force              # "true" skips check and always rebuilds
        value: "false"
      - name: disk-size          # raw disk pre-allocation for bootc install
        value: "25G"
    dag:
      tasks:
          # check always runs; when force=true it short-circuits to "missing" inside the script.
      - name: check
        template: check
        arguments:
          parameters:
          - name: containerdisk-tag
            value: "{{inputs.parameters.containerdisk-tag}}"
          - name: force
            value: "{{inputs.parameters.force}}"

          # Skipped only when check outputs "exists" (already up-to-date).
      - name: install-to-disk
        depends: "check.Succeeded"
        when: "'{{tasks.check.outputs.result}}' != 'exists'"
        template: install-to-disk
        arguments:
          parameters:
          - name: image
            value: "{{inputs.parameters.image}}"
          - name: image-tag
            value: "{{inputs.parameters.image-tag}}"
          - name: containerdisk-tag
            value: "{{inputs.parameters.containerdisk-tag}}"
          - name: disk-size
            value: "{{inputs.parameters.disk-size}}"

          # Skipped when check=exists (install-to-disk skipped → this skips too).
      - name: convert-and-push
        depends: install-to-disk.Succeeded
        template: convert-and-push
        arguments:
          parameters:
          - name: image
            value: "{{inputs.parameters.image}}"
          - name: image-tag
            value: "{{inputs.parameters.image-tag}}"
          - name: containerdisk-tag
            value: "{{inputs.parameters.containerdisk-tag}}"
          - name: disk-size
            value: "{{inputs.parameters.disk-size}}"

    # ─── check ────────────────────────────────────────────────────────────────
    # Checks whether the containerDisk image already exists in the local Zot registry.
    # Outputs: "exists" | "missing"
    # When force=true, always outputs "missing" without a network call.

  - name: check
    inputs:
      parameters:
      - name: containerdisk-tag
      - name: force
        value: "false"
    nodeSelector:
      kubernetes.io/hostname: ghost
    script:
      image: quay.io/skopeo/stable:latest
      command: [sh]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      source: |
        set -euo pipefail
        if [[ "{{inputs.parameters.force}}" == "true" ]]; then
          echo "missing"
          exit 0
        fi
        TAG="{{inputs.parameters.containerdisk-tag}}"
        CD_IMAGE="192.168.1.102:30500/bluefin-containerdisk:${TAG}"
        EXISTS=$(skopeo inspect --tls-verify=false --format '{{.Digest}}' \
          "docker://${CD_IMAGE}" 2>/dev/null || echo "")
        if [[ -n "$EXISTS" ]]; then
          echo "exists"
        else
          echo "missing"
        fi

    # ─── install-to-disk ──────────────────────────────────────────────────────
    # Uses podman to run the Bluefin image and invoke bootc install to-disk.
    # This is the supported automation path: bootc needs to run inside a podman
    # container to detect its source image and root filesystem correctly.

  - name: install-to-disk
    inputs:
      parameters:
      - name: image
      - name: image-tag
      - name: containerdisk-tag
      - name: disk-size
        value: "25G"
    nodeSelector:
      kubernetes.io/hostname: ghost
    volumes:
    - name: dev
      hostPath:
        path: /dev
    - name: run-udev
      hostPath:
        path: /run/udev
    - name: staging
      hostPath:
        path: /var/mnt/ghost-data/bluefin-cd-build
        type: DirectoryOrCreate
    script:
      image: "{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
      command: [bash]
      securityContext:
        privileged: true
        runAsUser: 0
      resources:
        requests:
          cpu: "4"
          memory: 4Gi
        limits:
          cpu: "8"
          memory: 12Gi
      env:
      - name: SSH_AUTHORIZED_KEYS
        valueFrom:
          secretKeyRef:
            name: bluefin-test-ssh-key
            key: id_ed25519.pub
      volumeMounts:
      - name: dev
        mountPath: /dev
      - name: run-udev
        mountPath: /run/udev
      - name: staging
        mountPath: /mnt/staging
      source: |
        set -euo pipefail
        TAG="{{inputs.parameters.containerdisk-tag}}"
        IMAGE="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
        STAGING="/mnt/staging/${TAG}"
        DISK="${STAGING}/disk.raw"
        BUILDLOG="${STAGING}/build.log"

        mkdir -p "${STAGING}"
        exec > >(tee -a "${BUILDLOG}") 2>&1

        echo "[BUILD] start: $(date -u) image=${IMAGE} disk-size={{inputs.parameters.disk-size}}"

        if [[ -f "${DISK}" ]]; then
          echo "Removing stale disk: ${DISK}"
          losetup -j "${DISK}" | awk -F: '{print $1}' | xargs -r losetup -d 2>/dev/null || true
          rm -f "${DISK}"
        fi

        truncate -s "{{inputs.parameters.disk-size}}" "${DISK}"

        echo "${SSH_AUTHORIZED_KEYS}" > "${STAGING}/root-ssh-keys"

        if [[ ! -f /usr/libexec/bootupd ]]; then
          echo '[INNER] bootupd missing, installing...'
          if which dnf >/dev/null 2>&1; then dnf install -y bootupd 2>&1 | tail -3; elif which yum >/dev/null 2>&1; then yum install -y bootupd 2>&1 | tail -3; else apk add --no-cache bootupd 2>&1 | tail -3 || echo '[INNER] WARNING: could not install bootupd'; fi
        fi

        # fsetxattr EINVAL fix
        if which gcc &>/dev/null; then
          printf '%s\n' \
            '#define _GNU_SOURCE' \
            '#include <dlfcn.h>' \
            '#include <string.h>' \
            '#include <errno.h>' \
            '#include <stddef.h>' \
            'typedef int (*fn_t)(int,const char*,const void*,size_t,int);' \
            'int fsetxattr(int fd,const char*n,const void*v,size_t s,int f){' \
            '  static fn_t real;' \
            '  if(!real)real=(fn_t)dlsym(RTLD_NEXT,"fsetxattr");' \
            '  int r=real(fd,n,v,s,f);' \
            '  if(r==-1&&errno==EINVAL&&n&&strncmp(n,"security.",9)==0){errno=0;return 0;}' \
            '  return r;}' \
            > /tmp/fsetxattr_wrap.c
          gcc -shared -fPIC -o /tmp/fsetxattr_wrapper.so /tmp/fsetxattr_wrap.c -ldl
          export LD_PRELOAD=/tmp/fsetxattr_wrapper.so
          echo '[INNER] fsetxattr wrapper compiled and loaded'
        fi

        LOCAL_IMAGE="192.168.1.102:30501/${IMAGE#*/}"

        # Use the image's native filesystem (no --filesystem override).
        # bluefin:testing → Fedora → btrfs (native).
        # bluefin-lts:testing → CentOS/RHEL → xfs (native).
        # Forcing btrfs on LTS broke GRUB EFI: CentOS grubx64.efi lacks btrfs.mod.
        bootc install to-disk \
          --source-imgref "docker://${IMAGE}" \
          --generic-image \
          --target-no-signature-verification \
          --disable-selinux \
          --root-ssh-authorized-keys "${STAGING}/root-ssh-keys" \
          --via-loopback \
          "${DISK}"

        # Some images (e.g. bluefin-lts/CentOS) disable sshd by default for desktop use.
        # The test lab requires SSH access, so enable sshd.service in the ostree deployment.
        echo "[POST-INSTALL] Enabling sshd.service for lab access..."
        LOOP_DEV=$(losetup -f --show -P "${DISK}")
        SYSROOT=$(mktemp -d)
        SSHD_ENABLED=false
        for PARTNUM in 4 3 2; do
          PART="${LOOP_DEV}p${PARTNUM}"
          [ -b "${PART}" ] || continue
          if mount "${PART}" "${SYSROOT}" 2>/dev/null; then
            echo "[POST-INSTALL] mounted ${PART}, listing ostree deploy dirs:"
            find "${SYSROOT}/ostree/deploy" -maxdepth 5 -name "*.0" -type d 2>/dev/null | head -10
            # Match ostree/deploy/<osname>/deploy/<hash>.0 (exclude backing/ which is the composefs object store)
            DEPLOY_DIR=$(find "${SYSROOT}/ostree/deploy" -maxdepth 5 -name "*.0" -type d \
              -not -path "*/backing/*" 2>/dev/null | head -1)
            echo "[POST-INSTALL] deploy dir: ${DEPLOY_DIR:-NOT FOUND}"
            if [ -n "${DEPLOY_DIR}" ]; then
              WANTS="${DEPLOY_DIR}/etc/systemd/system/multi-user.target.wants/sshd.service"
              if [ ! -e "${WANTS}" ]; then
                mkdir -p "$(dirname "${WANTS}")"
                ln -sf /usr/lib/systemd/system/sshd.service "${WANTS}"
                echo "[POST-INSTALL] sshd.service enabled in ${DEPLOY_DIR}"
              else
                echo "[POST-INSTALL] sshd.service already enabled"
              fi
              SSHD_ENABLED=true
              umount "${SYSROOT}"
              break
            fi
            umount "${SYSROOT}"
          fi
        done
        rmdir "${SYSROOT}" 2>/dev/null || true
        losetup -d "${LOOP_DEV}" 2>/dev/null || true
        if [ "${SSHD_ENABLED}" = false ]; then
          echo "[POST-INSTALL] WARNING: could not find ostree deploy dir to enable sshd"
        fi

  - name: convert-and-push
    inputs:
      parameters:
      - name: image
      - name: image-tag
      - name: containerdisk-tag
      - name: disk-size
    nodeSelector:
      kubernetes.io/hostname: ghost
    volumes:
    - name: staging
      hostPath:
        path: /var/mnt/ghost-data/bluefin-cd-build
        type: DirectoryOrCreate
    script:
      image: quay.io/fedora/fedora:latest
      command: [sh]
      securityContext:
        privileged: true
        runAsUser: 0
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
      volumeMounts:
      - name: staging
        mountPath: /mnt/staging
      source: |
        set -euo pipefail

        dnf install -y qemu-img jq buildah

        # Flush all page-cache dirty pages to disk before reading the raw disk.
        # The install-to-disk pod's btrfs writes land in the kernel page cache for
        # disk.raw; without sync, qemu-img may read stale on-disk blocks if the
        # NVMe hasn't received the flushed writes yet.
        sync

        TAG="{{inputs.parameters.containerdisk-tag}}"
        STAGING="/mnt/staging/${TAG}"
        RAW="${STAGING}/disk.raw"
        QCOW="${STAGING}/containerdisk.qcow2"
        DEST="192.168.1.102:30500/bluefin-containerdisk:${TAG}"

        echo "Converting ${RAW} to qcow2..."
        qemu-img convert -f raw -O qcow2 -p "${RAW}" "${QCOW}"
        echo "qcow2 size: $(du -sh "${QCOW}" | cut -f1)"

        echo "Building containerDisk OCI image..."
        cat << 'JSON' > "${STAGING}/containerDisk.json"
        {
          "volumes": [
            {
              "image": "disk.qcow2",
              "capacity": "{{inputs.parameters.disk-size}}"
            }
          ]
        }
        JSON
        CTR=$(buildah from scratch)
        buildah copy --chown 107:107 "${CTR}" "${QCOW}" /disk/disk.qcow2
        buildah copy "${CTR}" "${STAGING}/containerDisk.json" /containerDisk.json
        buildah commit "${CTR}" "${DEST}"

        echo "Pushing to ${DEST}..."
        buildah push --tls-verify=false "${DEST}"
        buildah rm "${CTR}" 2>/dev/null || true

        # Update the image-polling-digests ConfigMap so check() can detect staleness.
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        IMAGE="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
        REMOTE_DIGEST=$(skopeo inspect --no-creds "docker://${IMAGE}" 2>/dev/null \
          | jq -r .Digest \
          || echo "")
        if [[ -n "${REMOTE_DIGEST}" ]]; then
          curl -sf --cacert "${CACERT}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/strategic-merge-patch+json" \
            -X PATCH \
            "https://kubernetes.default.svc/api/v1/namespaces/argo/configmaps/image-polling-digests" \
            -d "{\"data\":{\"containerdisk-${TAG}\": \"${REMOTE_DIGEST}\"}}" \
            > /dev/null && echo "Updated digest: containerdisk-${TAG}=${REMOTE_DIGEST}" \
            || echo "WARN: digest update failed (non-fatal)"
        fi

        echo "Cleaning staging..."
        rm -f "${RAW}" "${QCOW}"

        echo "Done: ${DEST}"









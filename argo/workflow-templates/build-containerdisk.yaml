apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-containerdisk
  namespace: argo
  annotations:
    description: |
      Build a KubeVirt containerDisk from a bootc image.
      Flow: check (zot existence) → install-to-disk → configure-disk → convert-and-push
      Replaces bib-build-and-push + golden-disk hostDisk approach.
      All build steps are pinned to ghost (loop devices + /var/mnt/ghost-data staging).
spec:
  serviceAccountName: argo
  entrypoint: build-containerdisk
  arguments:
    parameters:
      - name: image
        value: "ghcr.io/projectbluefin/bluefin"
      - name: image-tag
        value: "testing"
      - name: containerdisk-tag
        value: "testing"
  templates:

    # ─── Top-level DAG ────────────────────────────────────────────────────────

    - name: build-containerdisk
      inputs:
        parameters:
          - name: image          # e.g. ghcr.io/projectbluefin/bluefin
          - name: image-tag      # e.g. testing, lts-testing
          - name: containerdisk-tag  # tag to push: 192.168.1.102:30500/bluefin-containerdisk:<tag>
      dag:
        tasks:
          - name: check
            template: check
            arguments:
              parameters:
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"

          # Skipped when check=exists; skipped → everything downstream skips too.
          - name: install-to-disk
            depends: check.Succeeded
            when: "'{{tasks.check.outputs.result}}' != 'exists'"
            template: install-to-disk
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"

          - name: configure-disk
            depends: install-to-disk.Succeeded
            template: configure-disk
            arguments:
              parameters:
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"

          - name: convert-and-push
            depends: configure-disk.Succeeded
            template: convert-and-push
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"

    # ─── check ────────────────────────────────────────────────────────────────
    # Checks whether the containerDisk image already exists in the local Zot registry.
    # Outputs: "exists" | "missing"

    - name: check
      inputs:
        parameters:
          - name: containerdisk-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      tolerations:
        - key: node-role.kubernetes.io/gaming
          operator: Exists
          effect: NoSchedule
      script:
        image: quay.io/skopeo/stable:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.containerdisk-tag}}"
          CD_IMAGE="192.168.1.102:30500/bluefin-containerdisk:${TAG}"
          EXISTS=$(skopeo inspect --tls-verify=false --format '{{.Digest}}' \
            "docker://${CD_IMAGE}" 2>/dev/null || echo "")
          if [[ -n "$EXISTS" ]]; then
            echo "exists"
          else
            echo "missing"
          fi

    # ─── install-to-disk ──────────────────────────────────────────────────────
    # Uses podman to run the Bluefin image and invoke bootc install to-disk.
    # This is the supported automation path: bootc needs to run inside a podman
    # container to detect its source image and root filesystem correctly.

    - name: install-to-disk
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: containerdisk-tag
      synchronization:
        mutexes:
          - name: ghost-heavy-compute
            namespace: argo
      nodeSelector:
        kubernetes.io/hostname: ghost
      tolerations:
        - key: node-role.kubernetes.io/gaming
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: run-udev
          hostPath:
            path: /run/udev
        - name: staging
          hostPath:
            path: /var/mnt/ghost-data/bluefin-cd-build
            type: DirectoryOrCreate
      script:
        image: quay.io/podman/stable:latest
        command: [bash]
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "8"
            memory: 16Gi
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: run-udev
            mountPath: /run/udev
          - name: staging
            mountPath: /mnt/staging
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.containerdisk-tag}}"
          IMAGE="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
          STAGING="/mnt/staging/${TAG}"
          DISK="${STAGING}/disk.raw"

          mkdir -p "${STAGING}"

          if [[ -f "${DISK}" ]]; then
            echo "Removing stale disk: ${DISK}"
            losetup -j "${DISK}" | awk -F: '{print $1}' | xargs -r losetup -d
            rm -f "${DISK}"
          fi

          truncate -s 15G "${DISK}"

          # Configure podman storage to use the staging hostPath (large NVMe) instead of
          # ephemeral pod storage, which would be evicted when pull fills it with ~5GB of layers.
          mkdir -p /mnt/staging/podman-storage
          mkdir -p /etc/containers
          printf '[storage]\ndriver = "overlay"\nrunRoot = "/mnt/staging/podman-storage/run"\ngraphRoot = "/mnt/staging/podman-storage/graph"\n' \
            > /etc/containers/storage.conf

          # Pull image (uses zot-ghcr mirror if cached)
          podman pull --tls-verify=true "${IMAGE}"

          # Configure cgroupfs to avoid systemd cgroup manager conflict in k8s.
          printf '[engine]\ncgroup_manager = "cgroupfs"\n' > /etc/containers/containers.conf

          # Run bootc install to-disk inside the Bluefin container via podman.
          # Key: the inner container creates its OWN loop device with --partscan (-P).
          # If the outer container held the loop device open, BLKRRPART would return EINVAL
          # and bootc would fail with "Device has no children".  Creating the loop device
          # inside the inner container avoids that competing lock.
          # Mount staging to /var/tmp/disk-staging — /mnt may not exist in the Bluefin OCI image.
          podman run --rm --privileged --pid=host \
            -v /dev:/dev \
            -v /run/udev:/run/udev \
            -v "${STAGING}:/var/tmp/disk-staging" \
            "${IMAGE}" \
            bash -c "
              set -euo pipefail
              LOOP=\$(losetup -f --show -P /var/tmp/disk-staging/disk.raw)
              echo 'Inner loop: '\"\${LOOP}\"
              trap 'losetup -d \"\$LOOP\" 2>/dev/null || true' EXIT
              bootc install to-disk \
                --generic-image \
                --filesystem=btrfs \
                --source-imgref 'docker://${IMAGE}' \
                --target-no-signature-verification \
                \"\${LOOP}\"
            " || {
            EXIT=$?
            # bootc#2246: check ALLOCATED blocks (not logical size — sparse file is always 15G).
            # A sparse file has 0 blocks; a written disk has millions.  >0 means data was written.
            ALLOCATED=$(stat -c%b "${DISK}" 2>/dev/null || echo 0)
            if [[ "${ALLOCATED}" -gt 0 ]]; then
              echo "WARNING: bootc exited ${EXIT} but disk has ${ALLOCATED} allocated blocks (bootc#2246) — continuing"
              umount -l /mnt 2>/dev/null || true
            else
              losetup -j "${DISK}" | awk -F: '{print $1}' | xargs -r losetup -d
              rm -f "${DISK}"
              exit "${EXIT}"
            fi
          }

          # Clean up any leftover loop devices for this file
          losetup -j "${DISK}" | awk -F: '{print $1}' | xargs -r losetup -d
          chown 107:107 "${DISK}"
          echo "install-to-disk complete: ${DISK} ($(stat -c%s "${DISK}") bytes)"

    # ─── configure-disk ───────────────────────────────────────────────────────
    # Loop-mounts the raw disk and injects test user, SSH, GDM autologin, sudoers,
    # and selinux=0 into the ostree deploy. gnome-ponytail-daemon is NOT injected
    # here — run-gnome-tests installs it at runtime via ostree admin unlock.

    - name: configure-disk
      inputs:
        parameters:
          - name: containerdisk-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      tolerations:
        - key: node-role.kubernetes.io/gaming
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: staging
          hostPath:
            path: /var/mnt/ghost-data/bluefin-cd-build
            type: DirectoryOrCreate
      script:
        image: registry.access.redhat.com/ubi9/ubi:9.5
        command: [bash]
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
        env:
          - name: SSH_AUTHORIZED_KEYS
            valueFrom:
              secretKeyRef:
                name: bluefin-test-ssh-key
                key: id_ed25519.pub
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: staging
            mountPath: /mnt/staging
        source: |
          set -euo pipefail
          # util-linux (losetup) is pre-installed in ubi9; btrfs mount needs no extra packages.

          TAG="{{inputs.parameters.containerdisk-tag}}"
          DISK="/mnt/staging/${TAG}/disk.raw"

          if [[ ! -f "${DISK}" ]]; then
            echo "ERROR: disk not found: ${DISK}" >&2
            exit 1
          fi

          LOOP=$(losetup -f --show "${DISK}")
          echo "Loop: ${LOOP} for ${DISK}"
          # Force kernel to enumerate partitions (losetup -P alone may not work in k8s /dev bind-mount)
          partx -a "${LOOP}" 2>/dev/null || partx -u "${LOOP}" 2>/dev/null || true
          sleep 0.5
          echo "Partition devices: $(ls ${LOOP}p* 2>/dev/null || echo 'none')"

          cleanup() {
            umount /mnt/btroot 2>/dev/null || true
            losetup -d "${LOOP}" 2>/dev/null || true
          }
          trap cleanup EXIT

          # bootc install to-disk creates: p1=BIOS(1M) p2=EFI(512M) p3=btrfs-root
          # Bluefin btrfs layout: default root IS the system root (subvols: boot, ostree).
          # There is no subvol named "root" — mount without subvol option.
          mkdir -p /mnt/btroot
          blkid "${LOOP}p3" || true
          mount -t btrfs "${LOOP}p3" /mnt/btroot
          echo "btrfs root contents: $(ls /mnt/btroot)"
          echo "[DIAG] btrfs subvolumes:"
          btrfs subvolume list /mnt/btroot 2>/dev/null || echo "[DIAG] btrfs cmd unavailable"
          echo "[DIAG] var/ contents: $(ls /mnt/btroot/var/ 2>/dev/null | head -5 || echo EMPTY)"


          # Locate the active ostree deploy directory (stateroot varies by image)
          DEPLOY=$(find /mnt/btroot/ostree/deploy/*/deploy/ \
            -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
          if [[ -z "${DEPLOY}" ]]; then
            echo "ERROR: ostree deploy path not found under /mnt/btroot/ostree/deploy/" >&2
            exit 1
          fi
          echo "Deploy: ${DEPLOY}"

          ETC="${DEPLOY}/etc"

          # ── User: bluefin-test (uid/gid 1001) ────────────────────────────
          if ! grep -q "^bluefin-test:" "${ETC}/passwd" 2>/dev/null; then
            echo "bluefin-test:x:1001:1001:Bluefin Test User:/var/home/bluefin-test:/bin/bash" \
              >> "${ETC}/passwd"
          fi
          if ! grep -q "^bluefin-test:" "${ETC}/shadow" 2>/dev/null; then
            # Locked password (!) — SSH key auth only
            echo "bluefin-test:!:19000:0:99999:7:::" >> "${ETC}/shadow"
          fi
          if ! grep -q "^bluefin-test:" "${ETC}/group" 2>/dev/null; then
            echo "bluefin-test:x:1001:" >> "${ETC}/group"
          fi
          # Add bluefin-test to wheel group for sudo
          sed -i 's/^\(wheel:x:10:.*\)$/\1,bluefin-test/' "${ETC}/group" 2>/dev/null || true

          # ── SSH authorized_keys ───────────────────────────────────────────
          # ostree/bootc layout: runtime /var is bind-mounted from
          # /ostree/deploy/<stateroot>/var on the raw btrfs. Writing to
          # /mnt/btroot/var/ goes to the btrfs root-level var (unused at
          # runtime). We must write to /mnt/btroot/ostree/deploy/*/var/.
          VAR_DIR=$(find /mnt/btroot/ostree/deploy/*/var -maxdepth 0 -type d 2>/dev/null | head -1)
          echo "btrfs ostree var dir: ${VAR_DIR:-NOT FOUND}"
          echo "btrfs top-level var/: $(ls /mnt/btroot/var/ 2>/dev/null | head -5 || echo EMPTY)"
          if [[ -z "${VAR_DIR}" ]]; then
            echo "ERROR: ostree var dir not found under /mnt/btroot/ostree/deploy/" >&2
            exit 1
          fi
          HOME_DIR="${VAR_DIR}/home/bluefin-test"
          mkdir -p "${HOME_DIR}/.ssh"
          printf '%s\n' "${SSH_AUTHORIZED_KEYS}" > "${HOME_DIR}/.ssh/authorized_keys"
          chmod 700 "${HOME_DIR}/.ssh"
          chmod 600 "${HOME_DIR}/.ssh/authorized_keys"
          chown -R 1001:1001 "${HOME_DIR}"
          echo "SSH key injected: $(ls -la ${HOME_DIR}/.ssh/)"

          # ── sshd: enable + key auth config ───────────────────────────────
          WANTS="${ETC}/systemd/system/multi-user.target.wants"
          mkdir -p "${WANTS}"
          ln -sf /usr/lib/systemd/system/sshd.service "${WANTS}/sshd.service" \
            2>/dev/null || true

          mkdir -p "${ETC}/ssh/sshd_config.d"
          # StrictModes no: bypass file-permission checks (avoids SELinux context issues).
          # PubkeyAuthentication yes: explicit — some distro configs override the default.
          # AuthorizedKeysFile: explicit path relative to home dir.
          printf 'PermitUserEnvironment yes\nPubkeyAuthentication yes\nAuthorizedKeysFile .ssh/authorized_keys\nStrictModes no\n' \
            > "${ETC}/ssh/sshd_config.d/10-test.conf"
          echo "sshd config written: $(cat ${ETC}/ssh/sshd_config.d/10-test.conf)"

          # ── SELinux: disable via config file (belt-and-suspenders) ────────
          # The kernel arg selinux=0 is also added below, but the config file
          # is more reliable when bootloader entry patching misses an entry.
          mkdir -p "${ETC}/selinux"
          printf 'SELINUX=disabled\nSELINUXTYPE=targeted\n' \
            > "${ETC}/selinux/config"
          echo "SELinux config: $(cat ${ETC}/selinux/config)"

          # ── GDM autologin ─────────────────────────────────────────────────
          mkdir -p "${ETC}/gdm"
          cat > "${ETC}/gdm/custom.conf" <<'GDMEOF'
          [daemon]
          AutomaticLoginEnable=True
          AutomaticLogin=bluefin-test
          GDMEOF

          # ── sudoers ───────────────────────────────────────────────────────
          mkdir -p "${ETC}/sudoers.d"
          printf 'bluefin-test ALL=(ALL) NOPASSWD:ALL\n' \
            > "${ETC}/sudoers.d/bluefin-test"
          chmod 440 "${ETC}/sudoers.d/bluefin-test"

          # ── selinux=0 in bootloader entries ───────────────────────────────
          # Entries are inside the btrfs root at /boot/loader/entries/ (no separate /boot partition)
          ENTRIES_FOUND=0
          while IFS= read -r -d '' entry; do
            sed -i 's/\(^options .*\)$/\1 selinux=0/' "${entry}"
            echo "Patched selinux=0 in: ${entry}"
            ENTRIES_FOUND=$((ENTRIES_FOUND + 1))
          done < <(find /mnt/btroot/boot/loader/entries/ -name "*.conf" -print0 2>/dev/null)
          echo "Boot entries patched: ${ENTRIES_FOUND}"
          if [[ "${ENTRIES_FOUND}" -eq 0 ]]; then
            echo "WARNING: no bootloader entries found — selinux=0 kernel arg NOT applied" >&2
            echo "Boot dir contents: $(find /mnt/btroot/boot/ -maxdepth 3 2>/dev/null | head -20)"
          fi

          echo "configure-disk complete"
          # trap cleanup EXIT handles unmount + losetup -d

    # ─── convert-and-push ─────────────────────────────────────────────────────
    # qemu-img raw→qcow2, buildah OCI image, push to local Zot, cleanup staging.

    - name: convert-and-push
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: containerdisk-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      tolerations:
        - key: node-role.kubernetes.io/gaming
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: staging
          hostPath:
            path: /var/mnt/ghost-data/bluefin-cd-build
            type: DirectoryOrCreate
      script:
        image: quay.io/buildah/stable:latest
        command: [bash]
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
        volumeMounts:
          - name: staging
            mountPath: /mnt/staging
        source: |
          set -euo pipefail
          dnf install -y --quiet qemu-img >/dev/null 2>&1

          TAG="{{inputs.parameters.containerdisk-tag}}"
          STAGING="/mnt/staging/${TAG}"
          RAW="${STAGING}/disk.raw"
          QCOW="${STAGING}/containerdisk.qcow2"
          DEST="192.168.1.102:30500/bluefin-containerdisk:${TAG}"

          echo "Converting ${RAW} to qcow2..."
          qemu-img convert -f raw -O qcow2 -p "${RAW}" "${QCOW}"
          echo "qcow2 size: $(du -sh "${QCOW}" | cut -f1)"

          echo "Building containerDisk OCI image..."
          CTR=$(buildah from scratch)
          buildah copy --chown 107:107 "${CTR}" "${QCOW}" /disk/disk.qcow2
          buildah commit "${CTR}" "${DEST}"

          echo "Pushing to ${DEST}..."
          buildah push --tls-verify=false "${DEST}"
          buildah rm "${CTR}" 2>/dev/null || true

          # Update the image-polling-digests ConfigMap so check() can detect staleness.
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          IMAGE="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
          REMOTE_DIGEST=$(skopeo inspect --no-creds "docker://${IMAGE}" 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('Digest',''))" \
            || echo "")
          if [[ -n "${REMOTE_DIGEST}" ]]; then
            curl -sf --cacert "${CACERT}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/strategic-merge-patch+json" \
              -X PATCH \
              "https://kubernetes.default.svc/api/v1/namespaces/argo/configmaps/image-polling-digests" \
              -d "{\"data\":{\"containerdisk-${TAG}\": \"${REMOTE_DIGEST}\"}}" \
              > /dev/null && echo "Updated digest: containerdisk-${TAG}=${REMOTE_DIGEST}" \
              || echo "WARN: digest update failed (non-fatal)"
          fi

          echo "Cleaning staging..."
          rm -f "${RAW}" "${QCOW}"

          echo "Done: ${DEST}"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bluefin-qa-pipeline
  namespace: argo
  labels:
    app.kubernetes.io/component: qa-pipeline
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # ── entrypoint ──────────────────────────────────────────────────────────────
  entrypoint: pipeline

  # ── cleanup VM + hostDisk on any exit (success, failure, timeout) ──────────
  # Also posts GitHub commit status when sha/repo params are supplied (PR runs).
  onExit: cleanup-and-report

  # ── parameters ──────────────────────────────────────────────────────────────
  arguments:
    parameters:
      - name: image
        value: "ghcr.io/projectbluefin/bluefin"
      - name: image-tag
        value: "latest"
      - name: namespace
        value: "bluefin-test"
      # Comma-separated suite names matching tests/ subdirectories
      - name: suites
        value: "smoke,developer"
      # Used to select Ghostty fixtures on dakota builds
      - name: variant
        value: "bluefin"
      - name: ssh-key-secret
        value: "bluefin-test-ssh-key"
      # git ref the test runner clones (test code + step defs). Default `main`;
      # override to test a PR branch end-to-end without merging.
      - name: branch
        value: "main"
      # Optional: supplied by ARC runner on PR runs; empty on nightly CronWorkflow runs.
      # When sha is non-empty, the onExit handler posts a GitHub commit status.
      - name: pr-number
        value: ""
      - name: sha
        value: ""
      - name: repo
        value: ""

  # ── pipeline DAG ─────────────────────────────────────────────────────────────
  templates:
    - name: pipeline
      dag:
        tasks:
          # 1. Ensure the golden disk exists on ghost (BIB build if absent)
          - name: ensure-disk
            templateRef:
              name: bib-build-and-push
              template: ensure-disk
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.image}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"

          # 2. btrfs reflink clone + KubeVirt VM boot → vm-ip
          - name: provision
            depends: "ensure-disk.Succeeded"
            templateRef:
              name: provision-bluefin-vm
              template: provision-vm
            arguments:
              parameters:
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: vm-name
                  value: "bluefin-test-{{workflow.uid}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"

          # 3a. Phase 1 — smoke (behave + qecore, every PR)
          - name: run-smoke
            depends: "provision.Succeeded"
            when: "'{{workflow.parameters.suites}}' =~ 'smoke'"
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{tasks.provision.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "smoke"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

          # 3b. Phase 2 — developer tools (sequential after smoke)
          - name: run-developer
            depends: "run-smoke.Succeeded"
            when: "'{{workflow.parameters.suites}}' =~ 'developer'"
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{tasks.provision.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "developer"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

          # 3c. Phase 3 — software management (sequential, only if in suites list)
          - name: run-software
            depends: "run-developer.Succeeded"
            when: "'{{workflow.parameters.suites}}' =~ 'software'"
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{tasks.provision.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "software"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

              # 3d. Phase 4 — atomic OS contract tests (no Wayland session needed)
          # Runs after all GUI suites to avoid bootc reboot colliding with live Wayland session.
          # run-gnome-tests handles suite=system natively (behave only, no qecore-headless).
          - name: run-system
            depends: "(run-software.Succeeded || run-software.Skipped)"
            when: "'{{workflow.parameters.suites}}' =~ 'system'"
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{tasks.provision.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "system"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

    # ── onExit handler: teardown + optional GitHub commit status ──────────────
    # cleanup-and-report calls teardown unconditionally, then posts GitHub commit
    # status when sha is non-empty (PR runs). Nightly runs leave sha empty → skip.
    - name: cleanup-and-report
      dag:
        tasks:
          - name: teardown
            template: teardown
          - name: post-status
            template: post-github-status
            when: "'{{workflow.parameters.sha}}' != ''"

    # ── post-github-status: posts commit status to GitHub API ──────────────────
    - name: post-github-status
      script:
        image: quay.io/fedora/fedora:latest
        command: [bash]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          STATE=$([ "{{workflow.status}}" = "Succeeded" ] && echo success || echo failure)
          PAYLOAD=$(jq -n \
            --arg state "$STATE" \
            --arg ctx  "ghost-lab" \
            --arg desc "Bluefin lab test $STATE" \
            --arg url  "http://192.168.1.102:32746/workflows/argo/{{workflow.name}}" \
            '{state:$state,context:$ctx,description:$desc,target_url:$url}')
          curl -sf -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/{{workflow.parameters.repo}}/statuses/{{workflow.parameters.sha}}" \
            -d "$PAYLOAD" \
          && echo "Posted $STATE to {{workflow.parameters.repo}}@{{workflow.parameters.sha}}" \
          || echo "WARNING: failed to post commit status (non-fatal)"

    # ── teardown: stop VM → wait VMI gone → delete hostDisk ──────────────────
    - name: teardown
      dag:
        tasks:
          - name: teardown-vm
            templateRef:
              name: teardown-bluefin-vm
              template: teardown-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "bluefin-test-{{workflow.uid}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"

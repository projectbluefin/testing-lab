apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bluefin-qa-pipeline
  namespace: argo
  annotations:
    description: |
      Full Bluefin QA pipeline: assert containerDisk exists in Zot, then run
      parallel test lanes (smoke, developer, system). Each lane provisions a
      fresh KubeVirt VM, runs the behave/qecore suite via SSH, and tears down
      the VM on completion. On PR runs, posts a GitHub commit status on exit.
      The digest-watch CronWorkflow is responsible for keeping the containerDisk
      current — this pipeline fails fast if the disk is missing.
  labels:
    app.kubernetes.io/component: qa-pipeline
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # ── VM concurrency cap — prevents scheduler flooding ────────────────────────
  # Each workflow holds one slot while a VM is live. Waiting workflows queue
  # inside Argo (no VMI objects created) so k8s scheduler stays unburdened.
  # Slot count is in manifests/semaphore-config.yaml — edit there to tune.
  synchronization:
    semaphore:
      configMapKeyRef:
        name: semaphore-config
        key: max-concurrent-vms
  # ── entrypoint ──────────────────────────────────────────────────────────────
  entrypoint: pipeline

  # ── cleanup VM + hostDisk on any exit (success, failure, timeout) ──────────
  # Also posts GitHub commit status when sha/repo params are supplied (PR runs).
  onExit: cleanup-and-report

  # ── parameters ──────────────────────────────────────────────────────────────
  arguments:
    parameters:
      - name: image
        value: "ghcr.io/projectbluefin/bluefin"
      - name: image-tag
        value: "latest"
      - name: namespace
        value: "bluefin-test"
      # Comma-separated suite names matching tests/ subdirectories
      - name: suites
        value: "smoke,developer"
      # Used to select Ghostty fixtures on dakota builds
      - name: variant
        value: "bluefin"
      - name: ssh-key-secret
        value: "bluefin-test-ssh-key"
      # Tag for the containerDisk image in the local Zot registry.
      # Defaults to image-tag for bluefin (testing → bluefin-containerdisk:testing).
      # Override for lts: image-tag=testing (ghcr.io tag) + containerdisk-tag=lts-testing (zot tag).
      - name: containerdisk-tag
        value: "{{workflow.parameters.image-tag}}"
      # git ref the test runner clones (test code + step defs). Default `main`;
      # override to test a PR branch end-to-end without merging.
      - name: branch
        value: "main"
      # Optional: supplied by ARC runner on PR runs; empty on nightly CronWorkflow runs.
      # When sha is non-empty, the onExit handler posts a GitHub commit status.
      - name: pr-number
        value: ""
      - name: sha
        value: ""
      - name: repo
        value: ""
      - name: vm-memory
        value: "8Gi"

  # ── pipeline DAG ─────────────────────────────────────────────────────────────
  templates:
    - name: pipeline
      dag:
        tasks:
          # 1. Assert the containerDisk exists in local Zot registry — fails fast if not.
          # The digest-watch CronWorkflow is responsible for building it when GHCR changes.
          - name: assert-cd
            template: assert-cd
            arguments:
              parameters:
                - name: containerdisk-tag
                  value: "{{workflow.parameters.containerdisk-tag}}"

          # 2. Parallel test lanes — each lane provisions its own VM, runs one suite, tears down
          - name: test-lane
            depends: "assert-cd.Succeeded"
            withItems:
              - smoke
              - developer
              - system
            when: "'{{workflow.parameters.suites}}' =~ '{{item}}'"
            template: lane
            arguments:
              parameters:
                - name: suite
                  value: "{{item}}"
                - name: vm-name
                  # workflow.name is short (e.g. bluefin-qa-lts-7rvk5) and unique; using it
                  # avoids the 63-char Kubernetes label-value limit that full UUID hits with
                  # long variant names like "bluefin-lts-testing-developer-<36-char-uuid>".
                  value: "{{workflow.name}}-{{item}}"
                - name: image-tag
                  value: "{{workflow.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{workflow.parameters.containerdisk-tag}}"
                - name: namespace
                  value: "{{workflow.parameters.namespace}}"
                - name: variant
                  value: "{{workflow.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{workflow.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: vm-memory
                  value: "{{workflow.parameters.vm-memory}}"

    # ── assert-cd: fail fast if containerDisk is missing from Zot ───────────
    # Does NOT build — the digest-watch CronWorkflow owns that responsibility.
    - name: assert-cd
      inputs:
        parameters:
          - name: containerdisk-tag
      script:
        image: quay.io/skopeo/stable:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.containerdisk-tag}}"
          CD_IMAGE="192.168.1.102:30500/bluefin-containerdisk:${TAG}"
          DIGEST=$(skopeo inspect --tls-verify=false --format '{{.Digest}}' \
            "docker://${CD_IMAGE}" 2>/dev/null || echo "")
          if [[ -n "${DIGEST}" ]]; then
            echo "containerdisk ${CD_IMAGE} ready: ${DIGEST}"
          else
            echo "ERROR: containerdisk ${CD_IMAGE} not found in Zot" >&2
            echo "The digest-watch CronWorkflow builds it when GHCR changes." >&2
            echo "Check: argo list -n argo --field-selector metadata.name=~build-cd-sync" >&2
            exit 1
          fi

    # ── lane: provision VM → run suite → teardown (per-suite) ────────────────
    - name: lane
      inputs:
        parameters:
          - name: suite
          - name: vm-name
          - name: image-tag
          - name: containerdisk-tag
          - name: namespace
          - name: variant
          - name: ssh-key-secret
          - name: branch
          - name: vm-memory
      steps:
        - - name: provision
            templateRef:
              name: provision-bluefin-vm
              template: provision-vm
            arguments:
              parameters:
                - name: image-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
                - name: vm-memory
                  value: "{{inputs.parameters.vm-memory}}"
        - - name: run-tests
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{steps.provision.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "{{inputs.parameters.suite}}"
                - name: variant
                  value: "{{inputs.parameters.variant}}"
                - name: ssh-key-secret
                  value: "{{inputs.parameters.ssh-key-secret}}"
                - name: branch
                  value: "{{inputs.parameters.branch}}"
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"
        - - name: teardown
            templateRef:
              name: teardown-bluefin-vm
              template: teardown-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
            continueOn:
              failed: true

    # ── onExit handler: optional GitHub commit status post ───────────────────
    # Each lane tears down its own VM; onExit only needs to report status.
    - name: cleanup-and-report
      dag:
        tasks:
          - name: post-status
            template: post-github-status
            when: "'{{workflow.parameters.sha}}' != ''"

    # ── post-github-status: posts commit status to GitHub API ──────────────────
    - name: post-github-status
      script:
        image: quay.io/fedora/fedora:latest
        command: [bash]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          STATE=$([ "{{workflow.status}}" = "Succeeded" ] && echo success || echo failure)
          PAYLOAD=$(jq -n \
            --arg state "$STATE" \
            --arg ctx  "ghost-lab" \
            --arg desc "Bluefin lab test $STATE" \
            --arg url  "http://192.168.1.102:32746/workflows/argo/{{workflow.name}}" \
            '{state:$state,context:$ctx,description:$desc,target_url:$url}')
          curl -sf -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/{{workflow.parameters.repo}}/statuses/{{workflow.parameters.sha}}" \
            -d "$PAYLOAD" \
          && echo "Posted $STATE to {{workflow.parameters.repo}}@{{workflow.parameters.sha}}" \
          || echo "WARNING: failed to post commit status (non-fatal)"

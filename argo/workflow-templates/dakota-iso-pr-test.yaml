apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: testing-lab:argoproj.io/WorkflowTemplate:argo/dakota-iso-pr-test
    description: "Build a dakota-iso PR branch \u2192 boot in KubeVirt CDROM VM (EFI)\
      \ \u2192 SSH smoke test.\nPipeline: build-iso \u2192 create-vm \u2192 wait-for-live\
      \ \u2192 smoke-test \u2192 teardown-vm\nISO output: /var/mnt/ghost-data/iso-builds/<label>/dakota-live.iso\
      \ (hostPath on ghost)\nLive session SSH: liveuser@<vm-pod-ip> / password: live\
      \ (debug=1 build)\n"
  labels:
    app.kubernetes.io/component: dakota-iso
    app.kubernetes.io/part-of: bluefin-test-suite
  name: dakota-iso-pr-test
  namespace: argo
spec:
  arguments:
    parameters:
    - name: pr
      value: '0'
    - name: branch
      value: main
    - name: label
      value: pr-0
    - name: variant
      value: dakota
  entrypoint: pipeline
  templates:
  - name: pipeline
    steps:
    - - arguments:
          parameters:
          - name: pr
            value: '{{workflow.parameters.pr}}'
          - name: branch
            value: '{{workflow.parameters.branch}}'
          - name: label
            value: '{{workflow.parameters.label}}'
          - name: variant
            value: '{{workflow.parameters.variant}}'
        name: build-iso
        template: build-iso
    - - arguments:
          parameters:
          - name: label
            value: '{{workflow.parameters.label}}'
          - name: variant
            value: '{{workflow.parameters.variant}}'
        name: create-vm
        template: create-vm
    - - arguments:
          parameters:
          - name: label
            value: '{{workflow.parameters.label}}'
        name: wait-for-live
        template: wait-for-live
    - - arguments:
          parameters:
          - name: label
            value: '{{workflow.parameters.label}}'
          - name: pr
            value: '{{workflow.parameters.pr}}'
          - name: branch
            value: '{{workflow.parameters.branch}}'
        name: smoke-test
        template: smoke-test
    - - arguments:
          parameters:
          - name: label
            value: '{{workflow.parameters.label}}'
        name: teardown-vm
        template: teardown-vm
  - activeDeadlineSeconds: 7200
    container:
      args:
      - "set -euo pipefail\ndnf install -y --quiet just squashfs-tools xorriso dosfstools\
        \ mtools isomd5sum buildah 2>&1 | tail -3\n\nLABEL=\"{{inputs.parameters.label}}\"\
        \nVARIANT=\"{{inputs.parameters.variant}}\"\nOUTPUT=\"/var/mnt/ghost-data/iso-builds/${LABEL}\"\
        \nmkdir -p \"${OUTPUT}\"\n\necho \"\u2192 Building ${VARIANT} ISO from branch\
        \ {{inputs.parameters.branch}}\"\ncd /src\njust debug=1 installer_channel=stable\
        \ output_dir=\"${OUTPUT}\" iso-sd-boot \"${VARIANT}\"\n\nISO=\"${OUTPUT}/${VARIANT}-live.iso\"\
        \necho \"\u2713 ISO built: $(ls -lh ${ISO})\"\n\n# Quick GPT sanity check\n\
        xorriso -indev \"${ISO}\" -report_system_area plain 2>/dev/null | grep \"\
        GPT type GUID\" || true\n"
      command:
      - bash
      - -c
      image: quay.io/podman/stable:latest
      resources:
        limits:
          cpu: '16'
          memory: 16Gi
        requests:
          cpu: '8'
          memory: 8Gi
      securityContext:
        privileged: true
        runAsUser: 0
      volumeMounts:
      - mountPath: /dev
        name: dev
      - mountPath: /var/lib/containers/storage
        name: containers-storage
      - mountPath: /var/mnt/ghost-data/iso-builds
        name: iso-output
      - mountPath: /src
        name: src
    initContainers:
    - args:
      - "dnf install -y --quiet git 2>&1 | tail -2\nPR=\"{{inputs.parameters.pr}}\"\
        \nBRANCH=\"{{inputs.parameters.branch}}\"\ngit clone --depth 1 https://github.com/projectbluefin/dakota-iso\
        \ /src\ncd /src\nif [ \"${PR}\" != \"0\" ] && [ -n \"${PR}\" ]; then\n  git\
        \ fetch --depth 1 origin \"refs/pull/${PR}/head\"\n  git checkout FETCH_HEAD\n\
        else\n  git checkout \"${BRANCH}\"\nfi\n"
      command:
      - bash
      - -c
      image: quay.io/fedora/fedora:latest
      name: git-clone
      volumeMounts:
      - mountPath: /src
        name: src
    inputs:
      parameters:
      - name: pr
      - name: branch
      - name: label
      - name: variant
    metadata:
      labels:
        app.kubernetes.io/part-of: bluefin-test-suite
        dakota.io/step: build-iso
    name: build-iso
    nodeSelector:
      kubernetes.io/hostname: ghost
    volumes:
    - hostPath:
        path: /dev
      name: dev
    - hostPath:
        path: /var/mnt/ghost-data/containers-iso-build
        type: DirectoryOrCreate
      name: containers-storage
    - hostPath:
        path: /var/mnt/ghost-data/iso-builds
        type: DirectoryOrCreate
      name: iso-output
    - emptyDir: {}
      name: src
  - inputs:
      parameters:
      - name: label
      - name: variant
    name: create-vm
    resource:
      action: apply
      manifest: "apiVersion: kubevirt.io/v1\nkind: VirtualMachine\nmetadata:\n  name:\
        \ \"dakota-iso-{{inputs.parameters.label}}\"\n  namespace: argo\n  labels:\n\
        \    app: dakota-iso-test\n    argo-workflow: \"{{workflow.name}}\"\nspec:\n\
        \  runStrategy: Always\n  template:\n    metadata:\n      labels:\n      \
        \  kubevirt.io/vm: \"dakota-iso-{{inputs.parameters.label}}\"\n    spec:\n\
        \      nodeSelector:\n        kubernetes.io/hostname: ghost\n      domain:\n\
        \        firmware:\n          bootloader:\n            efi:\n            \
        \  secureBoot: false\n        cpu:\n          cores: 4\n        memory:\n\
        \          guest: 4Gi\n        devices:\n          disks:\n            - name:\
        \ live-cdrom\n              cdrom:\n                bus: sata\n          \
        \    bootOrder: 1\n          interfaces:\n            - name: default\n  \
        \            masquerade: {}\n      networks:\n        - name: default\n  \
        \        pod: {}\n      volumes:\n        - name: live-cdrom\n          hostDisk:\n\
        \            path: /var/mnt/ghost-data/iso-builds/{{inputs.parameters.label}}/{{inputs.parameters.variant}}-live.iso\n\
        \            type: Disk\n"
  - activeDeadlineSeconds: 900
    inputs:
      parameters:
      - name: label
    metadata:
      labels:
        dakota.io/step: wait-for-live
    name: wait-for-live
    nodeSelector:
      kubernetes.io/hostname: ghost
    podSpecPatch: 'hostNetwork: true

      dnsPolicy: ClusterFirstWithHostNet

      '
    script:
      command:
      - bash
      image: cgr.dev/chainguard/kubectl:latest-dev
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
      source: "set -e\nVM=\"dakota-iso-{{inputs.parameters.label}}\"\nNS=\"argo\"\n\
        \necho \"Waiting for VMI Ready...\"\nkubectl wait vmi -n \"${NS}\" \"${VM}\"\
        \ \\\n  --for=condition=Ready --timeout=600s\n\nPOD_IP=$(kubectl get pod -n\
        \ \"${NS}\" \\\n  -l \"kubevirt.io/vm=${VM}\" \\\n  -o jsonpath='{.items[0].status.podIP}')\n\
        \necho \"VMI pod IP: ${POD_IP}\"\necho \"Waiting for SSH (live session boots\
        \ in ~2-3 min)...\"\ntimeout 300 bash -c \\\n  \"until bash -c 'echo >/dev/tcp/${POD_IP}/22'\
        \ 2>/dev/null; do sleep 10; done\"\n\necho \"${POD_IP}\"\n"
  - activeDeadlineSeconds: 600
    inputs:
      parameters:
      - name: label
      - name: pr
      - name: branch
    metadata:
      labels:
        dakota.io/step: smoke-test
    name: smoke-test
    nodeSelector:
      kubernetes.io/hostname: ghost
    podSpecPatch: 'hostNetwork: true

      dnsPolicy: ClusterFirstWithHostNet

      '
    script:
      command:
      - bash
      image: quay.io/fedora/fedora:latest
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      source: "set -euo pipefail\ndnf install -y --quiet openssh-clients sshpass 2>&1\
        \ | tail -1\n\nVM=\"dakota-iso-{{inputs.parameters.label}}\"\nNS=\"argo\"\n\
        \n# Resolve pod IP (we're on hostNetwork)\nPOD_IP=$(kubectl get pod -n \"\
        ${NS}\" \\\n  -l \"kubevirt.io/vm=${VM}\" \\\n  -o jsonpath='{.items[0].status.podIP}'\
        \ 2>/dev/null || true)\n\n# Fallback: kubectl not in this image \u2014 use\
        \ already-known IP from previous step\nSSH_OPTS=\"-o StrictHostKeyChecking=no\
        \ -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=10\"\
        \n\nrun_check() {\n  local name=\"$1\"; local cmd=\"$2\"\n  local result\n\
        \  if result=$(sshpass -p live ssh $SSH_OPTS liveuser@\"${POD_IP}\" \"$cmd\"\
        \ 2>&1); then\n    printf \"\u2705 %-30s %s\\n\" \"${name}\" \"${result}\"\
        \n    return 0\n  else\n    printf \"\u274C %-30s FAILED: %s\\n\" \"${name}\"\
        \ \"${result}\"\n    return 1\n  fi\n}\n\nPASS=0; FAIL=0\ncheck() { run_check\
        \ \"$@\" && PASS=$((PASS+1)) || FAIL=$((FAIL+1)); }\n\necho \"=== Dakota ISO\
        \ Smoke Test \u2014 {{inputs.parameters.label}} ===\"\necho \"Branch: {{inputs.parameters.branch}}\
        \  PR: {{inputs.parameters.pr}}\"\necho \"\"\n\ncheck \"gdm active\"     \
        \  \"systemctl is-active gdm\"\ncheck \"gnome-shell\"      \"pgrep -x gnome-shell\
        \ && echo running\"\ncheck \"wayland socket\"   \"test -S /run/user/1000/wayland-0\
        \ && echo present\"\ncheck \"fisherman binary\" \"test -x /usr/local/bin/fisherman\
        \ && echo present\"\ncheck \"installer config\" \"test -f /etc/bootc-installer/recipe.json\
        \ && echo present\"\ncheck \"live-iso-mode\"    \"test -f /etc/bootc-installer/live-iso-mode\
        \ && echo present\"\ncheck \"bootc installed\"  \"bootc --version 2>/dev/null\
        \ | head -1\"\ncheck \"os-release\"      \"grep ^NAME= /etc/os-release\"\n\
        \necho \"\"\necho \"Result: ${PASS} passed, ${FAIL} failed\"\n[ \"${FAIL}\"\
        \ -eq 0 ] && echo \"VERDICT: PASS\" || { echo \"VERDICT: FAIL\"; exit 1; }\n"
  - inputs:
      parameters:
      - name: label
    name: teardown-vm
    resource:
      action: delete
      manifest: "apiVersion: kubevirt.io/v1\nkind: VirtualMachine\nmetadata:\n  name:\
        \ \"dakota-iso-{{inputs.parameters.label}}\"\n  namespace: argo\n"


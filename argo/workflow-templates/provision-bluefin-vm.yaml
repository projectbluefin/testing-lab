apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: provision-bluefin-vm
  namespace: argo
  annotations:
    description: |
      Provisions a Bluefin test VM using a containerDisk image from the local Zot registry.
      No reflink, no hostDisk, no golden disk required.
      Schedulable on any kubevirt-capable node.
spec:
  serviceAccountName: argo
  arguments: {}
  templates:
    - name: provision-vm
      metadata: {}
      inputs:
        parameters:
          - name: image-tag
            value: "latest"
          - name: vm-name
          - name: namespace
            value: "bluefin-test"
      outputs:
        parameters:
          - name: vm-ip
            valueFrom:
              parameter: '{{steps.wait-for-vm.outputs.result}}'
      steps:
        - - name: create-vm
            template: create-vm
            arguments:
              parameters:
                - name: image-tag
                  value: '{{inputs.parameters.image-tag}}'
                - name: vm-name
                  value: '{{inputs.parameters.vm-name}}'
                - name: namespace
                  value: '{{inputs.parameters.namespace}}'
        - - name: wait-for-vm
            template: wait-for-vm-ready
            arguments:
              parameters:
                - name: image-tag
                  value: '{{inputs.parameters.image-tag}}'
                - name: vm-name
                  value: '{{inputs.parameters.vm-name}}'
                - name: namespace
                  value: '{{inputs.parameters.namespace}}'

    - name: create-vm
      metadata:
        labels:
          bluefin.io/step: create-vm
          bluefin.io/variant: "{{inputs.parameters.image-tag}}"
      inputs:
        parameters:
          - name: image-tag
          - name: vm-name
          - name: namespace
      outputs: {}
      tolerations:
        - key: node-role.kubernetes.io/gaming
          operator: Exists
          effect: NoSchedule
      resource:
        action: apply
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"
            labels:
              app: bluefin-test
              argo-workflow: "{{workflow.name}}"
          spec:
            runStrategy: Always
            template:
              metadata:
                labels:
                  kubevirt.io/vm: "{{inputs.parameters.vm-name}}"
              spec:
                nodeSelector:
                  kubevirt.io/schedulable: "true"
                domain:
                  cpu:
                    cores: 4
                  memory:
                    guest: 8Gi
                  devices:
                    disks:
                      - name: rootdisk
                        disk:
                          bus: virtio
                        bootOrder: 1
                    interfaces:
                      - name: default
                        masquerade: {}
                networks:
                  - name: default
                    pod: {}
                volumes:
                  - name: rootdisk
                    containerDisk:
                      image: "192.168.1.102:30500/bluefin-containerdisk:{{inputs.parameters.image-tag}}"

    - name: wait-for-vm-ready
      metadata:
        labels:
          bluefin.io/step: wait-for-vm
          bluefin.io/variant: "{{inputs.parameters.image-tag}}"
      inputs:
        parameters:
          - name: image-tag
          - name: vm-name
          - name: namespace
      nodeSelector:
        kubernetes.io/hostname: ghost
      tolerations:
        - key: node-role.kubernetes.io/gaming
          operator: Exists
          effect: NoSchedule
      outputs: {}
      podSpecPatch: |
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command:
          - bash
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        source: |
          set -e
          NS="{{inputs.parameters.namespace}}"
          VM="{{inputs.parameters.vm-name}}"
          LABEL="kubevirt.io/vm=${VM}"

          echo "Waiting for VMI ${VM} Ready..." >&2
          kubectl wait vmi -n "${NS}" "${VM}" \
            --for=condition=Ready --timeout=600s >&2

          POD_IP=$(kubectl get pod -n "${NS}" -l "${LABEL}" \
            -o jsonpath='{.items[0].status.podIP}')

          echo "Waiting for SSH on ${POD_IP}..." >&2
          timeout 120 bash -c \
            "until bash -c 'echo >/dev/tcp/${POD_IP}/22' 2>/dev/null; do sleep 5; done"

          echo "${POD_IP}"

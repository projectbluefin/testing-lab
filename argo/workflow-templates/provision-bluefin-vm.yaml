apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: provision-bluefin-vm
  namespace: argo
  annotations:
    description: |
      Provisions a Bluefin test VM using a containerDisk image from the local Zot registry.
      No reflink, no hostDisk, no golden disk required.
      Schedulable on any kubevirt-capable node.
spec:
  serviceAccountName: argo
  arguments: {}
  templates:
    - name: provision-vm
      metadata: {}
      inputs:
        parameters:
          - name: image-tag
            value: "latest"
          - name: vm-name
          - name: namespace
            value: "bluefin-test"
          - name: vm-memory
            value: "8Gi"
      outputs:
        parameters:
          - name: vm-ip
            valueFrom:
              parameter: '{{steps.wait-for-vm.outputs.result}}'
      steps:
        - - name: create-vm
            template: create-vm
            arguments:
              parameters:
                - name: image-tag
                  value: '{{inputs.parameters.image-tag}}'
                - name: vm-name
                  value: '{{inputs.parameters.vm-name}}'
                - name: namespace
                  value: '{{inputs.parameters.namespace}}'
                - name: vm-memory
                  value: '{{inputs.parameters.vm-memory}}'
        - - name: wait-for-vm
            template: wait-for-vm-ready
            arguments:
              parameters:
                - name: image-tag
                  value: '{{inputs.parameters.image-tag}}'
                - name: vm-name
                  value: '{{inputs.parameters.vm-name}}'
                - name: namespace
                  value: '{{inputs.parameters.namespace}}'

    - name: create-vm
      metadata:
        labels:
          bluefin.io/step: create-vm
          bluefin.io/variant: "{{inputs.parameters.image-tag}}"
      inputs:
        parameters:
          - name: image-tag
          - name: vm-name
          - name: namespace
          - name: vm-memory
      outputs: {}
      resource:
        action: apply
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"
            labels:
              app: bluefin-test
              argo-workflow: "{{workflow.name}}"
          spec:
            runStrategy: Always
            template:
              metadata:
                labels:
                  kubevirt.io/vm: "{{inputs.parameters.vm-name}}"
              spec:
                # Inject SSH public key at runtime via QEMU guest agent.
                # This is reliable regardless of disk content — KubeVirt connects
                # to the running guest agent and writes ~/.ssh/authorized_keys.
                accessCredentials:
                  - sshPublicKey:
                      source:
                        secret:
                          secretName: bluefin-test-ssh-pubkey
                      propagationMethod:
                        qemuGuestAgent:
                          users:
                            - root
                            - bluefin-test
                domain:
                  cpu:
                    cores: 4
                  memory:
                    guest: "{{inputs.parameters.vm-memory}}"
                  devices:
                    disks:
                      - name: rootdisk
                        disk:
                          bus: virtio
                        bootOrder: 1
                    interfaces:
                      - name: default
                        masquerade: {}
                networks:
                  - name: default
                    pod: {}
                volumes:
                  - name: rootdisk
                    containerDisk:
                      image: "192.168.1.102:30500/bluefin-containerdisk:{{inputs.parameters.image-tag}}"

    - name: wait-for-vm-ready
      metadata:
        labels:
          bluefin.io/step: wait-for-vm
          bluefin.io/variant: "{{inputs.parameters.image-tag}}"
      inputs:
        parameters:
          - name: image-tag
          - name: vm-name
          - name: namespace
      outputs: {}
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command:
          - bash
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        source: |
          set -e
          NS="{{inputs.parameters.namespace}}"
          VM="{{inputs.parameters.vm-name}}"
          LABEL="kubevirt.io/vm=${VM}"

          echo "Waiting for VMI ${VM} Ready..." >&2
          kubectl wait vmi -n "${NS}" "${VM}" \
            --for=condition=Ready --timeout=600s >&2

          # Start sshd.socket via QEMU guest agent.
          # Bluefin's OpenSSH packaging enables sshd.service (persistent daemon) but
          # Fedora's new packaging requires sshd.socket for TCP; the service never
          # auto-starts. Starting sshd.socket explicitly is the reliable fix.
          VIRT_POD=$(kubectl get pod -n "${NS}" -l "${LABEL}" \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Starting sshd.socket in ${VM} via guest agent..." >&2
          kubectl exec -n "${NS}" "${VIRT_POD}" -c compute -- \
            virsh qemu-agent-command 1 \
            '{"execute":"guest-exec","arguments":{"path":"systemctl","arg":["start","sshd.socket"],"capture-output":false}}' \
            >&2 || echo "WARNING: guest-exec for sshd.socket failed, SSH poll will be the arbiter" >&2

          # Wait for SSH key injection (qemuGuestAgent propagation).
          kubectl wait vmi -n "${NS}" "${VM}" \
            --for=condition=AccessCredentialsSynchronized --timeout=120s >&2

          POD_IP=$(kubectl get pod -n "${NS}" -l "${LABEL}" \
            -o jsonpath='{.items[0].status.podIP}')

          echo "Waiting for SSH on ${POD_IP}..." >&2
          timeout 300 bash -c \
            "until bash -c 'echo >/dev/tcp/${POD_IP}/22' 2>/dev/null; do sleep 5; done"

          echo "${POD_IP}"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: homelab-substrate
  namespace: argo
  labels:
    app.kubernetes.io/component: homelab-substrate
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  entrypoint: pipeline
  onExit: cleanup
  serviceAccountName: homelab-runner
  arguments:
    parameters:
      - name: lane
        value: "homelab-substrate"
      - name: branch
        value: "main"
  templates:
    - name: pipeline
      dag:
        tasks:
          - name: create-namespace
            template: create-namespace
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-substrate-{{workflow.uid}}"
          - name: deploy-fixture
            depends: "create-namespace.Succeeded"
            template: deploy-fixture
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-substrate-{{workflow.uid}}"
                - name: lane
                  value: "{{workflow.parameters.lane}}"
          - name: run-tests
            depends: "deploy-fixture.Succeeded"
            templateRef:
              name: run-incluster-tests
              template: run-pytest
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-substrate-{{workflow.uid}}"
                - name: suite-path
                  value: "homelab_substrate"
                - name: lane
                  value: "{{workflow.parameters.lane}}"
                - name: app-label
                  value: "app=homelab-substrate"
                - name: service-name
                  value: "homelab-substrate"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

    - name: create-namespace
      inputs:
        parameters:
          - name: namespace
      resource:
        action: create
        manifest: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{inputs.parameters.namespace}}"
            labels:
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: homelab-substrate

    - name: deploy-fixture
      inputs:
        parameters:
          - name: namespace
          - name: lane
      script:
        image: registry.k8s.io/kubectl:v1.32.0
        command: [bash, -c]
        source: |
          set -euo pipefail
          NS="{{inputs.parameters.namespace}}"
          kubectl apply -n "${NS}" -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: homelab-substrate
            labels:
              app: homelab-substrate
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: "{{inputs.parameters.lane}}"
              bluefin.io/workload-class: substrate
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: homelab-substrate
            template:
              metadata:
                labels:
                  app: homelab-substrate
                  app.kubernetes.io/part-of: bluefin-test-suite
                  bluefin.io/lane: "{{inputs.parameters.lane}}"
                  bluefin.io/workload-class: substrate
              spec:
                containers:
                  - name: nginx
                    image: registry.access.redhat.com/hi/nginx:1.30.0
                    ports:
                      - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: homelab-substrate
            labels:
              app: homelab-substrate
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: "{{inputs.parameters.lane}}"
          spec:
            selector:
              app: homelab-substrate
            ports:
              - name: http
                port: 80
                targetPort: 80
          EOF
          kubectl rollout status deployment/homelab-substrate -n "${NS}" --timeout=300s >&2

    - name: cleanup
      script:
        image: registry.k8s.io/kubectl:v1.32.0
        command: [bash, -c]
        source: |
          set -euo pipefail
          NS="homelab-substrate-{{workflow.uid}}"
          kubectl delete namespace "${NS}" --ignore-not-found=true >&2 || true
          timeout 180 bash -c "until ! kubectl get namespace \"${NS}\" >/dev/null 2>&1; do sleep 5; done" >&2 || true
          echo "cleanup-complete"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: homelab-access-probe
  namespace: argo
  labels:
    app.kubernetes.io/component: homelab-access
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  entrypoint: pipeline
  onExit: cleanup
  serviceAccountName: homelab-runner
  arguments:
    parameters:
      - name: auth-mode
        value: "false"
      - name: branch
        value: "main"
  templates:
    - name: pipeline
      dag:
        tasks:
          - name: create-namespace
            template: create-namespace
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-access-{{workflow.uid}}"
          - name: create-secrets
            depends: "create-namespace.Succeeded"
            template: create-secrets
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-access-{{workflow.uid}}"
          - name: deploy-fixture
            depends: "create-secrets.Succeeded"
            template: deploy-fixture
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-access-{{workflow.uid}}"
                - name: auth-mode
                  value: "{{workflow.parameters.auth-mode}}"
          - name: run-access-tests
            depends: "deploy-fixture.Succeeded"
            when: "'{{workflow.parameters.auth-mode}}' == 'false'"
            templateRef:
              name: run-incluster-tests
              template: run-pytest
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-access-{{workflow.uid}}"
                - name: suite-path
                  value: "homelab_access/test_access_probe.py"
                - name: lane
                  value: "homelab-access"
                - name: app-label
                  value: "app=homelab-access"
                - name: service-name
                  value: "homelab-access"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
          - name: run-https-exposure-tests
            depends: "deploy-fixture.Succeeded"
            when: "'{{workflow.parameters.auth-mode}}' == 'false'"
            templateRef:
              name: run-incluster-tests
              template: run-pytest
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-access-{{workflow.uid}}"
                - name: suite-path
                  value: "homelab_access/test_https_exposure.py"
                - name: lane
                  value: "homelab-https-exposure"
                - name: app-label
                  value: "app=homelab-access"
                - name: service-name
                  value: "homelab-access"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
          - name: run-auth-tests
            depends: "deploy-fixture.Succeeded"
            when: "'{{workflow.parameters.auth-mode}}' == 'true'"
            templateRef:
              name: run-incluster-tests
              template: run-pytest
            arguments:
              parameters:
                - name: namespace
                  value: "homelab-access-{{workflow.uid}}"
                - name: suite-path
                  value: "homelab_access/test_auth_probe.py"
                - name: lane
                  value: "homelab-auth"
                - name: app-label
                  value: "app=homelab-access"
                - name: service-name
                  value: "homelab-access"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

    - name: create-namespace
      inputs:
        parameters:
          - name: namespace
      resource:
        action: create
        manifest: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{inputs.parameters.namespace}}"
            labels:
              app.kubernetes.io/part-of: bluefin-test-suite
              bluefin.io/lane: homelab-access

    - name: create-secrets
      inputs:
        parameters:
          - name: namespace
      script:
        image: quay.io/fedora/fedora:latest
        command: [bash, -c]
        source: |
          set -euo pipefail
          NS="{{inputs.parameters.namespace}}"
          dnf install -y --quiet openssl kubernetes-client 2>&1 | tail -4
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "${TMPDIR}"' EXIT

          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout "${TMPDIR}/tls.key" \
            -out "${TMPDIR}/tls.crt" \
            -days 1 \
            -subj "/CN=homelab-access.local" >/dev/null 2>&1

          kubectl create secret tls homelab-access-tls \
            --cert="${TMPDIR}/tls.crt" \
            --key="${TMPDIR}/tls.key" \
            -n "${NS}" \
            --dry-run=client -o yaml | kubectl apply -f - >&2

          kubectl create secret generic homelab-access-auth \
            --from-literal=username=homelab \
            --from-literal=password=controlnode \
            -n "${NS}" \
            --dry-run=client -o yaml | kubectl apply -f - >&2

    - name: deploy-fixture
      inputs:
        parameters:
          - name: namespace
          - name: auth-mode
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash, -c]
        source: |
          set -euo pipefail
          NS="{{inputs.parameters.namespace}}"
          REQUIRE_AUTH="{{inputs.parameters.auth-mode}}"
          kubectl apply -n "${NS}" -f - <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: homelab-access-server
            labels:
              app: homelab-access
              app.kubernetes.io/part-of: bluefin-test-suite
          data:
            server.py: |
              import base64
              import os
              import ssl
              from http.server import BaseHTTPRequestHandler, HTTPServer
              
              EXPECT_HOST = os.environ.get("EXPECT_HOST", "homelab-access.local")
              REQUIRE_AUTH = os.environ.get("REQUIRE_AUTH", "false").lower() == "true"
              AUTH_USER = os.environ.get("AUTH_USER", "homelab")
              AUTH_PASS = os.environ.get("AUTH_PASS", "controlnode")
              
              class Handler(BaseHTTPRequestHandler):
                  def _authorized(self):
                      header = self.headers.get("Authorization", "")
                      if not header.startswith("Basic "):
                          return False
                      raw = base64.b64decode(header.split(" ", 1)[1]).decode()
                      return raw == f"{AUTH_USER}:{AUTH_PASS}"
              
                  def do_GET(self):
                      if self.headers.get("Host") != EXPECT_HOST:
                          self.send_response(421)
                          self.end_headers()
                          self.wfile.write(b"wrong-host")
                          return
                      if REQUIRE_AUTH and not self._authorized():
                          self.send_response(401)
                          self.send_header("WWW-Authenticate", 'Basic realm="homelab"')
                          self.end_headers()
                          self.wfile.write(b"auth-required")
                          return
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"access-ok")
              
              server = HTTPServer(("0.0.0.0", 8443), Handler)
              context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
              context.load_cert_chain("/tls/tls.crt", "/tls/tls.key")
              server.socket = context.wrap_socket(server.socket, server_side=True)
              server.serve_forever()
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: homelab-access
            labels:
              app: homelab-access
              app.kubernetes.io/part-of: bluefin-test-suite
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: homelab-access
            template:
              metadata:
                labels:
                  app: homelab-access
                  app.kubernetes.io/part-of: bluefin-test-suite
              spec:
                nodeSelector:
                  kubernetes.io/hostname: ghost
                containers:
                  - name: access
                    image: python:3.12-slim
                    command: ["python", "/app/server.py"]
                    ports:
                      - containerPort: 8443
                    env:
                      - name: EXPECT_HOST
                        value: homelab-access.local
                      - name: REQUIRE_AUTH
                        value: "${REQUIRE_AUTH}"
                      - name: AUTH_USER
                        valueFrom:
                          secretKeyRef:
                            name: homelab-access-auth
                            key: username
                      - name: AUTH_PASS
                        valueFrom:
                          secretKeyRef:
                            name: homelab-access-auth
                            key: password
                    volumeMounts:
                      - name: app
                        mountPath: /app
                      - name: tls
                        mountPath: /tls
                volumes:
                  - name: app
                    configMap:
                      name: homelab-access-server
                  - name: tls
                    secret:
                      secretName: homelab-access-tls
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: homelab-access
            labels:
              app: homelab-access
              app.kubernetes.io/part-of: bluefin-test-suite
          spec:
            selector:
              app: homelab-access
            ports:
              - name: https
                port: 8443
                targetPort: 8443
          EOF
          kubectl rollout status deployment/homelab-access -n "${NS}" --timeout=300s >&2

    - name: cleanup
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash, -c]
        source: |
          set -euo pipefail
          NS="homelab-access-{{workflow.uid}}"
          kubectl delete namespace "${NS}" --ignore-not-found=true >&2 || true
          timeout 180 bash -c "until ! kubectl get namespace \"${NS}\" >/dev/null 2>&1; do sleep 5; done" >&2 || true
          echo "cleanup-complete"

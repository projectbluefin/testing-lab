apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pr-poller
  namespace: argo
  labels:
    app.kubernetes.io/component: pr-poller
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  entrypoint: poll-labeled-prs
  templates:
    - name: poll-labeled-prs
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: pr-poller
      script:
        image: quay.io/fedora/fedora:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          set -euo pipefail
          dnf install -y --quiet jq curl 2>/dev/null | tail -1 >&2

          CONTEXT="ghost-lab"
          API="https://api.github.com"

          # Repos tested on every PR — no label required.
          AUTO_REPOS=(
           "projectbluefin/common"
           "projectbluefin/bluefin"
           "projectbluefin/bluefin-lts"
          )

          dispatch_pr() {
           local PR="$1"
           local REPO SHA PR_NUM BRANCH EXISTING TMPL TITLE TITLE_SLUG VM_MEM

           REPO=$(echo "$PR" | jq -r '.base.repo.full_name')
           SHA=$(echo "$PR"  | jq -r '.head.sha')
           PR_NUM=$(echo "$PR" | jq -r '.number')
           BRANCH=$(echo "$PR" | jq -r '.head.ref')
           REPO_SLUG=$(echo "$REPO" | sed 's|.*/||; s/bluefin-lts/lts/; s/bluefin/blu/; s/dakota/dak/; s/knuckle/knu/')
           TITLE=$(echo "$PR" | jq -r '.title')
           # Slugify title: lowercase, non-alnum to dash, truncate to 30 chars
           TITLE_SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
             | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//' \
             | cut -c1-30 | sed 's/-$//')
           # Deps PRs (renovate/chore(deps)/fix(deps)) use 4Gi VMs — fit more concurrently
           if echo "$TITLE" | grep -qiE '^(chore|fix)(\(deps\)|: deps)|^renovate'; then
             VM_MEM="4Gi"
           else
             VM_MEM="8Gi"
           fi

           # Idempotency: skip if ghost-lab status already posted for this SHA
           EXISTING=$(curl -sf \
             -H "Authorization: token ${GITHUB_TOKEN}" \
             -H "Accept: application/vnd.github+json" \
             "${API}/repos/${REPO}/statuses/${SHA}" \
             | jq -r --arg ctx "$CONTEXT" \
               '.[] | select(.context == $ctx) | .state' | head -1)

           if [[ -n "$EXISTING" ]]; then
             echo "PR #${PR_NUM} ${REPO}@${SHA:0:12}: status=${EXISTING}, skip" >&2
             return
           fi

           # Lock: post pending before dispatching to prevent duplicate runs
           curl -sf -X POST \
             -H "Authorization: token ${GITHUB_TOKEN}" \
             -H "Accept: application/vnd.github+json" \
             -H "Content-Type: application/json" \
             "${API}/repos/${REPO}/statuses/${SHA}" \
             -d "$(jq -n --arg ctx "$CONTEXT" \
               '{state:"pending",context:$ctx,description:"Ghost lab queued"}')" \
             > /dev/null
           echo "PR #${PR_NUM} ${REPO}@${SHA:0:12}: locked + dispatching" >&2

          # Route to matching WorkflowTemplate + derive per-repo params
           case "$REPO" in
             */dakota)       TMPL="dakota-qa-pipeline"
                             EXTRA_PARAMS="" ;;
             */knuckle)      TMPL="knuckle-qa-pipeline"
                             EXTRA_PARAMS="" ;;
             */bluefin-lts)  TMPL="bluefin-qa-pipeline"
                             EXTRA_PARAMS="
               - name: image
                 value: ghcr.io/projectbluefin/bluefin-lts
               - name: image-tag
                 value: testing
               - name: containerdisk-tag
                 value: lts-testing
               - name: namespace
                 value: bluefin-lts-test
               - name: suites
                 value: smoke
               - name: vm-memory
                 value: ${VM_MEM}" ;;
             *)              TMPL="bluefin-qa-pipeline"
                             # bluefin/common: smoke only to limit VM count
                             EXTRA_PARAMS="
               - name: image-tag
                 value: testing
               - name: containerdisk-tag
                 value: testing
               - name: suites
                 value: smoke
               - name: vm-memory
                 value: ${VM_MEM}" ;;
           esac

           kubectl create -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
           generateName: "${REPO_SLUG}-${PR_NUM}-${TITLE_SLUG}-"
           namespace: argo
           labels:
             bluefin.io/trigger: pr-auto
             bluefin.io/pr-number: "${PR_NUM}"
          spec:
           workflowTemplateRef:
             name: ${TMPL}
           arguments:
             parameters:
               - name: sha
                 value: "${SHA}"
               - name: repo
                 value: "${REPO}"
               - name: branch
                 value: "${BRANCH}"
               - name: pr-number
                 value: "${PR_NUM}"${EXTRA_PARAMS}
          EOF
           echo "PR #${PR_NUM} ${REPO}: dispatched ${TMPL}" >&2
          }

          # --- Pass 1: every open PR in auto-test repos ---
          for REPO in "${AUTO_REPOS[@]}"; do
           REPO_QUERY=$(jq -rn --arg q "repo:${REPO} is:pr is:open" '$q|@uri')
           PAGE=1
           while true; do
             RESULTS=$(curl -sf \
               -H "Authorization: token ${GITHUB_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               "${API}/search/issues?q=${REPO_QUERY}&per_page=30&page=${PAGE}")
             COUNT=$(echo "$RESULTS" | jq '.total_count // 0')
             ITEMS=$(echo "$RESULTS" | jq '.items | length')
             [[ "$ITEMS" -eq 0 ]] && break
             echo "Repo ${REPO}: ${COUNT} open PR(s), page ${PAGE}, ${ITEMS} items" >&2
             while read -r item; do
               PR_URL=$(echo "$item" | jq -r '.pull_request.url')
               PR=$(curl -sf \
                 -H "Authorization: token ${GITHUB_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "$PR_URL")
               dispatch_pr "$PR"
             done < <(echo "$RESULTS" | jq -c '.items[]')
             [[ "$ITEMS" -lt 30 ]] && break
             (( PAGE++ ))
           done
          done

          # --- Pass 2: label-based catch-all for other repos (dakota, knuckle, etc.) ---
          LABEL_QUERY=$(jq -rn --arg q "org:projectbluefin is:pr is:open label:test-on-lab" '$q|@uri')
          LABEL_RESULTS=$(curl -sf \
           -H "Authorization: token ${GITHUB_TOKEN}" \
           -H "Accept: application/vnd.github+json" \
           "${API}/search/issues?q=${LABEL_QUERY}")
          LABEL_COUNT=$(echo "$LABEL_RESULTS" | jq '.total_count // 0')
          echo "Found ${LABEL_COUNT} PR(s) with test-on-lab label" >&2
          if [[ "$LABEL_COUNT" -gt 0 ]]; then
           while read -r item; do
             PR_URL=$(echo "$item" | jq -r '.pull_request.url')
             PR=$(curl -sf \
               -H "Authorization: token ${GITHUB_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               "$PR_URL")
             dispatch_pr "$PR"
           done < <(echo "$LABEL_RESULTS" | jq -c '.items[]')
          fi

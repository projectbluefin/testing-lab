apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bib-build-and-push
  namespace: argo
  annotations:
    description: |
      Builds a Bluefin disk image via BIB and stores it as a golden disk.raw
      on ghost's hostPath (/var/tmp/bluefin-golden/<tag>/disk.raw).
      No zot push, no buildah wrap — just the raw disk kept for reflink cloning.
spec:
  serviceAccountName: argo
  templates:
    - name: ensure-disk
      inputs:
        parameters:
          - name: image
            value: "ghcr.io/ublue-os/bluefin:latest"
          - name: image-tag
            value: "latest"
          # Root directory for golden disks. Override to /var/tmp/dakota-golden
          # for dakota builds. Default keeps Bluefin pipelines unchanged.
          - name: golden-root
            value: "/var/tmp/bluefin-golden"
      dag:
        tasks:
          # `check` outputs "missing" | "stale" | "exists".
          #   missing — no disk.raw on disk; build path runs
          #   stale   — disk.raw exists but the remote image digest differs from
          #             the stored marker (issue #1); build path runs to refresh
          #   exists  — disk.raw and digest match the remote; pull-image is
          #             skipped via `when`; build+configure cascade-omit via
          #             `depends` (no redundant `when` needed on each).
          - name: check
            template: bib-disk-check
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"
                - name: golden-root
                  value: "{{inputs.parameters.golden-root}}"

          - name: pull-image
            depends: "check.Succeeded"
            when: "{{tasks.check.outputs.result}} != exists"
            template: bib-img-pull
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"

          # Strip pre-compiled PCRE2 binary SELinux policy files (.bin) from the
          # pulled image so osbuild's setfiles regenerates them. Required when the
          # BIB container's setfiles PCRE2 version differs from the version that
          # compiled the policy in the target image (testing-lab#220).
          - name: selinux-prep
            depends: "pull-image.Succeeded || pull-image.Skipped"
            when: "{{tasks.check.outputs.result}} != exists"
            template: bib-selinux-prep
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"

          - name: build
            depends: "selinux-prep.Succeeded || selinux-prep.Skipped"
            template: bib-img-build
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"

          - name: configure
            depends: "build.Succeeded"
            template: bib-disk-configure
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"
                - name: golden-root
                  value: "{{inputs.parameters.golden-root}}"

    # Freshness check: missing | stale | exists.
    # Compares stored remote-digest marker against `skopeo inspect` of the
    # current image. Missing marker is treated as `stale` to force a rebuild
    # and record a digest for future runs.
    - name: bib-disk-check
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: golden-root
            value: "/var/tmp/bluefin-golden"
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: golden
          hostPath:
            path: "{{inputs.parameters.golden-root}}"
            type: DirectoryOrCreate
      script:
        # quay.io/skopeo/stable ships skopeo. quay.io/podman/stable was used
        # previously but dropped skopeo from its image; using it caused silent
        # command-not-found failures that always returned "stale" (testing-lab#222).
        image: quay.io/skopeo/stable:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: golden
            mountPath: "{{inputs.parameters.golden-root}}"
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.image-tag}}"
          IMAGE_REF="{{inputs.parameters.image}}"
          # If the caller passed `image` without a tag (e.g. bluefin-qa-pipeline
          # default), append the explicit image-tag so skopeo inspects the
          # right manifest. `*:*` distinguishes a tag from a `host:port/` ref —
          # all our registries use the default port so no false positives.
          if [[ "${IMAGE_REF}" != *:* ]]; then
            IMAGE_REF="${IMAGE_REF}:${TAG}"
          fi
          GOLDEN_DIR="/var/tmp/bluefin-golden/${TAG}"
          DISK="${GOLDEN_DIR}/disk.raw"
          MARKER="${GOLDEN_DIR}/source-digest"

          if [[ ! -f "${DISK}" ]]; then
            echo -n "missing"
            exit 0
          fi

          SKOPEO_TLS_ARGS=()
          if [[ "${IMAGE_REF}" == 192.168.1.102:30500/* ]]; then
            SKOPEO_TLS_ARGS+=(--tls-verify=false)
          fi
          # Retry with exponential backoff — GHCR rate-limits anonymous skopeo
          # inspects, returning empty output that is misread as stale (testing-lab#222).
          REMOTE=""
          for _attempt in 1 2 3; do
            REMOTE=$(skopeo inspect "${SKOPEO_TLS_ARGS[@]}" --no-tags --format '{{.Digest}}' "docker://${IMAGE_REF}" 2>/dev/null || true)
            [[ -n "${REMOTE}" ]] && break
            echo "skopeo inspect attempt ${_attempt}/3 failed for ${IMAGE_REF}; retrying in $(( _attempt * 15 ))s..." >&2
            sleep $(( _attempt * 15 ))
          done
          if [[ -z "${REMOTE}" ]]; then
            echo "skopeo inspect failed after 3 attempts for ${IMAGE_REF}; treating as stale to force rebuild" >&2
            echo -n "stale"
            exit 0
          fi

          # Explicit `if` instead of `[[ -f ]] && STORED=$(...)` — under
          # `set -e`, the latter's non-zero exit when the marker is absent
          # can terminate the script depending on context.
          STORED=""
          if [[ -f "${MARKER}" ]]; then
            STORED=$(cat "${MARKER}")
          fi

          if [[ "${REMOTE}" == "${STORED}" ]]; then
            echo -n "exists"
          else
            echo "Disk stale: stored=${STORED:-<none>} remote=${REMOTE}" >&2
            echo -n "stale"
          fi

    - name: bib-img-pull
      inputs:
        parameters:
          - name: image
          - name: image-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: containers-storage
          hostPath:
            path: /var/lib/containers/storage
      container:
        image: quay.io/podman/stable:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 2Gi
          limits:
            cpu: "4"
            memory: 4Gi
        volumeMounts:
          - name: containers-storage
            mountPath: /var/lib/containers/storage
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            IMAGE="{{inputs.parameters.image}}"
            TAG="{{inputs.parameters.image-tag}}"
            # Append tag if image ref has none (e.g. ghcr.io/projectbluefin/bluefin).
            # `*:*` distinguishes a tag from a host:port/ prefix.
            if [[ "${IMAGE}" != *:* ]]; then
              IMAGE="${IMAGE}:${TAG}"
            fi
            PULL_ARGS=()
            if [[ "${IMAGE}" == 192.168.1.102:30500/* ]]; then
              PULL_ARGS+=(--tls-verify=false)
            fi
            podman pull "${PULL_ARGS[@]}" "${IMAGE}"

    # Strip pre-compiled PCRE2 binary SELinux policy (.bin) files from the
    # pulled container image in containers-storage. When the PCRE2 version
    # that compiled the .bin files in the target image (e.g. 10.46) differs
    # from the version setfiles in the BIB container was linked against (e.g.
    # 10.44), osbuild's org.osbuild.selinux stage fails with "Regex version
    # mismatch". Deleting the .bin files forces setfiles to recompile from
    # the text file_contexts, which is always compatible.
    - name: bib-selinux-prep
      inputs:
        parameters:
          - name: image
          - name: image-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: containers-storage
          hostPath:
            path: /var/lib/containers/storage
      container:
        image: quay.io/podman/stable:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
          - name: containers-storage
            mountPath: /var/lib/containers/storage
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            IMAGE="{{inputs.parameters.image}}"
            TAG="{{inputs.parameters.image-tag}}"
            if [[ "${IMAGE}" != *:* ]]; then
              IMAGE="${IMAGE}:${TAG}"
            fi
            echo "Stripping pre-compiled SELinux .bin files from ${IMAGE}"
            CID=$(podman container create "${IMAGE}" /bin/true)
            MOUNT=$(podman mount "${CID}")
            find "${MOUNT}/etc/selinux" -name "*.bin" -print -delete 2>/dev/null || true
            podman unmount "${CID}"
            # Commit the deletion as a real image layer so bib-img-build sees it.
            # Deleting from the merged overlay without committing creates whiteouts
            # only in the container's upper layer, which is discarded on rm — the
            # original image layers still contain the .bin files (testing-lab#220).
            LOCAL_TAG="localhost/bib-selinux-prepped:${TAG}"
            podman commit "${CID}" "${LOCAL_TAG}"
            podman container rm "${CID}"
            echo "SELinux prep complete → ${LOCAL_TAG}"

    - name: bib-img-build
      inputs:
        parameters:
          - name: image
          - name: image-tag
      # Serialize all heavy BIB/BST builds on ghost — prevents resource
      # starvation when concurrent pipelines (Bluefin latest, lts, Dakota) run.
      synchronization:
        mutexes:
          - name: ghost-heavy-compute
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: bib-output
          hostPath:
            path: /var/tmp/bib-output
            type: DirectoryOrCreate
        - name: containers-storage
          hostPath:
            path: /var/lib/containers/storage
      container:
        image: quay.io/centos-bootc/bootc-image-builder:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "8"
            memory: 16Gi
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: bib-output
            mountPath: /output
          - name: containers-storage
            mountPath: /var/lib/containers/storage
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            TAG="{{inputs.parameters.image-tag}}"
            IMAGE_REF="{{inputs.parameters.image}}"
            if [[ "${IMAGE_REF}" != *:* ]]; then
              IMAGE_REF="${IMAGE_REF}:${TAG}"
            fi
            # Use selinux-prepped local image if bib-selinux-prep committed one.
            # Both steps share /var/lib/containers/storage via hostPath on ghost.
            LOCAL_PREPPED="localhost/bib-selinux-prepped:${TAG}"
            if podman image exists "${LOCAL_PREPPED}" 2>/dev/null; then
              echo "Using selinux-prepped image: ${LOCAL_PREPPED}" >&2
              IMAGE_REF="${LOCAL_PREPPED}"
            fi
            OUT="/output/${TAG}"
            mkdir -p "${OUT}"
            if [[ -f "${OUT}/image/disk.raw" ]]; then
              echo "disk.raw already exists at ${OUT}/image/disk.raw, skipping BIB build"
              exit 0
            fi
            # Preflight: report PCRE2 version for diagnostics (testing-lab#220).
            PCRE2_PKG=$(rpm -q --queryformat '%{VERSION}' pcre2 2>/dev/null || echo "unknown")
            echo "PCRE2 in BIB container: ${PCRE2_PKG}" >&2
            if [[ "${PCRE2_PKG}" != "unknown" ]]; then
              PCRE2_MAJ=${PCRE2_PKG%%.*}; PCRE2_MIN=${PCRE2_PKG#*.}; PCRE2_MIN=${PCRE2_MIN%%.*}
              if (( PCRE2_MAJ < 10 || (PCRE2_MAJ == 10 && PCRE2_MIN < 46) )); then
                echo "WARNING: PCRE2 ${PCRE2_PKG} < 10.46 in this BIB container." >&2
                echo "  org.osbuild.selinux will fail for bluefin-lts/dakota. See testing-lab#220." >&2
              fi
            fi
            # Request 40GB minimum root filesystem so bootc unified-storage
            # can pull a second copy (~5GB) alongside the live OS (~7GB).
            # Use [[customizations.filesystem]] (not [customizations.disk]):
            # disk replaces the entire partition layout; filesystem extends it.
            printf '[[customizations.filesystem]]\nmountpoint = "/"\nminsize = 42949672960\n' \
              > "${OUT}/bib-config.toml"
            bootc-image-builder build \
              --type raw --rootfs ext4 \
              --config "${OUT}/bib-config.toml" \
              --output "${OUT}" \
              "${IMAGE_REF}" 2>&1 | tee "${OUT}/bib-build.log"
            echo "BIB exit: ${PIPESTATUS[0]}"
            exit ${PIPESTATUS[0]}

    # Configure golden disk: enable sshd, inject key, disable SELinux via BLS
    # Then move to golden hostPath. No zot push, no buildah, no OCI wrap.
    # Pubkey is read from the bluefin-test-ssh-key secret via secretKeyRef —
    # no kubectl needed inside the pod, no parameter needed from callers.
    - name: bib-disk-configure
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: golden-root
            value: "/var/tmp/bluefin-golden"
      # Keep mutex through configure — it does heavy loop-device I/O on ghost.
      synchronization:
        mutexes:
          - name: ghost-heavy-compute
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: bib-output
          hostPath:
            path: /var/tmp/bib-output
        - name: golden
          hostPath:
            path: "{{inputs.parameters.golden-root}}"
            type: DirectoryOrCreate
        # Needed for `podman image inspect` to read the digest of the image
        # bib-img-pull just fetched — see source-digest marker below.
        - name: containers-storage
          hostPath:
            path: /var/lib/containers/storage
      container:
        image: quay.io/podman/stable:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
        env:
          - name: SSH_PUBKEY
            valueFrom:
              secretKeyRef:
                name: bluefin-test-ssh-key
                key: id_ed25519.pub
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: bib-output
            mountPath: /var/tmp/bib-output
          - name: golden
            mountPath: "{{inputs.parameters.golden-root}}"
          - name: containers-storage
            mountPath: /var/lib/containers/storage
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            TAG="{{inputs.parameters.image-tag}}"
            IMAGE_REF="{{inputs.parameters.image}}"
            if [[ "${IMAGE_REF}" != *:* ]]; then
              IMAGE_REF="${IMAGE_REF}:${TAG}"
            fi
            DISK="/var/tmp/bib-output/${TAG}/image/disk.raw"
            PUBKEY="${SSH_PUBKEY}"
            if [[ -z "${PUBKEY}" ]]; then
              echo "ERROR: SSH_PUBKEY from bluefin-test-ssh-key secret is empty" >&2
              exit 1
            fi
            echo "Using pubkey: ${PUBKEY}"

            # Idempotency guard: another workflow may have already configured and
            # moved the disk to golden (see issue #154). Check golden first.
            if [[ ! -f "${DISK}" ]]; then
              GOLDEN_DISK="{{inputs.parameters.golden-root}}/${TAG}/disk.raw"
              if [[ -f "${GOLDEN_DISK}" ]]; then
                echo "disk.raw already moved to golden by another workflow: ${GOLDEN_DISK}" >&2
                exit 0
              fi
              echo "ERROR: disk.raw missing at ${DISK} and not in golden either" >&2
              exit 1
            fi

            echo "=== Configuring golden disk: ${DISK} ==="
            LOOP=$(losetup -f --show -P "${DISK}")
            echo "Loop: ${LOOP}"

            mkdir -p /mnt/btroot /mnt/btboot
            # btrfs disks require subvol=root; XFS mounts plain — detect and handle both
            if blkid "${LOOP}p4" | grep -q 'TYPE="btrfs"'; then
              mount -o subvol=root "${LOOP}p4" /mnt/btroot
            else
              mount "${LOOP}p4" /mnt/btroot
            fi
            mount "${LOOP}p3" /mnt/btboot

            DEPLOY=$(ls /mnt/btroot/ostree/deploy/default/deploy/ | head -1)
            ROOT="/mnt/btroot/ostree/deploy/default/deploy/${DEPLOY}"
            VAR="/mnt/btroot/ostree/deploy/default/var"

            # Enable sshd
            mkdir -p "${ROOT}/etc/systemd/system/multi-user.target.wants/"
            ln -sf /usr/lib/systemd/system/sshd.service \
              "${ROOT}/etc/systemd/system/multi-user.target.wants/sshd.service"

            # Create bluefin-test system account if absent
            if ! grep -q '^bluefin-test:' "${ROOT}/etc/passwd"; then
                BFT_UID=1001
                echo "bluefin-test:x:${BFT_UID}:${BFT_UID}:Bluefin Test User:/var/home/bluefin-test:/bin/bash" \
                    >> "${ROOT}/etc/passwd"
                echo "bluefin-test:!:19000:0:99999:7:::" >> "${ROOT}/etc/shadow"
                echo "bluefin-test:x:${BFT_UID}:" >> "${ROOT}/etc/group"
                echo "Created bluefin-test user (uid ${BFT_UID})"
            else
                BFT_UID=$(grep '^bluefin-test:' "${ROOT}/etc/passwd" | cut -d: -f3)
                echo "bluefin-test user exists (uid ${BFT_UID})"
            fi

            # SSH key
            mkdir -p "${VAR}/home/bluefin-test/.ssh"
            printf '%s\n' "${PUBKEY}" > "${VAR}/home/bluefin-test/.ssh/authorized_keys"
            # authorized_keys must be non-empty or SSH auth silently fails
            test -s "${VAR}/home/bluefin-test/.ssh/authorized_keys" || {
              echo "ERROR: authorized_keys empty or not written" >&2; exit 1
            }
            chown -R "${BFT_UID}:${BFT_UID}" "${VAR}/home/bluefin-test"
            # ── GDM auto-login (#161) ────────────────────────────────────
            # Required for AT-SPI test automation — without this the VM boots to
            # a login screen with no GNOME session and all AT-SPI tests fail.
            mkdir -p "${ROOT}/etc/gdm"
            printf '[daemon]\nAutomaticLoginEnable=True\nAutomaticLogin=bluefin-test\nWaylandEnable=true\n' \
              > "${ROOT}/etc/gdm/custom.conf"

            # Install gnome-ponytail-daemon — needed for AT-SPI / Dogtail tests.
            # On bootc images we can't use dnf install. Copy the rpm and extract
            # it into the deploy root via rpm2cpio.
            GPD_RPM="/host/var/cache/dnf/fedora*/packages/gnome-ponytail-daemon-*.rpm"
            if ls ${GPD_RPM} 2>/dev/null | head -1; then
              GPD=$(ls ${GPD_RPM} 2>/dev/null | head -1)
              rpm2cpio "${GPD}" | (cd "${ROOT}" && cpio -idm 2>/dev/null)
              # Enable as user service for the test user
              mkdir -p "${VAR}/home/bluefin-test/.config/systemd/user/graphical-session.target.wants"
              if [[ -f "${ROOT}/usr/lib/systemd/user/gnome-ponytail-daemon.service" ]]; then
                ln -sf /usr/lib/systemd/user/gnome-ponytail-daemon.service \
                  "${VAR}/home/bluefin-test/.config/systemd/user/graphical-session.target.wants/gnome-ponytail-daemon.service"
              fi
              echo "Installed gnome-ponytail-daemon."
            else
              echo "WARNING: gnome-ponytail-daemon RPM not found in DNF cache — AT-SPI tests may fail (see #161)" >&2
            fi

            # 750 on home dir: sshd StrictModes rejects world- or group-writable home
            chmod 750 "${VAR}/home/bluefin-test"
            chmod 700 "${VAR}/home/bluefin-test/.ssh"
            chmod 600 "${VAR}/home/bluefin-test/.ssh/authorized_keys"

            # Allow SSH sessions to see AT-SPI env vars (required for Dogtail)
            mkdir -p "${ROOT}/etc/ssh/sshd_config.d/"
            printf 'PermitUserEnvironment yes\n' > "${ROOT}/etc/ssh/sshd_config.d/99-bluefin-test.conf"
            # sshd on Fedora rejects world-writable config drop-ins
            chmod 600 "${ROOT}/etc/ssh/sshd_config.d/99-bluefin-test.conf"

            # Sudoers
            echo 'bluefin-test ALL=(ALL) NOPASSWD:ALL' > "${ROOT}/etc/sudoers.d/bluefin-test"
            chmod 440 "${ROOT}/etc/sudoers.d/bluefin-test"

            # selinux=0 in BLS entry (bootc uses loader/entries/*.conf)
            for conf in /mnt/btboot/loader/entries/*.conf; do
              [[ -f "${conf}" ]] || continue
              sed -i '/^options / { /selinux=0/! s/$/ selinux=0/ }' "${conf}"
              echo "Patched: $(grep '^options ' ${conf} | head -1)"
            done

            sync
            umount /mnt/btboot
            umount /mnt/btroot
            losetup -d "${LOOP}"

            # Move to golden hostPath — this is the file reflink clones will come from
            GOLDEN_DIR="{{inputs.parameters.golden-root}}/${TAG}"
            mkdir -p "${GOLDEN_DIR}"
            mv "${DISK}" "${GOLDEN_DIR}/disk.raw"
            rmdir "/var/tmp/bib-output/${TAG}/image" 2>/dev/null || true
            rmdir "/var/tmp/bib-output/${TAG}" 2>/dev/null || true

            # Record the source image digest so bib-disk-check can detect when
            # the golden disk falls behind upstream — see issue #1.
            # `podman image inspect` works because bib-img-pull just ran.
            DIGEST=$(podman image inspect --format '{{.Digest}}' "${IMAGE_REF}" 2>/dev/null || true)
            if [[ -n "${DIGEST}" ]]; then
              printf '%s' "${DIGEST}" > "${GOLDEN_DIR}/source-digest"
              echo "Recorded source digest: ${DIGEST}"
            else
              echo "WARNING: could not record source digest for ${IMAGE_REF}" >&2
            fi

            echo "=== Golden disk ready: ${GOLDEN_DIR}/disk.raw ==="
            ls -lh "${GOLDEN_DIR}/disk.raw"

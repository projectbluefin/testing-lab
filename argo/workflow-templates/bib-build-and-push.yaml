apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bib-build-and-push
  namespace: argo
  annotations:
    description: |
      Builds a Bluefin disk image via BIB and stores it as a golden disk.raw
      on ghost's hostPath (/var/tmp/bluefin-golden/<tag>/disk.raw).
      No zot push, no buildah wrap — just the raw disk kept for reflink cloning.
spec:
  templates:
    - name: ensure-disk
      inputs:
        parameters:
          - name: image
            value: "ghcr.io/ublue-os/bluefin:latest"
          - name: image-tag
            value: "latest"
      steps:
        # `check` outputs "missing" | "stale" | "exists".
        #   missing — no disk.raw on disk; build path runs
        #   stale   — disk.raw exists but the remote image digest differs from
        #             the stored marker (issue #1); build path runs to refresh
        #   exists  — disk.raw and digest match the remote; build path skipped
        - - name: check
            template: bib-disk-check
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"

        - - name: pull-image
            template: bib-img-pull
            when: "{{steps.check.outputs.result}} != exists"
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"

        - - name: build
            template: bib-img-build
            when: "{{steps.check.outputs.result}} != exists"
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"

        - - name: configure
            template: bib-disk-configure
            when: "{{steps.check.outputs.result}} != exists"
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"

    # Freshness check: missing | stale | exists.
    # Compares stored remote-digest marker against `skopeo inspect` of the
    # current image. Missing marker is treated as `stale` to force a rebuild
    # and record a digest for future runs.
    - name: bib-disk-check
      inputs:
        parameters:
          - name: image
          - name: image-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: golden
          hostPath:
            path: /var/tmp/bluefin-golden
            type: DirectoryOrCreate
      script:
        # fedora: known-good image for script templates (chainguard/bash pulls unreliably in lab)
        image: quay.io/fedora/fedora:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
          - name: golden
            mountPath: /var/tmp/bluefin-golden
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.image-tag}}"
          IMAGE="{{inputs.parameters.image}}"
          GOLDEN_DIR="/var/tmp/bluefin-golden/${TAG}"
          DISK="${GOLDEN_DIR}/disk.raw"
          MARKER="${GOLDEN_DIR}/source-digest"

          if [[ ! -f "${DISK}" ]]; then
            echo -n "missing"
            exit 0
          fi

          # Install skopeo (the fedora base image doesn't ship it). Fail open
          # to `exists` if skopeo can't be installed — never want a network
          # blip to trigger an unwanted rebuild.
          if ! command -v skopeo &>/dev/null; then
            dnf install -y --quiet skopeo >/dev/null 2>&1 || {
              echo "skopeo install failed; treating disk as fresh" >&2
              echo -n "exists"
              exit 0
            }
          fi

          REMOTE=$(skopeo inspect --no-tags --format '{{.Digest}}' "docker://${IMAGE}" 2>/dev/null || true)
          if [[ -z "${REMOTE}" ]]; then
            echo "skopeo inspect failed for ${IMAGE}; treating disk as fresh" >&2
            echo -n "exists"
            exit 0
          fi

          STORED=""
          [[ -f "${MARKER}" ]] && STORED=$(cat "${MARKER}")

          if [[ "${REMOTE}" == "${STORED}" ]]; then
            echo -n "exists"
          else
            echo "Disk stale: stored=${STORED:-<none>} remote=${REMOTE}" >&2
            echo -n "stale"
          fi

    - name: bib-img-pull
      inputs:
        parameters:
          - name: image
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: containers-storage
          hostPath:
            path: /var/lib/containers/storage
      container:
        image: quay.io/podman/stable:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 2Gi
          limits:
            cpu: "4"
            memory: 4Gi
        volumeMounts:
          - name: containers-storage
            mountPath: /var/lib/containers/storage
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            podman pull {{inputs.parameters.image}}

    - name: bib-img-build
      inputs:
        parameters:
          - name: image
          - name: image-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: bib-output
          hostPath:
            path: /var/tmp/bib-output
            type: DirectoryOrCreate
        - name: containers-storage
          hostPath:
            path: /var/lib/containers/storage
      container:
        image: quay.io/centos-bootc/bootc-image-builder:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "8"
            memory: 16Gi
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: bib-output
            mountPath: /output
          - name: containers-storage
            mountPath: /var/lib/containers/storage
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            TAG="{{inputs.parameters.image-tag}}"
            OUT="/output/${TAG}"
            mkdir -p "${OUT}"
            if [[ -f "${OUT}/image/disk.raw" ]]; then
              echo "disk.raw already exists at ${OUT}/image/disk.raw, skipping BIB build"
              exit 0
            fi
            bootc-image-builder build \
              --type raw --rootfs ext4 \
              --output "${OUT}" \
              {{inputs.parameters.image}} 2>&1 | tee "${OUT}/bib-build.log"
            echo "BIB exit: ${PIPESTATUS[0]}"
            exit ${PIPESTATUS[0]}

    # Configure golden disk: enable sshd, inject key, disable SELinux via BLS
    # Then move to golden hostPath. No zot push, no buildah, no OCI wrap.
    # Pubkey is read from the bluefin-test-ssh-key secret via secretKeyRef —
    # no kubectl needed inside the pod, no parameter needed from callers.
    - name: bib-disk-configure
      inputs:
        parameters:
          - name: image
          - name: image-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: bib-output
          hostPath:
            path: /var/tmp/bib-output
        - name: golden
          hostPath:
            path: /var/tmp/bluefin-golden
            type: DirectoryOrCreate
        # Needed for `podman image inspect` to read the digest of the image
        # bib-img-pull just fetched — see source-digest marker below.
        - name: containers-storage
          hostPath:
            path: /var/lib/containers/storage
      container:
        image: quay.io/podman/stable:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
        env:
          - name: SSH_PUBKEY
            valueFrom:
              secretKeyRef:
                name: bluefin-test-ssh-key
                key: id_ed25519.pub
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: bib-output
            mountPath: /var/tmp/bib-output
          - name: golden
            mountPath: /var/tmp/bluefin-golden
          - name: containers-storage
            mountPath: /var/lib/containers/storage
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            TAG="{{inputs.parameters.image-tag}}"
            DISK="/var/tmp/bib-output/${TAG}/image/disk.raw"
            PUBKEY="${SSH_PUBKEY}"
            if [[ -z "${PUBKEY}" ]]; then
              echo "ERROR: SSH_PUBKEY from bluefin-test-ssh-key secret is empty" >&2
              exit 1
            fi
            echo "Using pubkey: ${PUBKEY}"

            echo "=== Configuring golden disk: ${DISK} ==="
            LOOP=$(losetup -f --show -P "${DISK}")
            echo "Loop: ${LOOP}"

            mkdir -p /mnt/btroot /mnt/btboot
            # btrfs disks require subvol=root; XFS mounts plain — detect and handle both
            if blkid "${LOOP}p4" | grep -q 'TYPE="btrfs"'; then
              mount -o subvol=root "${LOOP}p4" /mnt/btroot
            else
              mount "${LOOP}p4" /mnt/btroot
            fi
            mount "${LOOP}p3" /mnt/btboot

            DEPLOY=$(ls /mnt/btroot/ostree/deploy/default/deploy/ | head -1)
            ROOT="/mnt/btroot/ostree/deploy/default/deploy/${DEPLOY}"
            VAR="/mnt/btroot/ostree/deploy/default/var"

            # Enable sshd
            mkdir -p "${ROOT}/etc/systemd/system/multi-user.target.wants/"
            ln -sf /usr/lib/systemd/system/sshd.service \
              "${ROOT}/etc/systemd/system/multi-user.target.wants/sshd.service"

            # Create bluefin-test system account if absent
            if ! grep -q '^bluefin-test:' "${ROOT}/etc/passwd"; then
                BFT_UID=1001
                echo "bluefin-test:x:${BFT_UID}:${BFT_UID}:Bluefin Test User:/var/home/bluefin-test:/bin/bash" \
                    >> "${ROOT}/etc/passwd"
                echo "bluefin-test:!:19000:0:99999:7:::" >> "${ROOT}/etc/shadow"
                echo "bluefin-test:x:${BFT_UID}:" >> "${ROOT}/etc/group"
                echo "Created bluefin-test user (uid ${BFT_UID})"
            else
                BFT_UID=$(grep '^bluefin-test:' "${ROOT}/etc/passwd" | cut -d: -f3)
                echo "bluefin-test user exists (uid ${BFT_UID})"
            fi

            # SSH key
            mkdir -p "${VAR}/home/bluefin-test/.ssh"
            printf '%s\n' "${PUBKEY}" > "${VAR}/home/bluefin-test/.ssh/authorized_keys"
            # authorized_keys must be non-empty or SSH auth silently fails
            test -s "${VAR}/home/bluefin-test/.ssh/authorized_keys" || {
              echo "ERROR: authorized_keys empty or not written" >&2; exit 1
            }
            chown -R "${BFT_UID}:${BFT_UID}" "${VAR}/home/bluefin-test"
            # 750 on home dir: sshd StrictModes rejects world- or group-writable home
            chmod 750 "${VAR}/home/bluefin-test"
            chmod 700 "${VAR}/home/bluefin-test/.ssh"
            chmod 600 "${VAR}/home/bluefin-test/.ssh/authorized_keys"

            # Allow SSH sessions to see AT-SPI env vars (required for Dogtail)
            mkdir -p "${ROOT}/etc/ssh/sshd_config.d/"
            printf 'PermitUserEnvironment yes\n' > "${ROOT}/etc/ssh/sshd_config.d/99-bluefin-test.conf"
            # sshd on Fedora rejects world-writable config drop-ins
            chmod 600 "${ROOT}/etc/ssh/sshd_config.d/99-bluefin-test.conf"

            # Sudoers
            echo 'bluefin-test ALL=(ALL) NOPASSWD:ALL' > "${ROOT}/etc/sudoers.d/bluefin-test"
            chmod 440 "${ROOT}/etc/sudoers.d/bluefin-test"

            # selinux=0 in BLS entry (bootc uses loader/entries/*.conf)
            for conf in /mnt/btboot/loader/entries/*.conf; do
              [[ -f "${conf}" ]] || continue
              sed -i '/^options / { /selinux=0/! s/$/ selinux=0/ }' "${conf}"
              echo "Patched: $(grep '^options ' ${conf} | head -1)"
            done

            sync
            umount /mnt/btboot
            umount /mnt/btroot
            losetup -d "${LOOP}"

            # Move to golden hostPath — this is the file reflink clones will come from
            GOLDEN_DIR="/var/tmp/bluefin-golden/${TAG}"
            mkdir -p "${GOLDEN_DIR}"
            mv "${DISK}" "${GOLDEN_DIR}/disk.raw"
            rmdir "/var/tmp/bib-output/${TAG}/image" 2>/dev/null || true
            rmdir "/var/tmp/bib-output/${TAG}" 2>/dev/null || true

            # Record the source image digest so bib-disk-check can detect when
            # the golden disk falls behind upstream — see issue #1.
            # `podman image inspect` works because bib-img-pull just ran.
            DIGEST=$(podman image inspect --format '{{.Digest}}' "{{inputs.parameters.image}}" 2>/dev/null || true)
            if [[ -n "${DIGEST}" ]]; then
              printf '%s' "${DIGEST}" > "${GOLDEN_DIR}/source-digest"
              echo "Recorded source digest: ${DIGEST}"
            else
              echo "WARNING: could not record source digest for {{inputs.parameters.image}}" >&2
            fi

            echo "=== Golden disk ready: ${GOLDEN_DIR}/disk.raw ==="
            ls -lh "${GOLDEN_DIR}/disk.raw"

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: provision-flatcar-vm
  namespace: argo
  annotations:
    description: |
      Provisions a Flatcar Container Linux test VM.
      Converts /var/mnt/ghost-data/knuckle-test/flatcar_base.img to .raw once (cached),
      then btrfs reflinks per-VM copy. Cloud-init and guest-agent injection seed SSH access.
spec:
  serviceAccountName: argo
  templates:
    - name: provision-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
            value: "flatcar-test"
          - name: ssh-pubkey
      outputs:
        parameters:
          - name: vm-ip
            valueFrom:
              parameter: "{{steps.wait-for-vm.outputs.result}}"
      steps:
        - - name: prepare-disk
            template: prepare-flatcar-disk
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: ssh-pubkey
                  value: "{{inputs.parameters.ssh-pubkey}}"
        - - name: create-vm
            template: create-flatcar-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
                - name: ssh-pubkey
                  value: "{{inputs.parameters.ssh-pubkey}}"
        - - name: wait-for-vm
            template: wait-for-flatcar-ready
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
                - name: ssh-pubkey
                  value: "{{inputs.parameters.ssh-pubkey}}"

    - name: prepare-flatcar-disk
      inputs:
        parameters:
          - name: vm-name
          - name: ssh-pubkey
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: knuckle-test
          hostPath:
            path: /var/mnt/ghost-data/knuckle-test
            type: DirectoryOrCreate
        - name: flatcar-vms
          hostPath:
            path: /var/mnt/ghost-data/flatcar-test
            type: DirectoryOrCreate
      script:
        image: quay.io/kubevirt/virt-launcher:v1.8.2
        command: [bash]
        securityContext:
          runAsUser: 0
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        volumeMounts:
          - name: knuckle-test
            mountPath: /var/mnt/ghost-data/knuckle-test
          - name: flatcar-vms
            mountPath: /var/mnt/ghost-data/flatcar-test
        source: |
          set -euo pipefail
          VM="{{inputs.parameters.vm-name}}"
          BASE="/var/mnt/ghost-data/knuckle-test/flatcar-base.raw"
          DEST="/var/mnt/ghost-data/flatcar-test/${VM}.raw"
          TARGET="/var/mnt/ghost-data/flatcar-test/${VM}-target.raw"

          # One-time: convert qcow2 → raw (cached across runs)
          if [[ ! -f "${BASE}" ]]; then
            echo "Converting Flatcar qcow2 → raw (one-time)..."
            qemu-img convert -p -f qcow2 -O raw /var/mnt/ghost-data/knuckle-test/flatcar_base.img "${BASE}"
            chown 107:107 "${BASE}" && chmod 664 "${BASE}"
            chcon -t container_file_t "${BASE}" 2>/dev/null || true
            echo "Conversion complete: $(du -sh ${BASE} | cut -f1)"
          fi

          # Per-VM reflink copy (~24ms CoW)
          cp --reflink=auto "${BASE}" "${DEST}"
          chown 107:107 "${DEST}" && chmod 664 "${DEST}"
          chcon -t container_file_t "${DEST}" 2>/dev/null || true

          if [[ ! -f "${TARGET}" ]]; then
            qemu-img create -f raw "${TARGET}" 20G
          fi
          chown 107:107 "${TARGET}" && chmod 664 "${TARGET}"
          chcon -t container_file_t "${TARGET}" 2>/dev/null || true
          echo "Disks ready: ${DEST}, ${TARGET}"

    - name: create-flatcar-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
          - name: ssh-pubkey
      resource:
        action: apply
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"
            labels:
              app: flatcar-test
              argo-workflow: "{{workflow.name}}"
          spec:
            runStrategy: Always
            template:
              metadata:
                labels:
                  kubevirt.io/vm: "{{inputs.parameters.vm-name}}"
              spec:
                nodeSelector:
                  kubernetes.io/hostname: ghost
                domain:
                  cpu:
                    cores: 2
                  memory:
                    guest: 4Gi
                  devices:
                    disks:
                      - name: rootdisk
                        disk:
                          bus: virtio
                        bootOrder: 1
                      - name: targetdisk
                        disk:
                          bus: virtio
                      - name: cloudinit
                        disk:
                          bus: virtio
                    interfaces:
                      - name: default
                        masquerade: {}
                  machine:
                    type: q35
                networks:
                  - name: default
                    pod: {}
                volumes:
                  - name: rootdisk
                    hostDisk:
                      path: /var/mnt/ghost-data/flatcar-test/{{inputs.parameters.vm-name}}.raw
                      type: Disk
                  - name: targetdisk
                    hostDisk:
                      path: /var/mnt/ghost-data/flatcar-test/{{inputs.parameters.vm-name}}-target.raw
                      type: Disk
                  - name: cloudinit
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        ssh_authorized_keys:
                          - {{inputs.parameters.ssh-pubkey}}

    - name: wait-for-flatcar-ready
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
          - name: ssh-pubkey
      script:
        image: registry.k8s.io/kubectl:v1.32.0
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        env:
          - name: SSH_PUBKEY
            valueFrom:
              secretKeyRef:
                name: bluefin-test-ssh-key
                key: id_ed25519.pub
        source: |
          set -euo pipefail
          exec 3>&1
          exec 1>&2
          NS="{{inputs.parameters.namespace}}"
          VM="{{inputs.parameters.vm-name}}"
          LABEL="kubevirt.io/vm=${VM}"
          # Use pubkey from secret (parameter kept for API compat but ignored)
          PUBKEY="${SSH_PUBKEY}"

          echo "Waiting for VMI ready..." >&2
          kubectl wait vmi -n "${NS}" "${VM}" \
            --for=condition=Ready --timeout=300s >&2

          echo "Waiting for guest agent..." >&2
          timeout 120 bash -c \
            "until kubectl get vmi -n '${NS}' '${VM}' -o jsonpath='{.status.conditions[?(@.type==\"AgentConnected\")].status}' | grep -q True; do sleep 5; done"

          LAUNCHER_POD=$(kubectl get pod -n "${NS}" -l "${LABEL}" \
            -o jsonpath='{.items[0].metadata.name}')
          DOMAIN="${NS}_${VM}"

          echo "Injecting SSH key via guest agent..." >&2
          kubectl exec -n "${NS}" "${LAUNCHER_POD}" -c compute -- bash -lc '
            set -euo pipefail
            domain="'"${DOMAIN}"'"
            key="'"${PUBKEY}"'"
            payload=$(cat <<EOF
          {"execute":"guest-exec","arguments":{"path":"/usr/bin/sh","arg":["-lc","mkdir -p /home/core/.ssh && printf '\''%s\\n'\'' '\''${key}'\'' > /home/core/.ssh/authorized_keys && chown -R core:core /home/core/.ssh && chmod 700 /home/core/.ssh && chmod 600 /home/core/.ssh/authorized_keys"],"capture-output":true}}
          EOF
            )
            resp=$(virsh qemu-agent-command "${domain}" "${payload}")
            pid=$(printf "%s" "${resp}" | sed -n "s/.*\"pid\"[[:space:]]*:[[:space:]]*\([0-9][0-9]*\).*/\1/p")
            sleep 2
            virsh qemu-agent-command "${domain}" "{\"execute\":\"guest-exec-status\",\"arguments\":{\"pid\":${pid}}}"
          ' >&2

          POD_IP=$(kubectl get pod -n "${NS}" -l "${LABEL}" \
            -o jsonpath='{.items[0].status.podIP}')

          echo "Waiting for SSH on ${POD_IP}..." >&2
          timeout 60 bash -c \
            "until bash -c 'echo >/dev/tcp/${POD_IP}/22' 2>/dev/null; do sleep 5; done"

          echo "${POD_IP}" >&3

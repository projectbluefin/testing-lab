# Builds a full Flatcar OS image with a custom kernel version and registers
# it in Nebraska so update_engine can perform an A/B partition update.
#
# Pipeline:
#   provision-build-vm  - Boot a Flatcar KubeVirt VM (Docker 28 ships in Flatcar)
#   build-kernel        - SSH in, run Flatcar SDK via run_sdk_container, build image
#   register-package    - POST update payload to Nebraska with correct Omaha fields
#   teardown-build-vm   - onExit handler, always runs
#
# Nebraska registration:
#   url        = base path (Nebraska constructs full URL as url+filename)
#   flatcar_action.sha256 = required for valid Omaha responses to update_engine
#   version    = 9999.MAJOR.MINOR (always > any stock Flatcar, real semver precedence)
#
# Flatcar app UUID: e96281a6-d1af-4bde-9a0a-97b76e56dc57
# Nebraska NodePort: 30802
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: flatcar-kernel-build
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  entrypoint: pipeline
  onExit: teardown-build-vm
  serviceAccountName: argo
  activeDeadlineSeconds: 10800   # ponytail: 3h active deadline for kernel compile
  podGC:
    strategy: OnWorkflowSuccess
  ttlStrategy:
    secondsAfterCompletion: 86400
    secondsAfterFailure: 604800
  arguments:
    parameters:
    - name: kernel-version
      value: "7.1.1"
    - name: flatcar-scripts-ref
      value: "stable-4593.2.3"
    - name: sdk-version
      value: "4593.0.0"
    - name: vm-name
      value: "flatcar-build-{{workflow.name}}"
    - name: namespace
      value: "flatcar-test"
    - name: cores
      value: "16"
    - name: memory
      value: "16Gi"
    - name: storage
      value: "120Gi"
    - name: ssh-timeout
      value: "600s"

  templates:
    # -------------------------------------------------------------------------
  - name: pipeline
    steps:
    - - name: create-build-pvc
        template: create-build-pvc
    - - name: create-vm
        template: create-vm
    - - name: wait-for-ssh
        template: wait-for-ssh
    - - name: build-kernel
        template: build-kernel
        arguments:
          parameters:
          - name: vm-ip
            value: "{{steps.wait-for-ssh.outputs.result}}"
          - name: kernel-version
            value: "{{workflow.parameters.kernel-version}}"
          - name: flatcar-scripts-ref
            value: "{{workflow.parameters.flatcar-scripts-ref}}"
          - name: sdk-version
            value: "{{workflow.parameters.sdk-version}}"
    - - name: register-package
        template: register-package
        arguments:
          parameters:
          - name: kernel-version
            value: "{{workflow.parameters.kernel-version}}"
          - name: sha1
            value: "{{steps.build-kernel.outputs.parameters.sha1}}"
          - name: sha256
            value: "{{steps.build-kernel.outputs.parameters.sha256}}"
          - name: size
            value: "{{steps.build-kernel.outputs.parameters.size}}"
          - name: filename
            value: "{{steps.build-kernel.outputs.parameters.filename}}"
    - - name: record-candidate-state
        template: record-candidate-state
        arguments:
          parameters:
          - name: kernel-version
            value: "{{workflow.parameters.kernel-version}}"
          - name: filename
            value: "{{steps.build-kernel.outputs.parameters.filename}}"

  - name: create-build-pvc
    resource:
      action: apply
      manifest: |
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: "{{workflow.name}}-build-data"
          namespace: "{{workflow.parameters.namespace}}"
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: local-path
          resources:
            requests:
              storage: "{{workflow.parameters.storage}}"

  - name: create-vm
    resource:
      action: apply
      manifest: |
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: "{{workflow.parameters.vm-name}}"
          namespace: "{{workflow.parameters.namespace}}"
          labels:
            app: flatcar-kernel-build
            argo-workflow: "{{workflow.name}}"
        spec:
          runStrategy: Always
          template:
            metadata:
              labels:
                kubevirt.io/vm: "{{workflow.parameters.vm-name}}"
            spec:
              domain:
                cpu:
                  cores: {{workflow.parameters.cores}}
                memory:
                  guest: {{workflow.parameters.memory}}
                devices:
                  blockMultiQueue: true
                  rng: {}
                  disks:
                    - name: rootdisk
                      disk:
                        bus: virtio
                      bootOrder: 1
                    - name: builddisk
                      disk:
                        bus: virtio
                    - name: cloudinit
                      disk:
                        bus: virtio
                  interfaces:
                    - name: default
                      masquerade: {}
                machine:
                  type: q35
              networks:
                - name: default
                  pod: {}
              volumes:
                - name: rootdisk
                  containerDisk:
                    image: 192.168.1.102:30500/flatcar-containerdisk:latest
                - name: builddisk
                  persistentVolumeClaim:
                    claimName: "{{workflow.name}}-build-data"
                - name: cloudinit
                  cloudInitNoCloud:
                    userData: |
                      #cloud-config
                      ssh_authorized_keys: []

  - name: wait-for-ssh
    script:
      image: cgr.dev/chainguard/kubectl:latest-dev
      securityContext:
        runAsUser: 0
      command: [bash]
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 50m
          memory: 256Mi
      env:
      - name: SSH_PUBKEY
        valueFrom:
          secretKeyRef:
            name: bluefin-test-ssh-key
            key: id_ed25519.pub
      source: |
        set -euo pipefail
        exec 3>&1; exec 1>&2
        NS="{{workflow.parameters.namespace}}"
        VM="{{workflow.parameters.vm-name}}"
        LABEL="kubevirt.io/vm=${VM}"

        echo "Waiting for VMI ready..."
        kubectl wait vmi -n "${NS}" "${VM}" \
          --for=condition=Ready --timeout={{workflow.parameters.ssh-timeout}}

        echo "Waiting for guest agent..."
        timeout 180 bash -c \
          "until kubectl get vmi -n '${NS}' '${VM}' \
            -o jsonpath='{.status.conditions[?(@.type==\"AgentConnected\")].status}' \
            | grep -q True; do sleep 5; done"

        LAUNCHER=$(kubectl get pod -n "${NS}" -l "${LABEL}" \
          -o jsonpath='{.items[0].metadata.name}')
        DOMAIN="${NS}_${VM}"
        PUBKEY="${SSH_PUBKEY}"

        echo "Injecting SSH key via guest agent..."
        kubectl exec -n "${NS}" "${LAUNCHER}" -c compute -- bash -lc '
          set -euo pipefail
          domain="'"${DOMAIN}"'"
          key="'"${PUBKEY}"'"
          payload=$(cat <<EOF
        {"execute":"guest-exec","arguments":{"path":"/usr/bin/sh","arg":["-lc","mkdir -p /home/core/.ssh && printf '\''%s\\n'\'' '\''${key}'\'' > /home/core/.ssh/authorized_keys && chown -R core:core /home/core/.ssh && chmod 700 /home/core/.ssh && chmod 600 /home/core/.ssh/authorized_keys"],"capture-output":true}}
        EOF
          )
          resp=$(virsh qemu-agent-command "${domain}" "${payload}")
          pid=$(printf "%s" "${resp}" | sed -n "s/.*\"pid\"[[:space:]]*:[[:space:]]*\([0-9][0-9]*\).*/\1/p")
          sleep 2
          virsh qemu-agent-command "${domain}" "{\"execute\":\"guest-exec-status\",\"arguments\":{\"pid\":${pid}}}"
        '

        POD_IP=$(kubectl get pod -n "${NS}" -l "${LABEL}" \
          -o jsonpath='{.items[0].status.podIP}')

        echo "Waiting for SSH on ${POD_IP}..."
        timeout 120 bash -c \
          "until bash -c 'echo >/dev/tcp/${POD_IP}/22' 2>/dev/null; do sleep 5; done"

        # Brief pause to let sshd fully accept connections after the port opens.
        # The build disk (vdb) is formatted and mounted by cloud-init runcmd at
        # first boot, before SSH becomes available.
        sleep 3

        echo "${POD_IP}" >&3

    # -------------------------------------------------------------------------
    # build-kernel: SSH into the Flatcar build VM.
    # Flatcar 4593 ships Docker 28 — run_sdk_container works natively.
    # scripts ref pinned to stable-4593.2.3 to match SDK 4593.0.0.
    # Manifest is regenerated inside the SDK with `ebuild manifest`.
    # Output: /var/tmp/build/output/flatcar_production_update.gz on the build-data PVC.
    # Payload is copied directly to the Nebraska pod so register-package only
    # needs to call the REST API with the checksums from output parameters.
    # -------------------------------------------------------------------------
  - name: build-kernel
    inputs:
      parameters:
      - name: vm-ip
      - name: kernel-version
      - name: flatcar-scripts-ref
      - name: sdk-version
    outputs:
      parameters:
      - name: sha1
        valueFrom:
          path: /tmp/sha1.txt
      - name: sha256
        valueFrom:
          path: /tmp/sha256.txt
      - name: size
        valueFrom:
          path: /tmp/size.txt
      - name: filename
        valueFrom:
          path: /tmp/filename.txt
    activeDeadlineSeconds: 10800
    script:
      image: cgr.dev/chainguard/kubectl:latest-dev
      securityContext:
        runAsUser: 0
      command: [bash]
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          cpu: 200m
          memory: 4Gi
      env:
      - name: SSH_KEY
        valueFrom:
          secretKeyRef:
            name: bluefin-test-ssh-key
            key: id_ed25519
      source: |
        set -euo pipefail
        git config --global --add safe.directory "*"
        apk add --no-cache bash curl jq kubectl git >/dev/null 2>&1
        apk add --no-cache openssh-client 2>&1 | tail -5
        VM_IP="{{inputs.parameters.vm-ip}}"
        KERNEL_VERSION="{{inputs.parameters.kernel-version}}"
        SCRIPTS_REF="{{inputs.parameters.flatcar-scripts-ref}}"
        SDK_VERSION="{{inputs.parameters.sdk-version}}"

        # Write SSH key
        echo "${SSH_KEY}" > /tmp/id_ed25519
        chmod 600 /tmp/id_ed25519
        SSH="ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no \
             -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 \
             core@${VM_IP}"

        echo "=== Connected to build VM at ${VM_IP} ==="

        $SSH bash -s << REMOTE
        set -euo pipefail
        git config --global --add safe.directory "*"

        echo "=== Formatting and mounting build PVC (/dev/vdb) ==="
        sudo grep -q "/dev/vdb" /proc/mounts || sudo mkfs.ext4 -F /dev/vdb
        sudo mkdir -p /var/tmp/build
        sudo grep -q "/var/tmp/build" /proc/mounts || sudo mount /dev/vdb /var/tmp/build
        sudo chown core:core /var/tmp/build

        KERNEL_VERSION="${KERNEL_VERSION}"
        SCRIPTS_REF="${SCRIPTS_REF}"
        SDK_VERSION="${SDK_VERSION}"
        BUILD_DIR=/var/tmp/build

        echo "=== Create standard workspace directories ==="
        mkdir -p \${BUILD_DIR}/src/third_party

        echo "=== Clone flatcar/scripts @ \${SCRIPTS_REF} ==="
        git clone --depth=1 --branch "\${SCRIPTS_REF}" \
          https://github.com/flatcar/scripts \${BUILD_DIR}/src/scripts

        echo "=== Use coreos-overlay + portage-stable bundled with scripts @ \${SCRIPTS_REF} ==="

        echo "=== Patching kernel-2.eclass to support EAPI 7 and 8 ==="
        sed -i 's/2|3|4|5|6/2|3|4|5|6|7|8/g' \${BUILD_DIR}/src/scripts/sdk_container/src/third_party/portage-stable/eclass/kernel-2.eclass

        echo "=== Clone testing-lab for kernel overlay ==="
        git clone --depth=1 \
          https://github.com/projectbluefin/testing-lab \
          \${BUILD_DIR}/testing-lab

        echo "=== Install kernel overlay ==="
        OVERLAY_DEST=src/third_party/flatcar-kernel-overlay
        cp -r \${BUILD_DIR}/testing-lab/flatcar/kernel-overlay \${BUILD_DIR}/\${OVERLAY_DEST}
        chmod -R a+w \${BUILD_DIR}/\${OVERLAY_DEST}

        echo "=== Move Docker data-root to PVC (SDK image is ~15GB) ==="
        sudo systemctl stop docker || true
        sudo mkdir -p \${BUILD_DIR}/docker /etc/docker
        echo '{"data-root": "/var/tmp/build/docker", "insecure-registries": ["192.168.1.102:30501", "192.168.1.102:30500"]}' | sudo tee /etc/docker/daemon.json
        sudo systemctl start docker
        sudo systemctl is-active docker

        echo "=== Regenerate Manifest checksums via SDK ==="
        # Run ephemeral SDK container just for manifest generation
        docker run --rm \
          -v \${BUILD_DIR}/\${OVERLAY_DEST}:/overlay \
          -v \${BUILD_DIR}/src/scripts/sdk_container/src/third_party/coreos-overlay:/mnt/host/source/src/third_party/coreos-overlay \
          -v \${BUILD_DIR}/src/scripts/sdk_container/src/third_party/portage-stable:/mnt/host/source/src/third_party/portage-stable \
          192.168.1.102:30501/ghcr/flatcar/flatcar-sdk-amd64:\${SDK_VERSION} \
          bash -c "
            ebuild /overlay/sys-kernel/coreos-sources/coreos-sources-\${KERNEL_VERSION}.ebuild manifest
            ebuild /overlay/sys-kernel/coreos-kernel/coreos-kernel-\${KERNEL_VERSION}.ebuild manifest 2>/dev/null || true
            ebuild /overlay/sys-kernel/coreos-modules/coreos-modules-\${KERNEL_VERSION}.ebuild manifest 2>/dev/null || true
          "

        echo "=== Write build script for execution inside SDK container ==="
        printf '%s\n' \
          '#!/bin/bash' \
          'set -euo pipefail' \
          'export GENERATE_SLSA_PROVENANCE=false' \
          'export generate_slsa_provenance_report=no' \
          'export FEATURES="-sandbox -usersandbox -userpriv"' \
          '' \
          '# Register overlay in portage repos.conf (both host and board)' \
          'sudo mkdir -p /etc/portage/repos.conf /build/amd64-usr/etc/portage/repos.conf' \
          'echo "[coreos-overlay]" | sudo tee /etc/portage/repos.conf/coreos-overlay.conf /build/amd64-usr/etc/portage/repos.conf/coreos-overlay.conf >/dev/null' \
          'echo "location = /mnt/host/source/src/third_party/coreos-overlay" | sudo tee -a /etc/portage/repos.conf/coreos-overlay.conf /build/amd64-usr/etc/portage/repos.conf/coreos-overlay.conf >/dev/null' \
          'echo "masters = portage-stable" | sudo tee -a /etc/portage/repos.conf/coreos-overlay.conf /build/amd64-usr/etc/portage/repos.conf/coreos-overlay.conf >/dev/null' \
          'echo "auto-sync = no" | sudo tee -a /etc/portage/repos.conf/coreos-overlay.conf /build/amd64-usr/etc/portage/repos.conf/coreos-overlay.conf >/dev/null' \
          '' \
          '# Force HTTPS for github sources and pin resolver to avoid DNS failures in git-r3 fetches' \
          'git config --global url."https://github.com/".insteadOf git://github.com/' \
          'echo -e "nameserver 1.1.1.1\\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf >/dev/null' \
          'getent hosts github.com >/dev/null' \
          '' \
          '# Set up board (no --skip-chroot-upgrade: not a valid flag in this SDK version)' \
          '/mnt/host/source/src/scripts/setup_board \' \
          '  --board=amd64-usr --default --force --skip_chroot_upgrade --skip_toolchain_update' \
          '' \
          '# Register flatcar-kernel overlay after setup_board --force recreates board root' \
          'sudo mkdir -p /build/amd64-usr/etc/portage/repos.conf' \
          'echo "[flatcar-kernel]" | sudo tee /build/amd64-usr/etc/portage/repos.conf/flatcar-kernel.conf >/dev/null' \
          'echo "location = /overlay" | sudo tee -a /build/amd64-usr/etc/portage/repos.conf/flatcar-kernel.conf >/dev/null' \
          'echo "masters = portage-stable coreos-overlay" | sudo tee -a /build/amd64-usr/etc/portage/repos.conf/flatcar-kernel.conf >/dev/null' \
          'echo "auto-sync = no" | sudo tee -a /build/amd64-usr/etc/portage/repos.conf/flatcar-kernel.conf >/dev/null' \
          '' \
          '# Mock pahole and other heavyweight packages not needed for kernel compile' \
          'sudo mkdir -p /build/amd64-usr/etc/portage/profile' \
          'echo "dev-util/pahole-1.24_p20221024" | sudo tee -a /build/amd64-usr/etc/portage/profile/package.provided >/dev/null' \
          '' \
          '# Build kernel packages one at a time with --nodeps to avoid cyclic dependency' \
          '# resolution in portage-stable@4593. coreos-sources has no board deps (just' \
          '# unpacks tarballs); coreos-kernel requires sources to be present; coreos-modules' \
          '# requires the built kernel. --nodeps bypasses the full sysroot dep graph.' \
          'FEATURES="-sandbox -usersandbox -userpriv" emerge-amd64-usr --nodeps --jobs={{workflow.parameters.cores}} \' \
          '  =sys-kernel/coreos-sources-{{inputs.parameters.kernel-version}}' \
          'FEATURES="-sandbox -usersandbox -userpriv" emerge-amd64-usr --nodeps --jobs={{workflow.parameters.cores}} \' \
          '  =sys-kernel/coreos-kernel-{{inputs.parameters.kernel-version}}' \
          'FEATURES="-sandbox -usersandbox -userpriv" emerge-amd64-usr --nodeps --jobs={{workflow.parameters.cores}} \' \
          '  =sys-kernel/coreos-modules-{{inputs.parameters.kernel-version}}' \
          '' \
          '# Create merged-usr symlinks required by build_image sanity checks.' \
          '# setup_board + --nodeps skips baselayout so /bin /lib /sbin are absent.' \
          '[ -e /build/amd64-usr/bin ]   || sudo ln -sf usr/bin   /build/amd64-usr/bin' \
          '[ -e /build/amd64-usr/lib ]   || sudo ln -sf usr/lib   /build/amd64-usr/lib' \
          '[ -e /build/amd64-usr/lib64 ] || sudo ln -sf usr/lib64 /build/amd64-usr/lib64' \
          '[ -e /build/amd64-usr/sbin ]  || sudo ln -sf usr/sbin  /build/amd64-usr/sbin' \
          '# build_image symlink check expects these lib targets to exist in minimal sysroot' \
          'sudo mkdir -p /build/amd64-usr/usr/lib/kernel /build/amd64-usr/usr/lib/udev /build/amd64-usr/usr/lib/pam /build/amd64-usr/usr/lib/pam.d' \
          '' \
          '# Unmerge coreos-sources before build_image to remove /usr/src/linux-*.' \
          '# The kernel source tree contains shell scripts with #!/bin/sh shebangs' \
          '# that fail build_image symlink checks (no shell in minimal sysroot).' \
          'FEATURES="-sandbox -usersandbox -userpriv" emerge-amd64-usr \' \
          '  --unmerge =sys-kernel/coreos-sources-{{inputs.parameters.kernel-version}} || true' \
          '' \
          '# Diagnose check_root failures explicitly before build_image' \
          'echo "=== check_root usr ===" ; ROOT=/build/amd64-usr /mnt/host/source/src/scripts/build_library/check_root usr 2>&1 || true' \
          'echo "=== check_root symlink ===" ; sudo ROOT=/build/amd64-usr /mnt/host/source/src/scripts/build_library/check_root symlink 2>&1 || true' \
          '' \
          '# Build the full Flatcar OS image (generates update payload)' \
          'skip_test_build_root=1 /mnt/host/source/src/scripts/build_image \' \
          '  --board=amd64-usr prod' \
          '' \
          'mkdir -p /mnt/host/source/src/build/output' \
          'cp /mnt/host/source/src/build/images/amd64-usr/latest/flatcar_production_update.gz \' \
          '   /mnt/host/source/src/build/output/flatcar_production_update.gz' \
          > \${BUILD_DIR}/src/scripts/build-inside-sdk.sh
        chmod +x \${BUILD_DIR}/src/scripts/build-inside-sdk.sh

        echo "=== Run SDK build via run_sdk_container ==="
        cd \${BUILD_DIR}/src/scripts

        echo "=== Set final world-readable permissions ==="
        sudo chmod -R a+rX \${BUILD_DIR} || true

        # run_sdk_container detects Docker and uses it natively
        ./run_sdk_container --rm \
          -m \${BUILD_DIR}/\${OVERLAY_DEST}:/overlay \
          -V \${SDK_VERSION} \
          -- /mnt/host/source/src/scripts/build-inside-sdk.sh

        # Collect output metadata
        PAYLOAD=\${BUILD_DIR}/src/build/output/flatcar_production_update.gz
        mkdir -p \${BUILD_DIR}/output
        cp "\${PAYLOAD}" \${BUILD_DIR}/output/
        sha1sum "\${PAYLOAD}" | awk '{print \$1}' > \${BUILD_DIR}/output/sha1.txt
        sha256sum "\${PAYLOAD}" | awk '{print \$1}' > \${BUILD_DIR}/output/sha256.txt
        wc -c < "\${PAYLOAD}" | tr -d ' ' > \${BUILD_DIR}/output/size.txt
        echo "=== Build complete: \$(wc -c < \${BUILD_DIR}/output/flatcar_production_update.gz) bytes ==="
        REMOTE

        echo "Copying output from VM..."
        SCP_OPTS="-i /tmp/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        scp ${SCP_OPTS} core@${VM_IP}:/var/tmp/build/output/sha1.txt /tmp/sha1.txt
        scp ${SCP_OPTS} core@${VM_IP}:/var/tmp/build/output/sha256.txt /tmp/sha256.txt
        scp ${SCP_OPTS} core@${VM_IP}:/var/tmp/build/output/size.txt /tmp/size.txt
        scp ${SCP_OPTS} core@${VM_IP}:/var/tmp/build/output/flatcar_production_update.gz \
          /tmp/flatcar_production_update.gz

        FILENAME="flatcar_production_update-kernel${KERNEL_VERSION}.gz"
        echo "${FILENAME}" > /tmp/filename.txt

        # Copy payload directly to Nebraska so register-package only needs the checksums.
        NEBRASKA_POD=$(kubectl get pod -n flatcar-update \
          -l app=nebraska -o jsonpath='{.items[0].metadata.name}')
        echo "Copying payload to Nebraska pod ${NEBRASKA_POD}..."
        kubectl cp /tmp/flatcar_production_update.gz \
          "flatcar-update/${NEBRASKA_POD}:/packages/${FILENAME}"
        echo "Build and payload upload complete"

    # -------------------------------------------------------------------------
    # register-package: registers the payload with Nebraska via REST API.
    # The payload file is already in Nebraska's /packages/ directory — copied
    # there by the build-kernel step. This step only needs the checksums and
    # size, passed as output parameters from build-kernel.
    # Nebraska URL field = base path; Nebraska constructs full URL as url+filename.
    # flatcar_action.sha256 is required for valid Omaha action metadata.
    # Version uses 9999.MAJOR.MINOR for real semver precedence over stock Flatcar.
    # -------------------------------------------------------------------------
  - name: register-package
    inputs:
      parameters:
      - name: kernel-version
      - name: sha1
      - name: sha256
      - name: size
      - name: filename
    script:
      image: cgr.dev/chainguard/kubectl:latest-dev
      securityContext:
        runAsUser: 0
      command: [bash]
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 50m
          memory: 512Mi
      source: |
        set -euo pipefail
        apk add --no-cache bash curl jq kubectl git >/dev/null 2>&1
        KERNEL_VERSION="{{inputs.parameters.kernel-version}}"
        NEBRASKA_URL="http://192.168.1.102:30802"
        FLATCAR_APP_ID="e96281a6-d1af-4bde-9a0a-97b76e56dc57"

        SHA1="{{inputs.parameters.sha1}}"
        SHA256="{{inputs.parameters.sha256}}"
        SIZE="{{inputs.parameters.size}}"
        FILENAME="{{inputs.parameters.filename}}"

        # Version: 9999.MAJOR.MINOR gives real semver precedence > any stock Flatcar
        KERNEL_MAJOR=$(echo "${KERNEL_VERSION}" | cut -d. -f1)
        KERNEL_MINOR=$(echo "${KERNEL_VERSION}" | cut -d. -f2)
        VERSION="9999.${KERNEL_MAJOR}.${KERNEL_MINOR}"

        echo "Registering kernel ${KERNEL_VERSION} as Flatcar version ${VERSION}"

        # Nebraska serves files at {nebraska-url}/flatcar/{filename}
        # The `url` field in the API must be the BASE PATH only —
        # Nebraska appends filename when building Omaha responses.
        PKG_BASE_URL="${NEBRASKA_URL}/flatcar/"

        # SHA1 as base64-encoded raw bytes (what Nebraska/Omaha expects)
        SHA1_B64=$(printf '%s' "${SHA1}" | xxd -r -p | base64)

        curl -sf -X POST \
          "${NEBRASKA_URL}/api/v1/apps/${FLATCAR_APP_ID}/packages" \
          -H "Content-Type: application/json" \
          -d "{
            \"filename\": \"${FILENAME}\",
            \"url\": \"${PKG_BASE_URL}\",
            \"version\": \"${VERSION}\",
            \"hash\": \"${SHA1_B64}\",
            \"hash256\": \"${SHA256}\",
            \"size\": \"${SIZE}\",
            \"type\": 1,
            \"arch\": 1,
            \"flatcar_action\": {
              \"sha256\": \"${SHA256}\"
            }
          }"

        echo ""
        echo "=== Package registered ==="
        echo "Version: ${VERSION}  (kernel ${KERNEL_VERSION})"
        echo "URL:     ${PKG_BASE_URL}${FILENAME}"
        echo "update_engine on Flatcar nodes will pick this up on next check-in"

  - name: record-candidate-state
    inputs:
      parameters:
      - name: kernel-version
      - name: filename
    script:
      image: cgr.dev/chainguard/kubectl:latest-dev
      securityContext:
        runAsUser: 0
      command: [bash]
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 50m
          memory: 512Mi
      source: |
        set -euo pipefail
        apk add --no-cache bash kubectl >/dev/null 2>&1
        TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        kubectl patch configmap flatcar-kernel-lifecycle-state -n argo --type=merge -p "{
          \"data\": {
            \"candidate-version\": \"{{inputs.parameters.kernel-version}}\",
            \"candidate-package\": \"{{inputs.parameters.filename}}\",
            \"candidate-created-at\": \"${TS}\",
            \"gate-status\": \"pending\"
          }
        }"

    # -------------------------------------------------------------------------
    # teardown-build-vm: always runs via onExit. Deletes the KubeVirt VM and
    # the build-data PVC (120Gi local-path — must be explicitly cleaned up).
    # -------------------------------------------------------------------------
  - name: teardown-build-vm
    steps:
    - - name: delete-vm
        template: delete-vm
      - name: delete-pvc
        template: delete-pvc

  - name: delete-vm
    resource:
      action: delete
      flags: ["--ignore-not-found=true"]
      manifest: |
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: "{{workflow.parameters.vm-name}}"
          namespace: "{{workflow.parameters.namespace}}"

  - name: delete-pvc
    resource:
      action: delete
      flags: ["--ignore-not-found=true"]
      manifest: |
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: "{{workflow.name}}-build-data"
          namespace: "{{workflow.parameters.namespace}}"

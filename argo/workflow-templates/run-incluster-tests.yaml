apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: testing-lab:argoproj.io/WorkflowTemplate:argo/run-incluster-tests
    bluefin.io/stack: k8s workload + pytest
  name: run-incluster-tests
  namespace: argo
spec:
  templates:
  - activeDeadlineSeconds: 1800
    container:
      args:
      - "set -euo pipefail\nmkdir -p /tmp/results\nLOG=/tmp/results/runner.log\nexec\
        \ > >(tee -a \"${LOG}\") 2>&1\n\ndnf install -y --quiet python3 python3-pytest\
        \ kubernetes-client jq curl openssl 2>&1 | tail -4\n\nSUITE=\"/workspace/testing-lab/tests/{{inputs.parameters.suite-path}}\"\
        \ntest -e \"${SUITE}\"\nexport PYTHONPATH=\"/workspace/testing-lab:${PYTHONPATH:-}\"\
        \n\nTEST_RC=0\npython3 -m pytest -q \"${SUITE}\" --junitxml /tmp/results/pytest-results.xml\
        \ || TEST_RC=$?\n\necho \"Collected result files:\" >&2\nfind /tmp/results\
        \ -maxdepth 1 -type f -printf '%f\\n' | sort >&2\n\nif [[ -f /tmp/results/pytest-results.xml\
        \ ]]; then\n  SUMMARY=\"$(python3 -c \"import xml.etree.ElementTree as ET;\
        \ root=ET.parse('/tmp/results/pytest-results.xml').getroot(); suites=[root]\
        \ if root.tag == 'testsuite' else root.findall('testsuite'); tests=sum(int(s.attrib.get('tests',\
        \ 0)) for s in suites); skipped=sum(int(s.attrib.get('skipped', 0)) for s\
        \ in suites); failures=sum(int(s.attrib.get('failures', 0)) + int(s.attrib.get('errors',\
        \ 0)) for s in suites); passed=tests - skipped - failures; print(f'{passed}/{tests}\
        \ pytest checks passed')\" 2>/dev/null || true)\"\n  if [[ -n \"${SUMMARY}\"\
        \ ]]; then\n    printf '%s\\n' \"${SUMMARY}\"\n  else\n    echo \"pytest results\
        \ present\"\n  fi\nelse\n  echo \"pytest results missing\"\nfi\n\nexit \"\
        ${TEST_RC}\"\n"
      command:
      - bash
      - -c
      env:
      - name: TEST_NAMESPACE
        value: '{{inputs.parameters.namespace}}'
      - name: TEST_APP_LABEL
        value: '{{inputs.parameters.app-label}}'
      - name: TEST_SERVICE_NAME
        value: '{{inputs.parameters.service-name}}'
      - name: TEST_LANE
        value: '{{inputs.parameters.lane}}'
      - name: TEST_RESULTS_DIR
        value: /tmp/results
      image: quay.io/fedora/fedora:latest
      imagePullPolicy: Always
      resources:
        limits:
          cpu: '2'
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
      - mountPath: /workspace
        name: workspace
        readOnly: true
    initContainers:
    - args:
      - "set -euo pipefail\ndnf install -y --quiet git 2>&1 | tail -2\nfor attempt\
        \ in 1 2 3; do\n  rm -rf /workspace/testing-lab\n  if git clone --depth 1\
        \ --branch \"${BRANCH}\" \\\n      https://github.com/projectbluefin/testing-lab\
        \ \\\n      /workspace/testing-lab 2>&1; then\n    echo \"Synced testing-lab\
        \ @ ${BRANCH} (attempt ${attempt})\"\n    exit 0\n  fi\n  rm -rf /workspace/testing-lab\n\
        \  if git clone https://github.com/projectbluefin/testing-lab /workspace/testing-lab\
        \ 2>&1 && \\\n     git -C /workspace/testing-lab checkout \"${BRANCH}\" 2>&1;\
        \ then\n    echo \"Synced testing-lab @ ${BRANCH} via SHA fallback (attempt\
        \ ${attempt})\"\n    exit 0\n  fi\n  echo \"Attempt ${attempt} failed, retrying\
        \ in 15s...\"\n  sleep 15\ndone\nexit 1\n"
      command:
      - bash
      - -c
      env:
      - name: BRANCH
        value: '{{inputs.parameters.branch}}'
      image: quay.io/fedora/fedora:latest
      name: git-sync
      volumeMounts:
      - mountPath: /workspace
        name: workspace
    inputs:
      parameters:
      - name: namespace
      - name: suite-path
      - name: lane
        value: ""
      - name: app-label
        value: ""
      - name: service-name
        value: ""
      - name: branch
        value: main
    metadata:
      labels:
        app.kubernetes.io/part-of: bluefin-test-suite
        bluefin.io/lane: '{{inputs.parameters.lane}}'
        bluefin.io/step: run-incluster-tests
        bluefin.io/suite: '{{inputs.parameters.suite-path}}'
    name: run-pytest
    volumes:
    - emptyDir: {}
      name: workspace


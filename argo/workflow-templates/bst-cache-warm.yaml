# WorkflowTemplate: bst-cache-warm
# Pulls BST sources and remote build artifacts for dakota into the local CAS on ghost.
# Run periodically via the bst-cache-warm CronWorkflow to avoid cold-start BST builds.
# No build — fetch + pull only. Step is best-effort (|| true) so transient upstream
# failures don't block nightly builds from running.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bst-cache-warm
  namespace: argo
  labels:
    app.kubernetes.io/component: dakota-bst
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  entrypoint: warm
  templates:
  - name: warm
    activeDeadlineSeconds: 3600
    metadata:
      labels:
        app.kubernetes.io/part-of: bluefin-test-suite
        bluefin.io/step: bst-cache-warm
    nodeSelector:
      kubernetes.io/hostname: ghost
    priorityClassName: bst-build
    initContainers:
    - name: git-clone
      image: quay.io/fedora/fedora:latest
      command: [bash, -c]
      args:
      - |
        set -euo pipefail
        dnf install -y --quiet git 2>&1 | tail -2
        find /src -mindepth 1 -delete
        git clone --depth 1 --branch main \
          https://github.com/projectbluefin/dakota /src
      env:
      - name: TMPDIR
        value: /tmp
      volumeMounts:
      - mountPath: /src
        name: src
      - mountPath: /tmp
        name: tmp
    container:
      image: quay.io/podman/stable:latest
      command: [bash, -c]
      args:
      - |
        set -uo pipefail
        dnf install -y --quiet just 2>&1 | tail -2
        cd /src
        echo "=== bst-cache-warm: fetch sources ==="
        just bst fetch --deps all oci/bluefin.bst 2>&1 || true
        echo "=== bst-cache-warm: pull remote artifacts ==="
        just bst pull --deps all oci/bluefin.bst 2>&1 || true
        echo "=== bst-cache-warm: done ==="
      env:
      - name: TMPDIR
        value: /tmp
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
          ephemeral-storage: 500Mi
        limits:
          cpu: "4"
          memory: 8Gi
          ephemeral-storage: 2Gi
      securityContext:
        privileged: true
        runAsUser: 0
      volumeMounts:
      - mountPath: /dev
        name: dev
      - mountPath: /var/lib/containers/storage
        name: containers-storage
      - mountPath: /root/.cache/buildstream
        name: bst-cache
      - mountPath: /src
        name: src
      - mountPath: /tmp
        name: tmp
    volumes:
    - hostPath:
        path: /dev
      name: dev
    - hostPath:
        path: /var/mnt/ghost-data/containers-iso-build
        type: DirectoryOrCreate
      name: containers-storage
    - hostPath:
        path: /var/mnt/ghost-data/bst-cache
        type: DirectoryOrCreate
      name: bst-cache
    - hostPath:
        path: /var/mnt/ghost-data/bst-src
        type: DirectoryOrCreate
      name: src
    - hostPath:
        path: /var/mnt/ghost-data/bst-tmp
        type: DirectoryOrCreate
      name: tmp

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bst-build
  namespace: argo
spec:
  arguments:
    parameters:
    - enum:
      - dakota
      - bluefin
      - lts
      name: variant
      value: dakota
    - name: image-tag
      value: latest
  entrypoint: bst-build-pipeline
  templates:
  - name: bst-build-pipeline
    steps:
    - - name: build
        template: bst-build-step
        arguments:
          parameters:
          - name: variant
            value: '{{workflow.parameters.variant}}'
          - name: image-tag
            value: '{{workflow.parameters.image-tag}}'
    - - name: push
        template: zot-push-step
        arguments:
          parameters:
          - name: variant
            value: '{{workflow.parameters.variant}}'
          - name: image-tag
            value: '{{workflow.parameters.image-tag}}'
  - inputs:
      parameters:
      - name: variant
      - name: image-tag
    name: bst-build-step
    nodeSelector:
      kubernetes.io/hostname: ghost
    script:
      command:
      - bash
      image: ghcr.io/projectbluefin/dakota:bst-runner
      source: "set -euo pipefail\necho \"\u2192 BST build: {{inputs.parameters.variant}}:{{inputs.parameters.image-tag}}\"\
        \ncd /workspace/dakota\nbst build oci/bluefin.bst\necho \"\u2713 BST build\
        \ complete\"\n"
      volumeMounts:
      - mountPath: /var/cache/bst
        name: bst-cache
      - mountPath: /var/tmp/bst-output
        name: build-output
    volumes:
    - hostPath:
        path: /var/cache/bst
        type: DirectoryOrCreate
      name: bst-cache
    - hostPath:
        path: /var/tmp/bst-output
        type: DirectoryOrCreate
      name: build-output
  - inputs:
      parameters:
      - name: variant
      - name: image-tag
    name: zot-push-step
    nodeSelector:
      kubernetes.io/hostname: ghost
    script:
      command:
      - bash
      image: quay.io/skopeo/stable:latest
      source: "set -euo pipefail\nskopeo copy \\\n  oci:/var/tmp/bst-output/{{inputs.parameters.variant}}\
        \ \\\n  docker://192.168.1.102:5000/{{inputs.parameters.variant}}:{{inputs.parameters.image-tag}}\
        \ \\\n  --dest-tls-verify=false\necho \"\u2713 Pushed {{inputs.parameters.variant}}:{{inputs.parameters.image-tag}}\"\
        \n"


apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      values: |
        githubConfigUrl: "https://github.com/projectbluefin"
        githubConfigSecret: arc-github-secret
        runnerScaleSetName: ghost-runners
        minRunners: 0
        maxRunners: 4
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-systems-gha-rs-controller
        template:
          spec:
            nodeSelector:
              node-location: lan
            tolerations:
              - key: node-role.kubernetes.io/gaming
                operator: Exists
                effect: NoSchedule
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: "2"
                    memory: 4Gi
                  limits:
                    cpu: "8"
                    memory: 16Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install argo CLI
        run: |
          ARGO_VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-workflows/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sLO "https://github.com/argoproj/argo-workflows/releases/download/${ARGO_VERSION}/argo-linux-amd64.gz"
          gunzip argo-linux-amd64.gz
          chmod +x argo-linux-amd64
          sudo mv argo-linux-amd64 /usr/local/bin/argo

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Lint workflow-templates (offline, cross-file refs)
        run: argo lint --offline argo/workflow-templates/

      - name: Lint bootstrap templates (offline)
        run: argo lint --offline argo/bootstrap/

      - name: Lint standalone submit Workflows (offline)
        run: |
          for f in argo/*.yaml; do
            echo "Checking $f..."
            argo lint --offline "$f" || echo "WARNING: $f needs server-side template resolution"
          done

      - name: Registry allowlist check
        run: |
          # Fail if any image: reference uses a registry not in the cluster cache.
          # Add '# registry-lint-ignore' to a line to exempt it (e.g. ROCm device plugin).
          FAIL=0
          while IFS= read -r line; do
            echo "$line" | grep -q 'registry-lint-ignore' && continue
            imgref=$(echo "$line" | sed 's/.*image:[[:space:]]*//' | awk '{print $1}' | tr -d "\"'")
            [[ -z "$imgref" || "${imgref:0:1}" == "#" ]] && continue
            registry=$(echo "$imgref" | cut -d/ -f1)
            # skip bare names (no dot or colon = implicit docker.io, handled by zot-docker)
            echo "$registry" | grep -qE '[.:]' || continue
            case "$registry" in
              ghcr.io|quay.io|registry.fedoraproject.org|registry.k8s.io|cgr.dev|192.168.1.102|192.168.1.102:30500|192.168.1.102:30501|localhost) ;;
              *) echo "FAIL: uncached registry '$registry' in $(echo "$line" | cut -d: -f1-2): $imgref"; FAIL=1 ;;
            esac
          done < <(grep -rn 'image:' argo/ manifests/)
          exit "$FAIL"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Validate Python syntax
        run: |
          echo "Checking Python syntax..."
          find tests/ -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Check pytest collection
        run: |
          echo "Checking pytest imports and collection..."
          python -m pip install pytest -q
          python -m pytest tests/ --collect-only -q 2>&1 | tail -5
